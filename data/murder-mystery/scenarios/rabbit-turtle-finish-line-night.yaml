cards:
  - id: card_turtle_body
    text: |
      목을 조른 흔적이나 둔기 외상은 없고, 입과 코 주변에도 섬유 자국이나 강한 압박흔은 없다.
      등껍질 한쪽에 얕은 긁힌 흔적만 있다.
      입가 가까이에서는 희미하게 씁쓸한 약 냄새가 난다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/turtle-body.png'
    imageAlt: '재활수조실에 쓰러진 거북의 사체 사진'
    backId: back_turtle_body
    effects:
      - type: addPart
        partId: part_turtle_body
  - id: card_rubber_ring
    text: |
      작고 하얀 고무링이 나왔다.
      표면이 살짝 젖어 있고, 씁쓸한 냄새가 희미하게 난다.
      다른 물건에 들어가는 고무패킹으로 보인다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rubber-ring.png'
    imageAlt: '작고 하얀 고무링'
    backId: back_rubber_ring
    effects:
      - type: addPart
        partId: part_rubber_ring
  - id: card_black_thermos
    text: |
      보온병에 고무패킹이 빠져 있다.
      보온병 안쪽에는 씁쓸한 냄새가 희미하게 남아 있다.
      바닥에는 녹다 만 흰 가루 흔적이 조금 붙어 있다.
    backId: back_black_thermos
    effects:
      - type: addPart
        partId: part_black_thermos
  - id: card_turtle_envelope
    text: |
      오완주의 자필 고백문에는 20XX년 육상 국가대표 선발전 결승 전, 그가 윤유성의 물병에 수면유도제를 넣었다고 적혀 있다.
      봉투에는 오완주 명의 수면유도제 처방전 사본과, 경기 수익·광고 수익 전액을 중증 어린이 환자 수술비와 치료비로 지정 기부한 ‘오완주기금’ 접수 확인서가 들어 있다.
      기금은 아직 집행 전이며, 고백문 마지막 장에는 "이것이 사죄가 될 수 없다는 것을 알지만" 윤유성이 그 사실만은 알아 주기를 바란다고 적혀 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/turtle-envelope.png'
    imageAlt: '자필 고백문과 처방전 사본, 오완주기금 접수 확인서가 든 서류봉투'
    backId: back_turtle_envelope
    effects:
      - type: addPart
        partId: part_turtle_envelope
  - id: card_rabbit_family
    text: |
      가족사진이다.
      사진 뒷면에는 "내 딸 윤슬. 수술 끝나면 학교 가자."라고 적혀 있다.
      사진 모서리에는 오래된 흰 리본이 붙어 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rabbit-family.png'
    imageAlt: '토끼 가족사진'
    backId: back_rabbit_family
    effects:
      - type: addPart
        partId: part_rabbit_family
  - id: card_wife_note
    text: |
      한다정의 메모

      오래 접힌 작은 메모다.

      경기 중 졸음.
      팔 안쪽 이빨 자국.
      물병.
      오완주 우승.

      마지막 줄에는 이렇게 적혀 있다.

      정말 컨디션 문제였을까.
    backId: back_wife_note
    effects:
      - type: addPart
        partId: part_wife_note
  - id: card_medical_wing_rumor
    text: |
      의료동에서는 윤유성이 선발전에서 이겼다면 윤슬이 수술을 받을 수 있었을 거라는 말이 돈다.
      경기 우승으로 수술을 받았으면 살 확률이 높았을 텐데..
    publicRevealDisabled: true
    backId: back_medical_wing_rumor
    effects:
      - type: addPart
        partId: part_medical_wing_rumor
  - id: card_medical_wing_rumor_2
    text: |
      본행사 전에 조희수가 서기준의 간이책상으로 와 대기하다가 본행사 직전에 돌아갔고, 그 뒤 조희수의 비명까지 네 명 중 출입자는 없었다.
    backId: back_medical_wing_rumor_2
    effects:
      - type: addPart
        partId: part_medical_wing_rumor_2
  - id: card_medical_shoe_cabinet_1
    text: |
      의료동 입구에는 환자들이 신고 온 신발을 벗고 병원 슬리퍼로 갈아 신는 신발장이 있다.
      신발장 안에는 환자들의 신발과 비치된 병원 슬리퍼가 함께 놓여 있다.

      그중 깊숙한 칸 안쪽에 젖은 구두 한 켤레가 놓여 있다.
    backId: back_medical_shoe_cabinet_1
    effects:
      - type: addPart
        partId: part_medical_shoe_cabinet_1
  - id: card_medical_shoe_cabinet_2
    text: |
      병원 슬리퍼를 신은 환자 한 명이 의료동 입구에서 본인이 신고 왔던 운동화가 없어졌다며 찾고 있다.
      환자는 진료를 보러 들어가기 전 신발장에 운동화를 넣어 두었고, 나오고 보니 사라졌다고 말한다.
    backId: back_medical_shoe_cabinet_2
    effects:
      - type: addPart
        partId: part_medical_shoe_cabinet_2
  - id: card_jara_belongings
    text: |
      서기준의 소지품은 손수건, 행사 진행표, 평범한 필기구뿐이다.
      행사 진행표 아래쪽에는 개인 메모처럼 보이는 작은 일정이 적혀 있다.

      "행사 종료 후 21:40 의료동 일정 / 회복 음료 확인"
    backId: back_jara_belongings
    effects:
      - type: addPart
        partId: part_jara_belongings
  - id: card_syringe_trace
    text: |
      조희수의 품 속에서 손수건에 감긴 일회용 주사기와 빈 약병이 함께 나왔다.
      주사기 안에는 투명한 액체가 차 있다.
      약병 라벨에는 "진정제"라고 적혀 있고, 병에는 피가 조금 묻어 있다.
    backId: back_syringe_trace
    effects:
      - type: addPart
        partId: part_syringe_trace
  - id: card_fox_press_kit
    text: |
      후원선수 복귀 기자간담회 자료집이다.

      표지의 ‘후원선수 복귀’ 문구 아래쪽이
      물에 닿았다 마른 듯 살짝 울어 있다.

      다른 페이지에는 젖은 흔적이 거의 없다.
    backId: back_fox_press_kit
    effects:
      - type: addPart
        partId: part_fox_press_kit
  - id: card_fox_rumor
    text: |
      조희수는 남의 추락을 가장 잘 파는 기자로 통한다.

      잘난 얼굴이 무너지는 순간 외에는 별 관심을 보이지 않던 그가
      후원선수 복귀 기자간담회에 따라온 것을 두고,
      기자들 사이에서는 의아하다는 말이 돌았다.
    publicRevealDisabled: true
    backId: back_fox_rumor
    effects:
      - type: addPart
        partId: part_fox_rumor
  - id: card_rubber_hose
    text: |
      [전체공개 후 추가조사]

      고무호스가 길게 말려 있다.
      펼치면 길이가 약 5m, 직경은 2.3cm이고, 물기가 묻어 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rubber-hose.png'
    imageAlt: '물기가 남은 고무호스'
    backId: back_rubber_hose
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_rubber_hose
  - id: card_towel_bin
    text: |
      [전체공개 후 추가조사]

      축축한 수건들이 담겨 있어서 그런지 내부에 물기가 맺혀 있다.
      입구의 지름은 45cm, 높이 약 50cm다.
    backId: back_towel_bin
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_towel_bin
  - id: card_medical_desk_photo
    text: |
      덜 닫혀 있는 간이책상의 맨 아래 서랍을 열자 이상한 철판 하나와 빈 봉투 몇 개, 그리고 다음과 같은 폴라로이드 사진이 발견되었다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/past-killing-photo.png'
    imageAlt: '구겨진 폴라로이드 사진'
    backId: back_medical_desk_photo
    effects:
      - type: addPart
        partId: part_past_killing_photo
  - id: card_medical_desk_records
    text: |
      맨 아래 서랍의 더 안쪽에서 윤유성과 윤슬의 수치가 나란히 적힌 "건강기록 비교 발췌" 자료가 발견되었다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/liver-compatibility.png'
    imageAlt: '윤유성과 윤슬의 건강기록 비교 발췌 자료'
    backId: back_medical_desk_records
    effects:
      - type: addPart
        partId: part_liver_compatibility
  - id: card_siphon_guide
    text: |
      [전체공개 후 추가조사]

      큰 통의 액체를 작은 용기에 옮길 때는, 튜브 안을 먼저 액체로 채운 뒤 낮은 쪽 용기로 내리라고 적혀 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/siphon-guide.png'
    imageAlt: '원액 리필 요령 안내문'
    backId: back_siphon_guide
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_siphon_guide
  - id: card_child_tank_waterline
    text: |
      [전체공개 후 추가조사]

      수조 벽면에 크기가 적혀있다. 6m × 3m, 높이 50cm다.
      약 3cm의 물이 차있고, 벽면에 젖은 자국을 보니 물이 줄거나 늘어나지는 않은 것 같다.
    backId: back_child_tank_waterline
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_child_tank_waterline
  - id: card_adult_tank_specs
    text: |
      [전체공개 후 추가조사]

      옆면 표기는 6m × 10m, 높이 120cm다.
      사건 직후 물은 거의 없고 벽면에 젖은 자국이 없는 걸 보니 물은 원래 비어 있던 게 맞는 것 같다.
    backId: back_adult_tank_specs
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_adult_tank_specs
  - id: card_glass_scratches
    text: |
      통유리 외벽 한쪽에 살짝 금이 가 있다.
    backId: back_glass_scratches
    effects:
      - type: addPart
        partId: part_glass_scratches
  - id: card_dragon_king_rumor_1
    text: |
      용왕이 이름을 알린 뒤 가난한 자들도 병원 진단을 받을 수 있게 되었다.
      굶는 아이들이 줄어들어, 용왕은 세간에서 구세주로 불린다.
    publicRevealDisabled: true
    backId: back_dragon_king_rumor_1
    effects:
      - type: addPart
        partId: part_dragon_king_rumor_1
  - id: card_dragon_king_rumor_2
    text: |
      10년쯤 전부터 용왕이 아프다는 소문이 돌었다.
      용왕이 업무를 돌보지 못하게 되니, 길거리에는 다시 굶는 아이들이 늘어나기 시작했다.
    publicRevealDisabled: true
    backId: back_dragon_king_rumor_2
    effects:
      - type: addPart
        partId: part_dragon_king_rumor_2
  - id: card_dragon_palace_island_rumor
    text: |
      용궁섬은 밖으로 나가려면 선착장 배편을 이용해야 한다.

      다만 섬 안에서 사망자가 나오거나, 태풍·해일 같은 자연재해가 발생하면 선착장 배편이 한동안 멈춘다는 말이 있다.
    publicRevealDisabled: true
    backId: back_dragon_palace_island_rumor
    effects:
      - type: addPart
        partId: part_dragon_palace_island_rumor
  - id: card_wet_shoeprints
    text: |
      재활수조실 바닥 곳곳에 젖은 구두 자국이 흐리게 남아 있다.
      발자국은 문턱을 지나 ㄱ자로 꺾이는 복도까지 이어지지만, 이후 흔적은 기자들과 직원들의 발자국에 뭉개져 있다.
      지금 딱딱한 구두굽을 신고 있는 사람은 없다. 윤유성·서기준은 운동화, 조희수는 낮은 단화, 한다정은 고무 밑창의 낮은 외출화를 신고 있다.
    backId: back_wet_shoeprints
    effects:
      - type: addPart
        partId: part_wet_shoeprints
  - id: card_start_wife_pact
    text: |
      저도 당신과 마주친걸 숨길테니까, 당신도 저와 마주친걸 비밀로 해줘요. 당신이 절 의심하지않는다면 저도 당신과 마주친걸 비밀로 할게요
  - id: card_locked_wife_accuses_fox
    text: |
      제가 봤어요! 비품 정리실에서 마주쳤는데 여우가 재활수조실쪽을 보며 품 속에 손을 넣은채 살기를 띄고있었어요!!

finalVote:
  question: '거북 오완주를 최종적으로 죽인 인물은 누구인가?'
  correctRoleId: jara
  correctOptionId: jara
  options:
    - id: rabbit_husband
      label: '남편토끼 윤유성'
      optionType: role
      roleId: rabbit_husband
    - id: fox
      label: '여우 조희수'
      optionType: role
      roleId: fox
    - id: jara
      label: '자라 서기준'
      optionType: role
      roleId: jara
    - id: wife_npc
      label: '아내토끼 한다정'
      optionType: npc
    - id: none
      label: '범인 없음'
      optionType: none

endingChoices:
  - id: fox_headline
    roleId: fox
    label: '여우 조희수'
    description: |
      최종 지목은 자라 서기준에게 향했습니다.

      서기준의 이름을 제목에 올리면, 진짜 살인자를 정확히 겨냥하는 기사가 됩니다.
      오완주를 죽인 사람은 서기준이니까요.

      하지만 조희수는 압니다.
      서기준에게 가장 소중한 이름은 자기 이름이 아니라 용왕입니다.

      용왕의 이름까지 제목에 올리면, 서기준에게 가장 큰 고통을 돌려줄 수 있습니다.
      조희수가 소중한 사람을 잃었던 것처럼, 서기준도 자신이 가장 아끼는 이름을 잃게 될 테니까요.

      문제는 그 기사가 완전히 공정하지 않을 수 있다는 점입니다.
      용왕은 세상에 많은 공헌을 했습니다.
      그리고 오늘 밤 직접 오완주를 죽인 사람은 용왕이 아니라 서기준입니다.

      복수를 위해 용왕의 이름을 제목에 올릴 것인가.
      아니면 살인자인 자라의 이름에서 멈출 것인가.

      누구의 이름을 기사 제목에 올리겠습니까?
    opensWhen:
      finalVoteMatched: true
      finalVoteOptionId: jara
    options:
      - id: accuse_dragon_king
        label: '용왕의 이름까지 기사에 올린다'
      - id: accuse_jara_only
        label: '서기준의 이름에서 멈춘다'
  - id: rabbit_delivery
    roleId: rabbit_husband
    label: '남편토끼 윤유성'
    description: |
      최종 지목은 자라 서기준에게 향했습니다.
      오완주를 죽인 사람은 서기준입니다.

      그 사실은 오늘 밤의 기사로 남을 것입니다.

      하지만 윤유성에게는 다른 기록도 남아 있습니다.

      오완주의 자필 고백문.

      그 안에는 오래전 선발전 직전,
      오완주가 윤유성의 물병에 수면유도제를 넣었다는 사실이 적혀 있습니다.

      고백문을 공개하면, 윤유성의 패배는 바로잡힙니다.
      오완주의 승리도 부정한 승리로 다시 쓰입니다.

      그것은 공정합니다.

      하지만 봉투 안에는 다른 기록도 들어 있습니다.

      XX어린이병원 후원회가 발급한 ‘오완주기금’ 접수 확인서.

      오완주는 용궁섬에 오기 전,
      그 승리로 얻은 경기 수익과 광고 수익 전액을
      형편이 어려운 중증 어린이 환자의 수술비와 치료비로 지정 기부했습니다.

      동시에 오완주의 부정한 승리와 그 돈으로 만든 오완주기금도 세상의 심판대 위에 오릅니다.
      기금은 아직 집행 전입니다.
      고백문이 공개되면, 그 돈은 환수와 위약금 정산에 묶여 아이들에게 닿기 전에 취소될 수 있습니다.

      윤유성은 압니다.

      보류.
      재심사.
      동결.

      그 말들이 아이의 시간보다 얼마나 느린지.

      부정한 승리를 바로잡을 것인가.
      부정한 승리에서 나온 돈으로 아이들의 시간을 살릴 것인가.

      고백문을 어떻게 남기겠습니까?
    opensWhen:
      finalVoteMatched: true
      finalVoteOptionId: jara
    options:
      - id: publish_confession
        label: '고백문을 공개해 부정한 승리를 바로잡는다'
      - id: keep_for_family
        label: '고백문을 접어 두고 오완주기금이 쓰이게 둔다'

endbook:
  title: '토끼와 거북이'
  evidenceQna:
    title: '판단근거 Q&A'
    description: '단서 칩을 누르면 실제 게임에서 사용한 원본 단서를 다시 확인할 수 있습니다.'
    items:
      - id: qna_death_method
        question: '오완주는 어떻게 죽었나?'
        answer: |
          프롤로그 지문을 보면 재활수조실은 단수 상태였고, 「어린이용 수조」와 「성인용 수조」를 보면 현장에 깊은 물은 없었다. 하지만 「세탁실에 붙어있는 안내문」대로 높낮이를 활용하면 어린이용 수조의 얕은 물도 아래로 옮길 수 있고, 「파란통」 내부가 젖어 있었다는 점에서 물받는 용도로 쓰였음을 추정할 수 있다. 마찬가지로 「호스」도 젖어 있었고 「젖은 구두 자국」이 남아 있으므로, 누군가 물을 옮겨 오완주의 얼굴을 일시적으로 잠기게 한 뒤 현장을 정리했다고 볼 수 있다.
        evidenceRefs:
          - id: prologue_water_cutoff
            sourceType: public_script
            stepId: INTRO
            label: '프롤로그'
            sourceName: '지문 · 프롤로그'
            excerpt: |
              그날 재활수조실은 단수 상태였다. 한쪽 수조에는 3cm 남짓한 물만 남아 있었고, 다른 한쪽 수조는 비어 있었다.
            inference: |
              현장에 새 물이 들어오지 않았고, 깊은 물이 남아 있지 않았다는 출발점이다.
          - id: child_tank
            sourceType: investigation_card
            cardId: card_child_tank_waterline
            label: '어린이용 수조'
            sourceName: '조사 카드 · 어린이용 수조'
            excerpt: |
              수조 벽면에 크기가 적혀있다. 6m × 3m, 높이 50cm다. 약 3cm의 물이 차있고, 벽면에 젖은 자국을 보니 물이 줄거나 늘어나지는 않은 것 같다.
            inference: |
              물은 얕지만 넓게 남아 있어, 다른 용기에 옮기면 일시적으로 사용할 수 있는 양이 된다.
          - id: adult_tank
            sourceType: investigation_card
            cardId: card_adult_tank_specs
            label: '성인용 수조'
            sourceName: '조사 카드 · 성인용 수조'
            excerpt: |
              옆면 표기는 6m × 10m, 높이 120cm다. 사건 직후 물은 거의 없고 벽면에 젖은 자국이 없는 걸 보니 물은 원래 비어 있던 게 맞는 것 같다.
            inference: |
              오완주가 성인용 수조에 빠진 것이 아니라, 별도로 옮긴 물이 쓰였다는 방향으로 좁힌다.
          - id: siphon_guide
            sourceType: investigation_card
            cardId: card_siphon_guide
            label: '세탁실에 붙어있는 안내문'
            sourceName: '조사 카드 · 세탁실에 붙어있는 안내문'
            excerpt: |
              큰 통의 액체를 작은 용기에 옮길 때는, 튜브 안을 먼저 액체로 채운 뒤 낮은 쪽 용기로 내리라고 적혀 있다.
            inference: |
              수조와 용기의 높낮이를 이용해 전기나 수도 없이 물을 옮기는 방법을 제시한다.
          - id: towel_bin
            sourceType: investigation_card
            cardId: card_towel_bin
            label: '파란통'
            sourceName: '조사 카드 · 파란통'
            excerpt: |
              축축한 수건들이 담겨 있어서 그런지 내부에 물기가 맺혀 있다. 입구의 지름은 45cm, 높이 약 50cm다.
            inference: |
              통 내부가 젖어 있어 수건 회수뿐 아니라 물받이로 쓰였다고 볼 수 있다.
          - id: rubber_hose
            sourceType: investigation_card
            cardId: card_rubber_hose
            label: '호스'
            sourceName: '조사 카드 · 호스'
            excerpt: |
              고무호스가 길게 말려 있다. 펼치면 길이가 약 5m, 직경은 2.3cm이고, 물기가 묻어 있다.
            inference: |
              물이 묻은 긴 호스는 어린이용 수조의 물을 파란통으로 옮기는 도구로 연결된다.
          - id: wet_shoeprints
            sourceType: investigation_card
            cardId: card_wet_shoeprints
            label: '젖은 구두 자국'
            sourceName: '조사 카드 · 젖은 구두 자국'
            excerpt: |
              재활수조실 바닥 곳곳에 젖은 구두 자국이 흐리게 남아 있다. 발자국은 문턱을 지나 ㄱ자로 꺾이는 복도까지 이어진다.
            inference: |
              물을 옮기거나 처리한 사람이 현장에서 움직였고, 그 흔적이 구두 자국으로 남았다.
      - id: qna_yuseong_drug_not_killer
        question: '윤유성은 왜 최종 살해자가 아닌가?'
        answer: |
          최종 사망 원인은 윤유성이 먹인 약이 아니라, 「젖은 구두 자국」으로 남은 물 처리 동선이다. 조희수 룰지에서는 서기준을 따라나선 뒤, 방금 서기준이 사라진 방향에서 딱딱한 구두 소리를 듣는다. 그런데 「젖은 구두 자국」 카드의 현재 신발 확인에서는 서기준이 운동화를 신고 있어 그 소리가 날 수 없다. 이어 「의료동 입구 신발장 1/2」의 젖은 구두와 사라진 환자 운동화는 누군가 젖은 구두를 숨기고 운동화로 갈아 신었다는 뜻이다. 「의료동에 대한 소문2」에 따르면 본행사 전 조희수 방문 뒤 비명까지 의료동 출입자는 없었으므로, 젖은 구두는 비명 이후 의료동에 들어온 인물이 넣었어야 한다. 「1라운드 조사 전 지문」에서 그 동선을 가진 인물은 서기준이다. 먼저 사라졌던 윤유성이 의료동에서 신발을 갈아 신었다면 의료동 증언에 남아야 하므로, 윤유성은 최종 살해자에서 빠진다.
        evidenceRefs:
          - id: wet_shoeprints
            sourceType: investigation_card
            cardId: card_wet_shoeprints
            label: '젖은 구두 자국'
            sourceName: '조사 카드 · 젖은 구두 자국'
            excerpt: |
              재활수조실 바닥 곳곳에 젖은 구두 자국이 흐리게 남아 있다. 지금 딱딱한 구두굽을 신고 있는 사람은 없다. 윤유성·서기준은 운동화, 조희수는 낮은 단화, 한다정은 고무 밑창의 낮은 외출화를 신고 있다.
            inference: |
              최종 범행은 현재 신발이 아니라, 범행 당시 신었던 딱딱한 구두와 그 뒤의 신발 교체를 설명해야 한다.
          - id: fox_rule_footsteps
            sourceType: role_sheet
            roleId: fox
            label: '조희수'
            sourceName: '룰지 · 조희수'
            excerpt: |
              서기준은 강당 아래쪽 이중문 밖으로 나갔다. 나는 몇 걸음 늦게 따라 나섰다.

              그때 비품 정리실 안쪽 문 너머에서 발소리가 가까워졌다.

              딱.딱.딱.

              방금 서기준이 사라진 방향이었다.

              발소리는 문 앞을 지나쳤다. 곧 맞은편 어딘가에서 문이 열리는 듯한 둔한 소리가 났다.
            inference: |
              플레이어가 알 수 있는 구두 소리는 조희수가 따라간 서기준의 동선과 연결된다.
          - id: medical_shoe_cabinet_1
            sourceType: investigation_card
            cardId: card_medical_shoe_cabinet_1
            label: '의료동 입구 신발장 1'
            sourceName: '조사 카드 · 의료동 입구 신발장 1'
            excerpt: |
              의료동 입구 신발장 깊숙한 칸 안쪽에 젖은 구두 한 켤레가 놓여 있다.
            inference: |
              범행 때 젖은 구두가 의료동 신발장으로 옮겨졌다.
          - id: medical_shoe_cabinet_2
            sourceType: investigation_card
            cardId: card_medical_shoe_cabinet_2
            label: '의료동 입구 신발장 2'
            sourceName: '조사 카드 · 의료동 입구 신발장 2'
            excerpt: |
              병원 슬리퍼를 신은 환자 한 명이 의료동 입구에서 본인이 신고 왔던 운동화가 없어졌다고 말한다.
            inference: |
              젖은 구두를 숨긴 인물이 환자의 운동화로 갈아 신었다는 정황이다.
          - id: medical_wing_rumor_2
            sourceType: investigation_card
            cardId: card_medical_wing_rumor_2
            label: '의료동에 대한 소문2'
            sourceName: '조사 카드 · 의료동에 대한 소문2'
            excerpt: |
              본행사 전에 조희수가 서기준의 간이책상으로 와 대기하다가 본행사 직전에 돌아갔고, 그 뒤 조희수의 비명까지 네 명 중 출입자는 없었다.
            inference: |
              구두가 한참 전에 숨겨졌다면 아직 오완주가 살아 있던 시점이고, 비명 전 윤유성이 의료동에 다녀갔다는 증언도 없다.
          - id: round1_briefing
            sourceType: public_script
            stepId: ROUND1_BRIEFING
            label: '1라운드 조사 전 지문'
            sourceName: '지문 · 1라운드 조사 전 지문'
            excerpt: |
              서기준은 곧바로 직원들에게 재활수조실 앞 복도를 막고 윤유성을 찾아오라고 지시한 뒤, 의료동으로 뛰어가 의사들에게 상황을 전했습니다.
            inference: |
              비명 이후 의료동에 들어가 젖은 구두를 숨길 공개 동선을 가진 인물은 서기준이다.
      - id: qna_heesu_target
        question: '조희수의 주사기는 누구를 노린 것인가?'
        answer: |
          「조희수 소지품 1」은 그가 진정제와 주사기를 가지고 있었음을 보여주지만, 「의료동 간이책상 1」과 조희수 룰지를 보면 그 분노의 대상은 오완주가 아니라 서기준이었다. 조희수 룰지에서 그는 비품 정리실에 숨어 서기준을 기다렸고, 발소리가 문 앞을 지나 재활수조실 쪽으로 가자 계속 주사기를 쥔 채 기다린다. 따라서 주사기는 오완주 살해도구가 아니라 서기준을 노린 준비물로 보는 것이 맞다.
        evidenceRefs:
          - id: syringe_trace
            sourceType: investigation_card
            cardId: card_syringe_trace
            label: '조희수 소지품 1'
            sourceName: '조사 카드 · 조희수 소지품 1'
            excerpt: |
              조희수의 품 속에서 손수건에 감긴 일회용 주사기와 빈 약병이 함께 나왔다. 주사기 안에는 투명한 액체가 차 있다. 약병 라벨에는 "진정제"라고 적혀 있고, 병에는 피가 조금 묻어 있다.
            inference: |
              조희수가 약물을 준비했다는 사실은 맞지만, 대상은 별도로 확인해야 한다.
          - id: medical_desk_photo
            sourceType: investigation_card
            cardId: card_medical_desk_photo
            label: '의료동 간이책상 1'
            sourceName: '조사 카드 · 의료동 간이책상 1'
            excerpt: |
              덜 닫혀 있는 간이책상의 맨 아래 서랍을 열자 이상한 철판 하나와 빈 봉투 몇 개, 그리고 폴라로이드 사진이 발견되었다.
            inference: |
              조희수가 의료동에서 서기준의 과거와 정바른 사건을 확인하는 단서로 이어진다.
          - id: fox_rule_motive
            sourceType: role_sheet
            roleId: fox
            label: '조희수'
            sourceName: '룰지 · 조희수'
            excerpt: |
              나는 앞서 넘긴 보고서 하단의 이름을 보았다.

              서기준.

              책상 아래 열린 검은 의료 가방이 보였다. 작은 약병들, 일회용 주사기, 알코올솜이 가지런히 들어 있었다. 나는 진정제라고 적힌 약병 하나와 주사기 하나를 손수건에 감아 품에 넣었다.
            inference: |
              주사기를 챙긴 동기는 오완주가 아니라 서기준에게 향한다.
          - id: fox_rule_waiting
            sourceType: role_sheet
            roleId: fox
            label: '조희수'
            sourceName: '룰지 · 조희수'
            excerpt: |
              나는 선반 뒤에서 약물이 든 주사기를 쥔 채 기다렸다.

              하지만 비품 정리실 안쪽 문고리는 움직이지 않았다.

              발소리는 문 앞을 지나쳤다. 곧 맞은편 어딘가에서 문이 열리는 듯한 둔한 소리가 났다.
            inference: |
              조희수는 서기준을 찌르려 기다렸지만, 재활수조실로 들어간 사람은 따로 있었다.
      - id: qna_culprit_route
        question: '왜 최종 범인은 서기준으로 좁혀지는가?'
        answer: |
          「젖은 구두 자국」은 물을 다룬 사람이 딱딱한 구두굽을 신었음을 말하지만, 현재 네 사람 중 그런 신발을 신고 있는 사람은 없었다. 조희수 룰지에서는 그가 서기준을 따라나선 직후 방금 서기준이 사라진 방향에서 딱딱한 발소리를 듣는다. 여기에 「의료동 입구 신발장 1/2」의 젖은 구두와 사라진 환자 운동화를 합치면, 범인은 젖은 구두를 벗고 다른 신발로 갈아 신었다. 「의료동에 대한 소문2」상 비명 전 의료동 출입자는 없었고, 「1라운드 조사 전 지문」에서 비명 직후 의료동으로 간 인물은 서기준이다. 따라서 구두를 숨기고 운동화로 갈아 신을 동선은 서기준에게 좁혀진다.
        evidenceRefs:
          - id: wet_shoeprints
            sourceType: investigation_card
            cardId: card_wet_shoeprints
            label: '젖은 구두 자국'
            sourceName: '조사 카드 · 젖은 구두 자국'
            excerpt: |
              발자국은 재활수조실 문턱을 지나 ㄱ자로 꺾이는 복도까지 이어진다. 주변을 둘러봤지만 지금 딱딱한 구두굽을 신고 있는 사람은 없다.
            inference: |
              범행 당시의 신발과 현재 신발이 달라졌다는 점이 핵심이다.
          - id: medical_shoe_cabinet_1
            sourceType: investigation_card
            cardId: card_medical_shoe_cabinet_1
            label: '의료동 입구 신발장 1'
            sourceName: '조사 카드 · 의료동 입구 신발장 1'
            excerpt: |
              의료동 입구 신발장 깊숙한 칸 안쪽에 젖은 구두 한 켤레가 놓여 있다.
            inference: |
              젖은 구두를 숨긴 장소가 의료동 동선과 연결된다.
          - id: medical_shoe_cabinet_2
            sourceType: investigation_card
            cardId: card_medical_shoe_cabinet_2
            label: '의료동 입구 신발장 2'
            sourceName: '조사 카드 · 의료동 입구 신발장 2'
            excerpt: |
              병원 슬리퍼를 신은 환자 한 명이 의료동 입구에서 본인이 신고 왔던 운동화가 없어졌다고 말한다.
            inference: |
              젖은 구두를 벗은 뒤 다른 운동화로 갈아 신은 정황을 만든다.
          - id: round1_briefing
            sourceType: public_script
            stepId: ROUND1_BRIEFING
            label: '1라운드 조사 전 지문'
            sourceName: '지문 · 1라운드 조사 전 지문'
            excerpt: |
              서기준은 곧바로 직원들에게 재활수조실 앞 복도를 막고 윤유성을 찾아오라고 지시한 뒤, 의료동으로 뛰어가 의사들에게 상황을 전했습니다.
            inference: |
              서기준은 비명 직후 의료동으로 이동할 명분과 동선을 가진다.
          - id: medical_wing_rumor_2
            sourceType: investigation_card
            cardId: card_medical_wing_rumor_2
            label: '의료동에 대한 소문2'
            sourceName: '조사 카드 · 의료동에 대한 소문2'
            excerpt: |
              본행사 전에 조희수가 서기준의 간이책상으로 와 대기하다가 본행사 직전에 돌아갔고, 그 뒤 조희수의 비명까지 네 명 중 출입자는 없었다.
            inference: |
              윤유성이 먼저 사라졌더라도 비명 전 의료동에서 신발을 갈아 신은 동선은 증언과 맞지 않는다.
          - id: fox_rule_footsteps
            sourceType: role_sheet
            roleId: fox
            label: '조희수'
            sourceName: '룰지 · 조희수'
            excerpt: |
              그때 비품 정리실 안쪽 문 너머에서 발소리가 가까워졌다.

              딱.딱.딱.

              방금 서기준이 사라진 방향이었다.

              발소리는 문 앞을 지나쳤다. 곧 맞은편 어딘가에서 문이 열리는 듯한 둔한 소리가 났다.
            inference: |
              발소리의 인물은 비품 정리실에 들어온 것이 아니라 재활수조실로 향했다.
      - id: qna_jara_motive
        question: '서기준은 왜 이런 일을 벌였나?'
        answer: |
          「서기준의 소지품」에는 행사 뒤 의료동 일정과 회복 음료 확인 메모가 있고, 「의료동 간이책상 2」에는 윤유성과 윤슬의 건강기록 비교 자료가 있다. 여기에 「용왕에 대한 소문2」의 병환과 「용궁섬에 대한 소문」의 사망자 발생 시 배편 정지 조건을 합치면, 서기준은 윤유성을 섬과 의료동에 묶어 둘 필요가 있었다. 오완주가 죽으면 윤유성은 강한 용의자가 되므로, 살인은 윤유성을 움직이지 못하게 만드는 명분이 된다.
        evidenceRefs:
          - id: jara_belongings
            sourceType: investigation_card
            cardId: card_jara_belongings
            label: '서기준의 소지품'
            sourceName: '조사 카드 · 서기준의 소지품'
            excerpt: |
              행사 진행표 아래쪽에는 개인 메모처럼 보이는 작은 일정이 적혀 있다. "행사 종료 후 21:40 의료동 일정 / 회복 음료 확인"
            inference: |
              서기준이 행사 뒤 윤유성과 의료동을 엮는 일정을 따로 관리했음을 보여준다.
          - id: medical_desk_records
            sourceType: investigation_card
            cardId: card_medical_desk_records
            label: '의료동 간이책상 2'
            sourceName: '조사 카드 · 의료동 간이책상 2'
            excerpt: |
              맨 아래 서랍의 더 안쪽에서 윤유성과 윤슬의 수치가 나란히 적힌 "건강기록 비교 발췌" 자료가 발견되었다.
            inference: |
              윤유성과 윤슬의 건강기록 비교 자료는 윤유성을 의료동에 묶으려는 목적과 이어진다.
          - id: dragon_king_rumor_2
            sourceType: investigation_card
            cardId: card_dragon_king_rumor_2
            label: '용왕에 대한 소문2'
            sourceName: '조사 카드 · 용왕에 대한 소문2'
            excerpt: |
              10년쯤 전부터 용왕이 아프다는 소문이 돌었다. 용왕이 업무를 돌보지 못하게 되니, 길거리에는 다시 굶는 아이들이 늘어나기 시작했다.
            inference: |
              용왕의 병환은 서기준이 장기 이식과 의료동 계획을 서두를 이유가 된다.
          - id: dragon_palace_island_rumor
            sourceType: investigation_card
            cardId: card_dragon_palace_island_rumor
            label: '용궁섬에 대한 소문'
            sourceName: '조사 카드 · 용궁섬에 대한 소문'
            excerpt: |
              섬 안에서 사망자가 나오거나, 태풍·해일 같은 자연재해가 발생하면 선착장 배편이 한동안 멈춘다는 말이 있다.
            inference: |
              살인이 벌어지면 윤유성을 섬 밖으로 나가지 못하게 만드는 조건이 생긴다.
      - id: qna_wife_coverup
        question: '한다정의 행동은 무엇으로 봐야 하나?'
        answer: |
          「아내토끼 소지품 1」의 젖은 고무링과 「윤유성 소지품 1」의 빠진 고무패킹은 한다정이 남편의 흔적을 숨겼다는 쪽으로 이어진다. 한다정 룰지를 보면 그는 고무링을 보고 남편을 의심해 주머니에 넣고, 그 직후 다가오는 딱딱한 발소리와 조희수를 마주친다. 그래서 한다정의 행동은 증거 은닉이지, 젖은 「호스」·「파란통」·「젖은 구두 자국」으로 설명되는 최종 범행과는 분리된다.
        evidenceRefs:
          - id: rubber_ring
            sourceType: investigation_card
            cardId: card_rubber_ring
            label: '아내토끼 소지품 1'
            sourceName: '조사 카드 · 아내토끼 소지품 1'
            excerpt: |
              작고 하얀 고무링이 나왔다. 표면이 살짝 젖어 있고, 씁쓸한 냄새가 희미하게 난다.
            inference: |
              한다정이 숨긴 물건은 남편 보온병의 흔적이다.
          - id: black_thermos
            sourceType: investigation_card
            cardId: card_black_thermos
            label: '윤유성 소지품 1'
            sourceName: '조사 카드 · 윤유성 소지품 1'
            excerpt: |
              보온병에 고무패킹이 빠져 있다. 보온병 안쪽에는 씁쓸한 냄새가 희미하게 남아 있다.
            inference: |
              고무링이 윤유성의 보온병에서 빠졌다는 연결을 만든다.
          - id: wife_rule_coverup
            sourceType: role_sheet
            roleId: wife_npc
            label: '한다정'
            sourceName: '룰지 · 한다정'
            excerpt: |
              그때 수조 턱 아래, 젖은 타일 위에 하얀 고무링 하나가 보였다.

              남편 보온병 마개 안쪽에서 본 적 있는 것이었다.

              나는 몸을 낮춰 하얀 고무링을 집었다. 손끝에 물기가 묻었다.

              나는 손에 쥔 하얀 고무링을 주머니에 밀어 넣고 곧바로 맞은편 비품 정리실로 들어가 문을 조용히 당겨 닫았다.
            inference: |
              한다정의 핵심 행동은 남편을 보호하려는 증거 은닉이다.
          - id: method_traces
            sourceType: investigation_card
            cardId: card_wet_shoeprints
            label: '젖은 구두 자국'
            sourceName: '조사 카드 · 젖은 구두 자국'
            excerpt: |
              재활수조실 바닥 곳곳에 젖은 구두 자국이 흐리게 남아 있고, 지금 딱딱한 구두굽을 신고 있는 사람은 없다.
            inference: |
              최종 범행은 한다정의 고무링 은닉보다 뒤의 구두 동선과 연결된다.
      - id: qna_not_accident
        question: '왜 단순 약물사고나 범인 없음이 아닌가?'
        answer: |
          「사체」에는 압박흔 없이 약 냄새가 남아 약물 사고처럼 보일 여지가 있지만, 「호스」와 「파란통」이 모두 젖어 있고 「세탁실에 붙어있는 안내문」은 물을 낮은 곳으로 옮기는 방법을 설명한다. 여기에 「젖은 구두 자국」까지 남아 있으므로, 누군가 물을 옮겨 쓰고 직접 현장에 들어왔다는 행동이 따로 존재한다. 따라서 단순 약물사고나 범인 없음은 물을 옮긴 흔적을 설명하지 못한다.
        evidenceRefs:
          - id: turtle_body
            sourceType: investigation_card
            cardId: card_turtle_body
            label: '사체'
            sourceName: '조사 카드 · 사체'
            excerpt: |
              입과 코 주변에 섬유 자국이나 강한 압박흔은 없다. 입가 가까이에서는 희미하게 씁쓸한 약 냄새가 난다.
            inference: |
              약물 정황은 있지만, 이 단서만으로 사인을 끝낼 수는 없다.
          - id: rubber_hose
            sourceType: investigation_card
            cardId: card_rubber_hose
            label: '호스'
            sourceName: '조사 카드 · 호스'
            excerpt: |
              고무호스가 길게 말려 있다. 펼치면 길이가 약 5m, 직경은 2.3cm이고, 물기가 묻어 있다.
            inference: |
              물을 옮기는 도구가 실제로 젖은 상태로 남아 있다.
          - id: towel_bin
            sourceType: investigation_card
            cardId: card_towel_bin
            label: '파란통'
            sourceName: '조사 카드 · 파란통'
            excerpt: |
              축축한 수건들이 담겨 있어서 그런지 내부에 물기가 맺혀 있다. 입구의 지름은 45cm, 높이 약 50cm다.
            inference: |
              물을 받아 임시로 담는 용도로 쓰였다는 흔적이다.
          - id: siphon_guide
            sourceType: investigation_card
            cardId: card_siphon_guide
            label: '세탁실에 붙어있는 안내문'
            sourceName: '조사 카드 · 세탁실에 붙어있는 안내문'
            excerpt: |
              튜브 안을 먼저 액체로 채운 뒤 낮은 쪽 용기로 내리라고 적혀 있다.
            inference: |
              얕은 수조의 물을 파란통으로 옮길 수 있는 방법을 설명한다.
          - id: wet_shoeprints
            sourceType: investigation_card
            cardId: card_wet_shoeprints
            label: '젖은 구두 자국'
            sourceName: '조사 카드 · 젖은 구두 자국'
            excerpt: |
              재활수조실 바닥 곳곳에 젖은 구두 자국이 흐리게 남아 있다.
            inference: |
              누군가 직접 물을 다룬 뒤 현장을 걸어 나갔다는 행동 흔적이다.
  sections:
    - id: misvote_rabbit_husband
      when:
        finalVoteMatched: false
        finalVoteOptionId: rabbit_husband
      body: |
        윤유성이 범인으로 지목됐다.

        “말이 돼? 내가 죽였으면 왜 돌아와!”

        윤유성이 앞으로 튀어나가자 한다정이 그의 팔을 붙잡았다.

        “그만해. 지금 말 잘못하면 끝이야.”

        윤유성은 손을 뿌리치려다 멈췄다.
        숨만 거칠게 새었다.
        조희수는 시선을 피했고,
        서기준은 직원들을 향해 고개를 돌렸다.

        “우선 윤유성 선수부터 붙잡아 두세요.”

        윤유성이 다시 소리쳤다.

        “오완주는 살아 있었다고!”

        서기준이 한 걸음 물러서자,
        직원들이 윤유성의 양팔을 잡았다.
    - id: misvote_fox
      when:
        finalVoteMatched: false
        finalVoteOptionId: fox
      body: |
        조희수가 범인으로 지목됐다.

        조희수는 바로 말을 받지 못했다.
        복도에 몰린 기자들이 먼저 그의 이름을 불렀다.
        카메라가 올라가고,
        플래시가 얼굴을 쳤다.

        그는 손으로 렌즈를 밀어냈다.

        “찍지 마. 아직 아무것도 확인 안 됐잖아.”

        누군가 다시 이름을 불렀다.
        이번엔 더 크게.

        조희수는 이를 악물고 서기준 쪽을 가리켰다.

        “저쪽부터 확인해.”

        그러나 플래시는 멈추지 않았다.
        직원들이 그의 팔을 붙잡았다.
        조희수의 말보다 이름이 먼저 복도에 퍼졌다.
    - id: misvote_wife_npc
      when:
        finalVoteMatched: false
        finalVoteOptionId: wife_npc
      body: |
        한다정이 범인으로 지목됐다.

        윤유성이 먼저 앞으로 나서려 했다.

        “다정이는 아니야.”

        한다정이 그의 팔을 잡아 세웠다.
        그리고 주머니에서 하얀 고무링을 꺼냈다.

        “제가 챙겼어요. 그게 다예요.”

        카메라가 들리고,
        기자들이 이름을 불렀다.
        윤유성이 다시 움직이자 한다정이 고개를 저었다.

        “당신은 가만히 있어.”

        서기준이 직원들을 불렀다.
        한다정은 윤유성을 한번 쳐다본 뒤 직원들을 따라갔다.
    - id: misvote_none
      when:
        finalVoteMatched: false
        finalVoteOptionId: none
      body: |
        타살이 아니라고 결론이 났다.

        “이걸 사고로 넘긴다고?”

        조희수가 먼저 소리를 냈다.
        윤유성은 보온병을 쥔 채 말이 없었고,
        한다정은 그의 팔을 붙잡았다.
        서기준이 의무팀 쪽으로 고개를 돌렸다.

        “사인은 확인 절차를 거치겠습니다.
        현장은 닫겠습니다.”

        직원들이 재활수조실 문 앞을 막았다.
        기자들의 질문이 한꺼번에 쏟아졌지만,
        지목된 이름은 없었다.
        오완주의 몸은 들것으로 옮겨졌다.
    - id: misvote_common
      title: '문이 닫힌 뒤'
      when:
        finalVoteMatched: false
      body: |
        그러나 오완주의 마지막 숨을 끊은 사람은 따로 있었다.

        자라 서기준은 그날 밤에도 정중했다.
        그는 재활수조실 문을 닫고,
        취재진을 복도 밖에 세웠다.

        사건이 종결됐다는 말이 나왔지만,
        현장은 아직 그의 손안에 있었다.
        오완주는 죽었고,
        윤유성은 아직 그 자리에 있었다.

        서기준은 윤유성을 따로 불러 세웠다.
        아직 진술이 남아 있다며,
        속을 가라앉히라고 작은 병 하나를 건넸다.
        선수들에게 흔히 주는 회복 음료라고 했다.

        윤유성은 뚜껑을 열었다.
        서기준은 그가 끝까지 마시는 것을 지켜보았다.

        얼마 지나지 않아 윤유성은 복부를 움켜쥐었다.
        숨이 흐트러지고,
        얼굴에서 핏기가 빠졌다.

        서기준은 가장 먼저 의사들을 불렀다.
        그의 목소리는 흐트러지지 않았다.

        이미 한 선수가 죽은 밤이었다.
        또 다른 선수가 쓰러지자,
        누구도 의료동으로 가는 길을 막지 못했다.

        그렇게 윤유성은 의료동으로 실려 갔다.
        응급 처치가 이어졌고,
        복부에는 작은 절개선이 남았다.

        며칠 뒤 윤유성은 병실에서 일어났다.
        담당 의사는 운이 좋았다고 말했다.
        기자들은 그 말을 그대로 받아 적었다.

        같은 무렵 용왕도 다시 병실 창가에 오래 앉을 수 있게 됐다.
        닫히려던 접수창구가 열렸고,
        무료 병상 명단에는 새 이름들이 올라갔다.
        급식소의 솥에는 다시 죽이 끓었다.
        섬 밖 환자들은 다시 용왕재단의 배를 기다렸다.

        오완주의 죽음은 단일 범행으로 닫혔다.
        윤유성의 상처는 응급 처치의 흔적으로 남았다.

        퇴원 전날 밤, 서기준은 윤유성의 병실에 들렀다.
        윤유성은 잠들어 있었다.

        서기준은 침대 곁에 서서 고개를 숙였다.
        아무 말도 하지 않았다.

        한참 뒤 그가 고개를 들었을 때,
        얼굴에는 평소의 정중함만 남아 있지 않았다.

        미안함인지, 안도인지, 피로인지 알 수 없는 것이
        아주 잠깐 스쳤다.

        그리고 서기준은 문을 닫았다.
        소리가 나지 않게.
    - id: fox_accuse_jara_only
      title: '서기준의 이름에서 멈춘 기사'
      when:
        finalVoteMatched: true
        finalVoteOptionId: jara
        choices:
          fox_headline: accuse_jara_only
      body: |
        조희수는 용왕의 이름을 제목에 올릴 수 있었다.

        그러면 서기준은 무너질 것이다.
        감옥보다 더 아프게.
        그가 평생 받들던 이름이 기사 속에서 조롱당하는 걸 보게 될 테니까.

        조희수는 그걸 원했다.

        품 안에는 주사기가 있었다.
        서기준에게 쓰려고 가져온 진정제였다.

        서기준을 쓰러뜨리고, 용왕의 이름을 제목에 올리고 싶었다.
        자신이 정바른을 잃었을 때 느꼈던 것을, 서기준도 똑같이 느끼게 만들고 싶었다.

        하지만 그 다음이 보였다.

        용왕에게 치료받은 사람들.
        용왕재단의 후원으로 살아남은 아이들.
        그 이름을 믿고 버틴 가족들.

        그들은 조희수를 미워하게 될 것이다.
        조희수가 서기준을 미워했던 것처럼.

        복수는 끝나는 게 아니라, 대상을 바꿔 계속 이어질 뿐이었다.

        조희수는 주사기를 바닥에 던졌다.
        유리관이 깨지는 소리는 작았다.

        그렇게 작게, 오래 붙들고 있던 복수 하나가 끊어졌다.

        조희수는 용왕의 이름을 지웠다.
        그리고 잘 팔리는 제목이 아니라, 정직한 제목을 남겼다.

        「용왕재단 실무자 서기준, 후원 행사 중 선수 살해」

        서기준을 용서한 것은 아니었다.
        그럴 수는 없었다.

        다만 그날 조희수는 알았다.
        정바른의 복수라는 말로, 또 다른 누군가의 복수를 만들어서는 안 된다는 것을.

        그가 먼저 찾아가야 할 사람은 서기준이 아니었다.
        윤유성이었다.
    - id: fox_accuse_dragon_king
      title: '용왕의 이름을 무너뜨린 기사'
      when:
        finalVoteMatched: true
        finalVoteOptionId: jara
        choices:
          fox_headline: accuse_dragon_king
      body: |
        서기준은 끌려가면서도 얼굴을 비웠다. 수갑 찬 손목이 붙들렸고, 턱은 끝까지 내려오지 않았다.

        그 얼굴이 복도 끝에서 사라진 뒤, 조희수는 기사 작성 화면을 열었다. 내 친구 정바른은 서기준의 손에 죽었다. 감옥은 그의 몸만 가둘 뿐이었다.

        조희수는 제목 맨 앞에 용왕의 이름을 박았다.

        용왕재단 무료치료, 용왕 간 이식 후보 찾는 데 쓰였다.

        기사는 짧았다. 용왕재단이 가난한 환자들의 진료 기록을 모았고, 그 기록을 바탕으로 윤유성의 간을 용왕에게 가져갈 계획을 세웠다는 내용이었다. 무료 치료는 미끼가 됐다. 무료 병상은 덫이 됐다. 눈꺼풀도 들지 못하고 누워 있던 용왕은, 가난한 몸에서 자신에게 맞는 간을 훔치려던 파렴치한으로 추락했다.

        대중은 제목을 믿었다. 병상 순번을 기다리던 계정들이 기사를 퍼 날랐다. 공짜 치료에는 다 이유가 있었다는 말이 퍼졌다. 가난한 이들의 구원자였던 용왕은 하루마다 더러운 이름이 되었다.

        구치소 안에서 서기준은 아무것도 할 수 없었다. 용왕의 병실에 갈 수 없었다. 취재진 앞에 설 수 없었다. 그 명단이 빼앗을 순서가 아니라 살릴 순서였다고 말할 수도 없었다. 전화는 정해진 시간이 끝나면 끊겼다. 면회는 밀렸다. 정정 요청은 접수됐다는 말만 돌아왔다.

        처음엔 대중을 향해 소리쳤다.

        “너희가 누구 돈으로 수술방에 들어갔는데.”

        텔레비전에서 용왕의 이름이 조롱될 때마다 철문을 걷어찼다.

        “너희가 누구 밥을 먹고 살았는데.”

        그러다 어느 순간, 서기준의 목소리가 끊겼다.

        윤유성의 기록을 뒤진 건 자신의 손이었다.
        용왕의 간 옆에 윤유성의 이름을 놓은 것도 자신의 손이었다.
        용왕을 살리려고 만든 계획이, 용왕을 괴물로 만드는 제목이 되었다.

        그때부터 서기준은 대중에게 소리치지 않았다. 신문 속 제목만 긁었다. 용왕의 이름 옆에 붙은 간, 탐욕, 괴물을 손톱으로 파냈다. 잉크는 남았다. 손끝만 터졌다.

        가난한 환자들의 수술비를 열어 주던 이름은, 자기 수술 차례 앞에서 멈췄다. 시간이 흘러, 용왕은 죽었다.

        사망 기사가 들어온 밤, 서기준은 벽에 피로 이름을 쓰기 시작했다. 용왕이 살린 이름들이었다. 이름은 줄을 넘고, 모서리를 타고, 바닥 가까이까지 내려왔다. 벽은 살아난 생명들로 빼곡해졌다.

        그 가운데 저주가 섞였다.

        너희는 그 이름으로 먹었다.
        너희는 그 이름으로 살았다.
        이제 그 이름을 묻었으니, 굶고 앓아라.

        새벽 점호 때, 서기준은 목을 맨 채 발견됐다. 품 안에는 용왕의 이름만 뜯어낸 기사 조각이 접혀 있었다. 벽 한가운데에는 마지막 혈서가 말라 가고 있었다.
    - id: rabbit_keep_for_family
      title: '연결 결말: 잠든 토끼의 눈'
      when:
        finalVoteMatched: true
        finalVoteOptionId: jara
        choices:
          rabbit_delivery: keep_for_family
      body: |
        윤유성은 오완주의 고백문을 접어 두었습니다.
        오완주기금은 예정대로 집행 절차에 들어갔습니다.

        오완주의 경기 수익과 광고 수익은 XX어린이병원 후원회 계좌로 넘어갔고, 수술비와 치료비를 마련하지 못하던 중증 어린이 환자들이 지원 대상으로 확정되었습니다.

        수술비 지원 승인.
        입원 절차 안내.
        보호자 동의서 접수.

        접수 창구 앞에서 보호자들이 서류를 끌어안고 기다렸습니다.
        누군가는 볼펜을 두 손으로 쥐고 아이의 이름을 적었고, 누군가는 접수증을 받아 들고 한동안 움직이지 못했습니다.
        아이들의 시간은 도장 소리를 지나, 겨우 다음 문턱으로 넘어갔습니다.

        첫 지원이 결정된 뒤, 병원은 감사의 뜻으로 짧은 동화책 한 권을 만들었습니다.
        후원자의 이름을 아이들에게 설명하기 위한, 병동용 작은 책이었습니다.

        제목은 《토끼와 거북이》.

        빠르게 달리다 결승선 앞에서 잠든 토끼와,
        느려도 끝까지 걸어 결승선에 닿은 거북의 이야기였습니다.

        책은 병원 로비와 소아 병동에 놓였습니다.
        아이들은 잠든 토끼 그림을 보고 웃었고, 보호자들은 오완주기금 현판 앞에서 연신 감사하다고 말했습니다.

        윤유성은 접수 창구 옆 복도에 서 있다가, 누군가 책을 읽어 주는 목소리를 들었습니다.

        “봤지? 토끼처럼 자만하면 안 돼.
        끝까지 가는 거북이가 돼야지.”

        윤유성은 웃는 아이들 쪽을 보지 못했습니다.

        그날 오후, 출전 신청서는 반려되었습니다.
        작은 육상 교실의 강사 면접도 취소되었습니다.

        반려 사유는 짧았습니다.

        대회 이미지 부적합.

        그날 밤, 윤유성은 오완주의 고백문 봉투와 병원 안내문을 함께 펼쳤습니다.
        안내문을 끝까지 읽자, 맨 아래 접히는 선에 걸쳐 작은 글씨가 붙어 있었습니다.

        기부금 출처에 관한 법적 분쟁 발생 시, 승인된 치료비 지원은 재검토 또는 보류될 수 있습니다.

        윤유성은 고백문을 다시 봉투 안에 넣었습니다.

        그 종이 한 장이 공개되는 순간,
        이미 찍힌 승인 도장 위로 보류라는 말이 다시 덧찍힐 터였습니다.

        며칠 뒤, 윤유성은 다시 병원 로비에 섰습니다.
        테이블 위에는 《토끼와 거북이》가 펼쳐져 있었습니다.

        잠든 토끼가 그려진 장이었습니다.

        아이들이 웃었습니다.
        윤유성도 웃었습니다.

        하, 하.

        처음엔 바람 빠지는 소리 같았습니다.
        곧 목 안쪽에서 긁히고, 부서지고, 다시 새어 나왔습니다.

        책 위로 물방울이 떨어졌습니다.

        한 방울.

        또 한 방울.

        물방울은 잠든 토끼의 눈가에 번졌습니다.
        토끼의 얼굴이 천천히 젖어 갔습니다.

        윤유성은 그제야 자기 턱 끝에서 눈물이 떨어지고 있다는 걸 알았습니다.
        그는 젖어 가는 토끼를 내려다보았습니다.

        잠든 얼굴은 아무 말도 하지 않았습니다.

        윤유성은 웃는 얼굴로 중얼거렸습니다.

        “됐어.
        이러면 된 거야.

        이름표가 뭐든……
        아이만 들어가면.

        수술방 문만 열리면.

        토끼는 자면 돼.
        그냥 계속.

        깨지만 않으면 돼.

        깨면……
        그 도장이 다시 보류가 되니까.”

        책은 계속 읽혔습니다.
        감사 편지는 현판 아래 쌓였습니다.

        오완주의 이름으로 아이들이 수술방에 들어갔습니다.
        윤유성의 출전 신청서는 매번 돌아왔습니다.

        현판은 병원 로비에서 닦일수록 또렷해졌고,
        고백문은 봉투 안에서 접힌 자국만 깊어졌습니다.

        윤슬에게 닿지 못한 시간이 다른 아이들에게 갔습니다.
        윤유성은 그것을 지켰습니다.

        끝내 자기 이름으로 불리지는 못한 채로.
    - id: rabbit_publish_confession
      title: '연결 결말: 다시 달리는 별똥별'
      when:
        finalVoteMatched: true
        finalVoteOptionId: jara
        choices:
          rabbit_delivery: publish_confession
      body: |
        윤유성은 오완주의 고백문을 공개했습니다.
        봉투 안에는 두 문장이 나란히 있었습니다.
        오완주가 선발전 직전 윤유성의 물병에 수면유도제를 넣었다는 자필 고백.
        그리고 XX어린이병원 후원회가 발급한 ‘오완주기금’ 접수 확인서.
        고백문이 공개되자, 오완주의 선발전 기록은 재조사에 들어갔습니다.
        오완주기금은 끝내 집행되지 못했습니다.
        기금은 취소되었고, 남은 돈은 환수와 위약금 정산 속으로 사라졌습니다.
        상대의 물병에 약을 타 얻은 메달에 기부 리본을 묶는다고 해서, 그 메달이 정당해지는 것은 아니었습니다.
        리본이 어디로 향할 예정이었는지보다 먼저,
        메달이 어떤 방식으로 걸렸는지를 따져야 했습니다.
        과정이 더럽혀졌다면, 목적이 선하다는 이유로 용서받을 수는 없는 법입니다.
        며칠 뒤, 오래된 기사들이 정정되었습니다.
        윤유성은 재능만 믿다 무너진 선수가 아니었습니다.
        오완주에게 무너뜨려진 선수였습니다.
        오완주의 이름 옆에는 부정 경기와 거짓 승리라는 문장이 붙었습니다.
        윤슬은 돌아오지 않았습니다.
        그날 닫힌 문도 다시 열리지 않았습니다.
        하지만 윤유성의 이름은 더 이상 몰락의 기록에 묶여 있지 않았습니다.
        복귀를 묻는 연락이 왔고, 오래전 그를 기억하던 사람들은 다시 그의 출발선을 보았습니다.
        윤유성은 첫 계약서에 직접 조건을 적어 넣었습니다.
        상금과 광고 수익 일부를, 아픈 아이들의 치료비로 지정 기부할 것.
        훔친 메달에 묶인 리본이 아니라,
        자기 발로 다시 얻은 이름에 묶는 리본이었습니다.
        밤이 깊어졌을 때, 윤유성은 하늘을 올려다보았습니다.
        아빠, 별똥별 같았어.
        그 목소리는 돌아오지 않았습니다.
        그래서 윤유성은 다시 달리기로 했습니다.
        윤슬에게는 끝내 늦었지만,
        다른 아이들에게는 늦지 않기를 바라며.
    - id: case_truth
      body: |
        사건의 전말

        서기준에게 용왕은 목숨을 걸 수 있는 이름이었다.

        용왕은 그를 거두었고, 굶는 아이들에게 밥을, 병든 이들에게 약과 병실을 가져다준 존재였다.

        용왕이 직접 명령한 것은 아니었다.

        하지만 서기준은 용왕을 살리는 일을 자기 임무로 받아들였다.

        용왕에게 맞는 간 일부를 줄 수 있는 적합자를 찾는 것도 그 일의 일부였다.

        10년 동안 비어 있던 기록에 처음 들어온 이름은 윤슬이었다.

        윤유성과 한다정의 딸 윤슬은 수술이 필요한 아이였다.

        서기준은 윤유성이 육상 국가대표 선발전에서 우승하면, 다음으로 비는 수술방 하나를 윤슬에게 돌리겠다고 약속했다.

        서기준에게 그 조건은 거의 확정된 보상처럼 보였다.

        윤유성은 빠른 선수였고, 상대는 거북 선수 오완주였다.

        그래서 서기준은 우승이라는 형식을 붙여도, 결국 윤슬에게 수술방을 줄 수 있을 거라고 계산했다.

        보상처럼 얻은 수술 기회라면 보호자들의 의심을 덜 받을 수 있었다.

        그 수술 안쪽에, 용왕에게 필요한 절차를 숨길 계획이었다.

        하지만 선발전 직전, 오완주는 윤유성의 물병에 수면유도제를 넣었다.

        윤유성은 쓰러졌고, 윤슬에게 갈 수 있었던 수술 기회도 사라졌다.

        뒤이어 공개 사과를 하면 다시 수술 빈자리를 주겠다는 제안도 있었지만, 방송 도중 윤슬은 숨을 놓았다.

        윤슬이 죽자 서기준은 분개했다.

        10년 만에 찾은 용왕의 적합자를, 자기 손에서 놓친 것 같았다.

        용왕에게 남은 날이 얼마나 되는지도 알 수 없었다.

        그때 떠오른 이름이 윤유성이었다.

        윤슬의 기록이 가능성을 보였다면, 아버지 윤유성의 기록도 확인해 볼 가치가 있었다.

        서기준은 윤유성의 건강기록을 확인했다.

        실제로 윤유성의 간 적합 가능성은 윤슬과 같은 방향을 가리키고 있었다.

        윤슬의 사망 이후, 윤유성은 잠을 이루기 위해 수면유도제를 지니고 다녔다.

        서기준은 윤유성을 후원선수 자격 재심사 명목으로 용궁섬에 불렀다.

        겉으로는 후원선수 복귀 기자간담회였다.

        하지만 서기준이 준비한 일정은 따로 있었다.

        행사가 끝나면 윤유성에게 회복 음료를 제공한다.

        그 음료를 마신 윤유성이 복통을 호소하며 쓰러진다.

        이번만큼은 적합자를 놓쳐선 안 됐다.

        조금 억지스럽더라도 복통을 이유로 윤유성을 의료동에 옮기고, 추가 검사를 명목으로 보호자와 분리한 뒤, 복부를 여는 수술까지 이어갈 계획이었다.

        그 안쪽에서 윤유성의 간 일부를 용왕에게 옮기려 했다.

        그날 밤 오완주는 윤유성을 불러 재활수조실로 갔다.

        그는 선발전 날 윤유성의 물병에 약을 탄 것이 자신이라고 고백했다.

        윤유성은 평소 지니고 다니던 수면유도제를 보온병에 탔다.

        오완주는 윤유성의 눈치를 살폈다.

        그리고 죄책감에 밀려 그 물을 마셨다.

        오완주는 쓰러졌다.

        윤유성은 그를 죽이려 했지만, 끝내 멈췄다.

        그는 오완주의 서류봉투와 보온병을 들고 재활수조실을 떠났다.

        그때 오완주는 아직 살아 있었다.

        한다정은 남편이 오완주를 따라 나간 뒤 돌아오지 않자, 해당 층을 하나씩 확인하기 시작했다.

        세탁실을 지나 비품 정리실 쪽으로 들어갔고, 그 끝에서 열린 재활수조실 문을 보았다.

        한다정은 쓰러진 오완주를 보았다.

        그 옆에는 남편 보온병에서 빠진 고무링이 있었다.

        남편이 오완주를 죽인 걸까.

        그 의심이 스쳤다.

        한다정은 고무링을 챙겼다.

        오완주가 살아 있는지 확인하려던 순간, 안쪽 복도에서 구두 소리가 들렸다.

        한다정은 확인하지 못한 채 비품 정리실 쪽으로 몸을 숨겼다.

        한다정이 숨을 고르기도 전에, 조희수가 비품 정리실로 들어왔다.

        조희수는 오완주를 죽이러 온 것이 아니었다.

        그가 품고 있던 주사기는 오완주가 아니라 서기준을 향한 것이었다.

        정바른은 조희수의 친구였다.

        조희수는 오래전 정바른이 가짜뉴스와 세상의 손가락질 때문에 스스로 목숨을 끊었다고 믿어 왔다.

        하지만 그날 의료동에서 정바른의 사진과 기록을 찾았다.

        정바른은 서기준에 의해 살해당했고, 자살한 것처럼 꾸며져 있었다.

        조희수는 비품 정리실에 숨어, 서기준이 들어오면 찌르려 했다.

        하지만 서기준은 재활수조실로 들어갔다.

        서기준은 아직 살아 있는 오완주를 보았다.

        윤유성은 사라졌고, 오완주가 들고 나갔던 서류봉투도 사라져 있었다.

        혹시라도 윤유성이 용궁섬 밖으로 나가면 끝이었다.

        서기준에게는 윤유성이 어디에 있든 붙들 명분이 필요했다.

        서기준에게 필요한 것은 쓰러진 오완주가 아니었다.

        죽은 오완주였다.

        오완주가 죽어야 윤유성을 살인 용의자로 지목하고, 직원을 시켜 다시 현장으로 데려올 수 있었다.

        재활수조실에는 물이 끊겨 있었다.

        어른용 수조는 비어 있었고, 어린이용 수조에만 얕은 물이 남아 있었다.

        그 수위로는 오완주를 익사시킬 수 없었다.

        그것은 사실이었다.

        하지만 사실이라고 해서, 진실은 아니다.

        얕은 물은 오완주를 죽일 수 없었다.

        낮은 곳으로 옮겨진 물만이 그럴 수 있었다.

        서기준은 파란 수거통 안의 젖은 수건들을 쏟아냈다.

        그리고 빈 수거통을 어른용 수조 안에 내려놓았다.

        어른용 수조는 어린이용 수조보다 깊었다.

        그 안쪽 바닥에 놓인 수거통은 어린이용 수조의 물보다 낮은 곳에 있었다.

        서기준은 오른쪽 구석에 말려 있던 고무호스를 끌어왔다.

        그리고 호스 전체를 어린이용 수조의 얕은 물에 담갔다.

        물이 너무 얕아 호스는 자꾸 떠올랐다.

        서기준은 구두를 신은 채 어린이용 수조 안으로 들어갔다.

        구두 앞코로 호스를 구간마다 눌러, 호스 안에 물이 차게 했다.

        찬물이 구두 앞코와 굽 안쪽으로 스며들었다.

        호스 안에 물이 차자, 서기준은 한쪽 끝을 손가락으로 막았다.

        다른 쪽 끝은 어린이용 수조의 물속에 둔 채였다.

        서기준은 손가락으로 막은 끝을 들고 수조 밖으로 나왔다.

        그리고 그 끝을 어른용 수조 안의 파란 수거통까지 낮춰 내렸다.

        손가락을 떼자 어린이용 수조의 물이 호스를 타고 파란 수거통으로 흘러내리기 시작했다.

        사이펀 현상이었다.

        높은 곳의 물이, 물이 채워진 호스를 따라 낮은 곳으로 계속 내려가는 원리였다.

        수거통에 오완주의 얼굴이 잠길 만큼 물을 채운 뒤, 서기준은 그것을 오완주 앞으로 끌어왔다.

        그리고 오완주의 얼굴을 눌러 익사시켰다.

        그 뒤 오완주의 얼굴과 턱 밑의 물기를 닦았다.

        타일에 떨어진 물도 수건으로 훔쳤다.

        수거통에 남은 물과 호스 안의 물은 어린이용 수조 쪽으로 비웠다.

        호스는 다시 말아 두고, 파란 수거통에는 젖은 수건들을 되담았다.

        오완주의 자세도 처음 봤을 때와 비슷하게 돌려놓았다.

        하지만 젖은 구두 자국은 남았다.

        어린이용 수조 앞, 어른용 수조 가장자리, 파란 수거통을 옮긴 자리, 호스를 끌어온 길에 희미한 굽 자국이 찍혀 있었다.

        젖은 굽 자국은 시간이 지나면 흐려질 수 있었다.

        하지만 재활수조실에 오래 머무는 것은 더 큰 위험이었다.

        서기준은 더 머무르지 않고 재활수조실을 빠져나왔다.

        그 사이 비품 정리실에 숨어 있던 조희수는 문 너머에서 한동안 이어지는 소음만 들었다.

        강당의 박수와 마이크 소리가 섞여, 안쪽에서 무엇이 벌어지는지는 알 수 없었다.

        칠팔 분쯤 지나 소음이 잦아들고 발소리가 멀어지자, 조희수는 문을 열었다.

        재활수조실 안에는 오완주가 쓰러져 있었다.

        조희수의 눈에는 하나밖에 보이지 않았다.

        서기준이 지나간 자리의 시체였다.

        서기준이 ㄱ자로 꺾인 복도 안쪽으로 막 들어서려던 순간, 뒤쪽에서 조희수의 비명이 터졌다.

        기자들이 몰려오기 시작했다.

        서기준은 곧바로 직원들에게 재활수조실 앞을 막고 윤유성을 찾아오라고 지시한 뒤, 의료동으로 뛰어가 의사들에게 상황을 전했다.

        의료동 입구 신발장에는 환자 신발과 병원 슬리퍼가 섞여 있었다. 서기준은 그 틈 깊숙한 칸에 젖은 구두를 넣고, 진료를 보러 온 환자가 벗어 둔 운동화로 갈아 신었다.

        오래 머물 수는 없었다. 서기준은 의사들을 데리고 재활수조실 앞으로 돌아왔다.

        현장 안쪽 조사를 늦추기 위해서였다.

        의사들이 오완주의 상태를 확인하는 동안, 서기준은 재활수조실 바깥과 각자의 소지품을 먼저 확인하자고 말했다.

        서로의 동선과 소지품을 보게 만들면, 시선은 흩어진다.

        그 사이 재활수조실 안쪽의 젖은 굽 자국은 말라 갈 시간을 얻는다.

        완전히 사라지지 않아도 됐다.

        어느 정도 마르기만 해도 정확한 이동 경로는 흐려질 수 있었다.

        그날 오완주를 죽인 것은 서기준이었다.
