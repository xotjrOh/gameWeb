endbook:
  common: |
    오완주는 윤유성에게 과거 선발전 조작을 고백하려 했다. 윤유성은 분노했고, 수면유도제를 먹여 오완주를 쓰러뜨렸다. 여기까지는 사실이다.

    하지만 사실이라고 해서, 진실은 아니다. 윤유성이 떠난 뒤 오완주는 아직 살아 있었다. 그 상태를 본 서기준은 현장을 이용하기로 했다. 그는 고무호스로 얕은 재활수조의 물을 수건 회수용 파란통에 옮기고, 의식이 흐린 오완주의 얼굴을 물속에 눌러 익사시켰다. 이후 젖은 수건으로 얼굴과 바닥을 닦아 윤유성의 약물 범행처럼 보이게 만들었다.

    조희수는 주사기를 훔쳤고 한다정과 마주친 일을 숨겼다. 한다정은 고무링을 숨기고 여우를 의심했다. 두 사람의 거짓말은 사건을 흐렸지만, 최종 살해자는 아니었다.
  variantMatched: |
    최종 투표는 서기준에게 닿았다. 재단의 기록 뒤에 숨어 있던 마지막 손이 드러났다.
  variantNotMatched: |
    최종 투표는 서기준에게 닿지 못했다. 윤유성의 분노와 조희수의 주사기가 너무 선명했고, 진짜 살해 방식은 기록 속에 묻혔다.
  closingLine: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
