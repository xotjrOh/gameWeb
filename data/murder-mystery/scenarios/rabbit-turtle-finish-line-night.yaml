roles:
  - id: rabbit_husband
    displayName: "토끼남편"
    publicText: |
      국가대표 선발전에서 의문의 이상 증세로 쓰러진 뒤 추락한 육상선수다.
      윤슬의 아버지이자 복귀 특집 행사의 중심 인물이지만, 오늘 밤 누구보다 거북의 죽음 가까이에 있었던 사람으로도 의심받는다.
    secretText: |
      미디어가 비춘 것은 늘 내 재능이었다. 그 말을 가장 그럴듯한 문장으로 바꿔 쓰는 건 기자 여우였다. 여우가 한 번 제목을 뽑아내면 사람들은 그 문장 속 나를 진짜 나라고 믿었다. 그래서 사람들은 내가 원래부터 빠른 사람이라고만 기억한다. 타고난 선수, 재능만으로 박수를 받는 선수. 그런 말은 언제나 내 몸 바깥을 맴돌았다. 내가 기억하는 건 다른 것들이다. 해도 뜨기 전 훈련장 셔터를 올리던 손, 모두 돌아간 뒤 마지막으로 불을 끄고 나오던 발, 그 사이에서 몇 번이나 젖고 마른 운동화. 나는 늘 가장 먼저 나가 가장 늦게 돌아왔다. 그래야 했다. 내 딸 윤슬이 받을 수 있는 수술은 이미 한참 뒤까지 일정이 다 차 있었다. 다만 가끔 취소되거나 빈자리가 생겼고, 그 자리를 누구에게 먼저 줄지는 용왕재단이 사실상 정했다. 재단이 내민 조건은 이번 대표 선발전 우승이었다. 그 경기의 결과는 내 기록보다 중요했고, 내 명예보다 중요했고, 거의 내 목숨만큼 중요했다.

      내 딸은 대부분의 시간을 병실에서 보냈다. 담당 의사는 지금 상태로는 다음 빈자리가 생길 때까지 딸이 버틸 수 있을지 장담하기 어렵다고 했다. 아내는 그 말을 들은 뒤로 병실 의자에서 쪽잠을 자는 날이 더 많아졌다. 내가 갈 시간이 되면 딸은 꼭 창문 쪽으로 얼굴을 돌렸다. 몸을 조금만 일으켜도 숨이 차서 어깨가 들썩였지만, 그래도 먼저 창밖부터 봤다. 나는 딸을 조금이라도 빨리 보기 위해 늘 병원까지 달려와 창문을 향해 손을 흔들었다. 병실에 들어서면 딸은 금세 웃었다.

      “와, 아빠 별똥별만큼 빠르다. 아빠 달릴 때마다 소원 빌어야지. 히히.”

      나는 웃으며 받아 줬다.

      “우리 딸 소원 많이 빌라고 아빠가 더 열심히 달려야겠네.”

      내 아내는 옆에서 그 말을 조용히 들었다. 입가를 조금 올리다가도 딸이 기침을 하면 곧장 물컵부터 내밀었다. 딸은 늘 빨리 나아서 나와 달리기 시합을 하고 싶다고 말했다. 내 경기가 얼른 끝났으면 좋겠다고도 했다.

      대표 선발전 당일 아침, 경기장으로 가기 전에 병실에 잠깐 들르겠다고 했다. 딸이 일어나면 서운해할 것 같아서였다. 하지만 아내는 오늘은 그냥 가라고 했다. 이겨야 한다고. 그 말밖에는 할 수 없는 얼굴이었다. 그래서 나는 끝내 병실 대신 경기장으로 향했다.

      대표 선발전 출발 직전, 대기실은 늘 그렇듯 부산했다. 누군가는 신발끈을 다시 묶었고, 누군가는 어깨를 돌렸고, 나는 손에 잡히는 물병으로 목만 적셨다. 물맛이 조금 썼지만 그때는 대수롭지 않게 넘겼다. 호출이 들렸고, 나는 곧장 트랙으로 나갔다.

      경기가 시작되고 얼마 지나지 않아 몸이 이상해졌다. 다리가 갑자기 무거워졌다. 발밑의 트랙이 단단한 고무가 아니라 젖은 모래처럼 푹푹 꺼지는 느낌이었다. 시야가 흔들렸고 눈꺼풀이 자꾸 감겼다. 어제도 끝까지 연습한 탓이라고, 그래서 지금만 버티면 된다고, 나는 팔 안쪽을 세게 깨물었다. 이 경기에서는 절대 무너지면 안 됐다. 그런데도 결국 버티지 못했다. 나는 거의 기절하듯 트랙에 쓰러졌다.

      눈을 떴을 때는 이미 모든 게 끝난 뒤였다. 주변은 시끄러웠고, 누군가는 내 이름을 불렀고, 누군가는 내 어깨를 붙들었다. 하지만 패배라는 말이 귀에 들어오기 전에 먼저 떠오른 건 딸이었다. 나는 제대로 대답도 못 한 채 경기장을 빠져나왔다. 병원으로 가는 내내 심장은 먼저 달리는데 발이 그 속도를 따라오지 못하는 기분이었다.

      누구보다 빨랐던 내 걸음은 병실 앞에서만 느려졌다. 문까지 몇 걸음이 그날은 유난히 멀었다. 한참 뒤에야 문을 열자 딸이 넋이 나간 내 얼굴을 보더니 조용히 말했다.

      “오늘 아빠 달리기 대회 방송을 보고, 오늘은 아빠가 속상하지 않았으면 좋겠다고 소원을 빌었어.”

      그 말을 듣는 순간 나는 아이 얼굴을 똑바로 볼 수가 없었다. 내가 한 번 버티지 못한 대가로, 딸에게 돌아올 수도 있었던 빈자리 하나가 닫혀 버렸다는 생각이 들었다. 딸이 잠든 뒤에야 아내가 내 팔 안쪽을 보고 왜 그러냐고 물었다. 나는 경기 중에 자꾸 졸음이 쏟아져 정신 차리려고 깨물었다고 했다. 아내는 더 묻지 않았다. 나도 그때는 그렇게 믿으려 했다. 그날 이후 내게 패배는 경기 결과가 아니라, 딸에게 돌아올 수도 있었던 기회를 내가 놓친 일이었다.

      다음 날 기자 여우는 내가 왜 쓰러졌는지 묻지 않았다. 그는 제목부터 뽑았다.

      ‘재능만 믿던 스타의 몰락.’

      스타의 몰락이라. 딸은 내가 달릴 때마다 별똥별 같다고 웃었는데, 여우는 내가 떨어지는 모양까지 남보다 먼저 제목으로 붙였다. 나는 끝내 누군가의 소원을 들어 주는 별이 아니라, 한 줄 제목으로 오래 팔릴 추락만 남긴 셈이었다.

      사람들이 본 것은 내 쓰러진 몸이었고, 여우는 그 위에 가장 빠르게 팔릴 뜻을 덧씌웠다. 사람들은 그 문장을 믿었다. 용왕재단은 그 문장을 이용했다.

      한 달도 채 지나지 않아 용왕재단에서 다시 연락이 왔다. 용왕재단 실무자 자라는 만나자마자 대본부터 내밀었다. 그는 늘 한 박자 느리게 말했지만, 남의 선택지를 지울 때는 조금도 망설임이 없는 자였다. 말투는 부드러웠고 자세는 공손했지만, 수정할 수 있는 문장은 한 줄도 없었다.

      “대중에게는 거북을 무시해서 한숨 잤다고 알려질겁니다. 컨디션 관리 실패는 토끼 선수의 책임이니 입만 맞춰주시면됩니다. 너무 거만했다고 공개 사과만 해 주시면 됩니다. 저희도 저희가 밀던 스타가 탈락했으니 다른 스타라도 만들어야하지않겠습니까.
      대본대로만 해주시면 다음 수술 빈자리는 윤슬에게 돌리겠습니다.”

      대표 선발전에서 쓰러진 일에 대해 방송에서 사과하면, 선수로서는 더 잃을지 몰라도 대신 다음 빈자리를 딸에게 돌려주겠다는 말이었다. 역시 수술실 문과 배정표를 함께 쥔 용왕재단이었다. 감사해야 한다고 스스로를 다잡았다. 자라가 내민 대본을 통째로 외웠고, 혹시라도 흐트러질까 봐 휴대전화도 꺼 두었다. 자라는 방송 직전 내 휴대전화를 보관함에 넣으며, 집중하셔야 한다고 조용히 말했다. 이번만큼은 경기 때처럼 실수하고 싶지 않았다.

      방송은 생각보다 길었다. 준비한 문장을 틀리지 않으려는 데 온 신경을 쏟았다. 끝나고서야 휴대전화를 확인했는데 병원과 아내에게서 부재중 전화가 쏟아져 있었다. 아내가 남긴 마지막 문자는 짧았다.

      ‘딸 호흡이 또 가빠졌어. 끝나면 바로 와.’

      아니겠지, 아니어야 한다는 생각만 붙든 채 나는 그날만큼은 정말 별똥별처럼 병실로 달려갔다.

      하지만 내가 도착했을 때 딸은 이미 별이 되어 있었다.

      그제야 나는 알았다. 딸이 웃으며 말하던 별똥별은 소원을 들어 주는 별이 아니라, 이미 떨어지고 있는 별이었다. 딸은 끝까지 나를 보며 소원을 빌었을 텐데, 정작 그 아이 앞에 도착한 것은 기적이 아니라 너무 늦게 병실 문 앞에 떨어진 나 하나뿐이었다.

      아내는 딸이 마지막까지 방송 화면을 보며 나를 찾았다고 말했다. 그 말을 할 때도 아내는 울지 못했다. 너무 오래 병실에 앉아 있던 사람만이 낼 수 있는, 다 울고 난 뒤의 목소리였다. 그날 이후 나는 내가 딸을 두 번 놓쳤다고 믿으며 살아왔다.

      장례 뒤 우리 집은 밤마다 병실처럼 조용했다. 잠은 쉽게 오지 않았고, 잠이 들어도 금방 깼다. 새벽에 정신을 차리면 어느새 딸 가방을 안고 현관 앞에 서 있는 날이 있었다. 내가 언제 거기까지 걸어갔는지 기억나지 않았다. 문고리를 쥔 손을 떼지 못하고 있으면, 꼭 어디론가 늦고 있는 사람처럼 심장부터 먼저 뛰었다. 그럴 때마다 아내가 말없이 내 손을 문고리에서 떼어 침대까지 데려갔다. 낮에는 훈련장에 다녀와도 소파 끝에 걸터앉은 채 잠드는 날이 많았다. 같은 집에 있었지만 우리는 서로에게 쉽게 말을 붙이지 못했다. 그래도 완전히 등을 돌리지는 못했다. 서로가 딸의 마지막을 기억하고 있는 마지막 증인이었으니까.

      병원에서 처방받은 수면유도제는 몇 달 사이 외투 안주머니에서 빠지지 않는 물건이 됐다. 밤이 길어질 것 같으면 바로 꺼내 삼키는 버릇이 생겼다. 그때까지 나는 그 약을 그저 잠깐이라도 잠들게 해 주는 물건 정도로만 여겼다. 대표 선발전에서 무너진 것도, 그 뒤로 끌려가듯 방송에 앉아 있던 것도 결국은 다 내 탓이라고 믿고 있었으니까.

      몇 달 뒤, 용왕재단이 마련한 복귀 특집 행사가 용궁섬에서 열린다는 연락이 왔다. 여우는 가족 코멘트도 필요하다고 했고, 자라는 일정표를 보냈다. 나는 처음엔 초청장을 구겨 버렸다. 하지만 몇 달을 쉬는 사이 생활비는 빠듯해졌고, 이대로 아무 대답도 하지 않은 채 버틸 수도 없었다. 아내는 나를 혼자 보내고 싶지 않다며 함께 섬에 가겠다고 했다. 나는 그 말에 고맙다는 대답도 제대로 하지 못한 채, 결국 아내와 함께 용궁섬으로 향했다.

      토끼 - 당일의 기억

      용궁섬에 도착했을 때 여우는 행사 자료집 위 문장을 고치고 있었고, 자라는 일정표를 들고 사람들을 제자리로 밀어 넣고 있었다. 둘 다 여전했다. 한 사람은 남의 삶을 한 줄 제목으로 정리했고, 다른 한 사람은 정중한 말로 선택지를 없앴다. 그래도 그날 내가 끝내 시선을 피한 건 거북이었다. 그를 보고 있으면 대표 선발전보다 병실이 먼저 떠올랐다. 그래서 낮 동안 나는 가능하면 그와 눈도 마주치지 않으려 했다.

      해가 기울 무렵, 거북이 멀찍이서 나를 한 번 보고는 말없이 의료동 쪽 연결복도로 방향을 꺾었다. 그보다 조금 전 휴대전화에는 거북에게서 짧은 연락이 와 있었다.

      “대표 선발전 날 일에 대해 사과할 게 있어. 오늘은 꼭 말해야 할 것 같아.”

      그 문장을 읽는 순간 심장이 먼저 거칠어졌다. 대표 선발전 날 일로 거북이 나에게 사과할 게 있다면, 그건 그냥 패배에 대한 위로나 헛소리가 아닐 거라는 생각이 들었다. 본행사 시작이 가까웠지만 나는 결국 그 등을 따라갔다. 그 말을 듣고도 확인하지 않으면, 그날 이후 내 안에 엉켜 있던 모든 게 더 끔찍한 모양으로 남을 것 같았다.

      우리가 마주한 곳은 연결복도 맨 끝 재활수조실이었다. 물소리가 유난히 크게 들리는 곳이었다. 수조 옆 벤치 위에는 거북이 들고 온 듯한 두꺼운 서류봉투가 놓여 있었다. 거북은 내가 들어서자마자 오래 참고 있던 말을 꺼냈다.

      “대표 선발전 직전, 대기실에서 네가 집어 든 물병. 그거 내가 건드렸어.”

      그 말을 듣는 순간 경기장에서 잠을 깨려고 깨물었던 팔 안쪽이 다시 욱신거렸다. 나는 거의 반사적으로 거북의 멱살을 틀어쥐고 수조 옆 유리벽으로 밀어붙였다. 등이 부딪히는 둔한 소리가 났다. 그때 내 머릿속에 먼저 든 건 이 자를 어떻게 할지보다도, 어디까지였는지 전부 불게 만들어야 한다는 생각이었다. 내가 왜 무너졌는지, 그 뒤로 왜 그런 방송까지 해야 했는지, 재단이 어디까지 얽혀 있는지, 그걸 먼저 들어야 했다.

      “건드렸다는 게 무슨 뜻이야.”

      거북은 숨을 고르며 처음엔 나를 미디어로만 봤다고 했다. 여우가 써 낸 기사들과 인터뷰 조각들만 보고, 나는 재능만 믿고 달리는 선수라고 오해했다는 것이다. 그래서 노력하는 사람이 재능 있는 사람을 이기는 장면을 어떻게든 증명하고 싶었다고 했다. 그런데 아무리 뛰어도 내 기록에는 닿지 않았고, 그때부터는 분함보다 집착이 더 커졌다고 했다. 결국 내가 마실 물에 수면유도제를 탔다고 했다.

      나는 멱살 쥔 손에 힘을 더 주며 왜 이제 와서 이 말을 하느냐고 물었다. 거북은 벤치 위 서류봉투를 턱으로 가리켰다. 며칠 전 자라가 들고 다니던 서류철에서 우연히 내 자료를 봤고, 그제야 내가 누구보다 오래 훈련한 선수였다는 것과 그 경기에 딸에게 돌아갈 다음 빈자리가 걸려 있었다는 걸 알았다고 했다. 이번 발표회가 끝나면 용왕재단이 나를 의료동으로 옮겨 사실상 붙잡아 둘 생각이라는 것도 그 안에서 처음 봤다고 했다. 자기는 너무 늦게야 죄의 무게를 알았고, 그래서 오늘은 입으로라도 말하고 서류로라도 남기려고 했다고 했다. 지금이라도 섬을 떠나라고, 자기 때문에 늦어진 만큼 이 경고라도 믿어 달라고 했다.

      나는 그제야 멱살 쥔 손을 늦게 놓았다. 다 듣고 나자 오히려 더 조용해졌다. 내가 그날 트랙에서 무너진 것, 그 패배를 빌미로 거짓 사과 방송까지 한 것, 윤슬이 마지막까지 그 화면을 보고 있었다는 것. 그 모든 일 한가운데에 이 자의 손이 있었다는 사실이 이제는 핑계 없이 남아 있었다.

      외투 안주머니 속 약봉지가 손끝에 걸렸다. 요즘의 나는 어디를 가든 수면유도제를 몇 알씩 들고 다녔다. 밤을 또 새울 것 같으면 바로 삼키려고, 물이 든 보온병도 늘 함께 들고 다녔다. 거북은 내가 약봉지를 꺼내는 걸 분명히 봤다. 나는 일부러 숨기지 않았다. 그날 내 몸에서 힘이 빠져나가던 몇 분을, 이 자도 잠깐이라도 겪어 보게 하고 싶었다.

      나는 알약을 부숴 보온병에 털어 넣고 한 번 흔든 뒤 거북에게 내밀었다.

      “마셔.”

      거북의 시선이 약봉지와 내 얼굴 사이를 천천히 오갔다. 미안한 표정과 두려운 표정이 번갈아 스쳤다. 잠깐 멈칫하더니, 끝내 보온병을 받아 거의 한입에 들이켰다. 피할 수는 있지만 피하지 않겠다고 정한 사람의 얼굴이었다.

      몇 모금 넘긴 뒤에도 그는 한동안 더 떠들었다. 변명인지 고백인지 사과인지 경고인지 알 수 없는 말들을 섞어서. 그러다 목소리가 점점 낮아졌다. 고개가 한쪽으로 기울었고, 말끝이 흐려졌고, 결국 수조 턱에 기대듯 늘어졌다. 한 팔이 물 안으로 미끄러졌다.

      거북이 약기운에 늘어져 더는 제대로 말을 잇지 못하자, 그제야 다른 생각이 처음으로 스쳤다. 지금이라면 물속으로 밀어 넣을 수도 있었다. 방금 전까지는 이 자 입에서 끝까지 말을 뽑아내는 데만 매달려 있었다. 그런데 이제는 더 들을 말도 거의 남지 않았고, 윤슬에게 갈지도 몰랐던 시간을 끊어 낸 몸이 눈앞에 무방비하게 드러나 있었다.

      그때 재활수조실 유리 천장 너머로 별똥별 하나가 길게 떨어졌다.

      그 별을 보는 순간, 별이 된 딸이 나를 말리러 내려온 것 같았다.
      윤슬이 웃으며 하던 말이 떠올랐다. 아빠 달릴 때마다 소원 빌어야지. 그 아이가 끝까지 보던 건 쓰러진 선수였지, 의식을 잃은 몸을 물속에 누르는 아버지는 아니었다. 나는 그 선만큼은 넘지 못했다.

      서류봉투가 다시 눈에 들어왔다. 챙겨야 한다는 생각도 잠깐 들었다. 하지만 그때의 내게는 종이보다 내 손을 그 자리에서 떼어 내는 일이 먼저였다. 조금만 더 머물면 결국 손을 쓸 것 같았다. 나는 뚜껑도 닫지 못한 보온병을 수조 옆 벤치에 올려 둔 채 방을 나왔다. 문도 끝까지 닫지 않았다. 내가 재활수조실을 나설 때 거북은 분명히 살아 있었다. 느리고 얕았지만 숨은 붙어 있었다.

      복도로 나오자 주머니 안 휴대전화가 한 번 울렸다. 누구인지 확인하지 않았다. 그때는 아무 목소리도 들을 수 없을 것 같았다. 복도 끝에서는 단단한 구두 소리가 한 번 울린 것 같았지만, 나는 돌아보지 않았다. 돌아보면 거북을 죽이고 싶은 마음을 더 이상 억누르지 못할 것 같았다.
  - id: rabbit_wife
    displayName: "토끼아내"
    publicText: |
      윤슬의 어머니이자 토끼남편의 동행이다.
      병실과 대기 명단 사이에서 오래 버텨 온 사람으로, 행사장에서도 남편을 혼자 두지 않으려 했지만 결국 그 밤의 중요한 순간에 가장 먼저 봉투를 들고 빠져나갔다.
    secretText: |
      초등학교 교사였던 나는 병실에서 내 딸 윤슬과 하교놀이를 했다.

      딸은 작은 가방을 침대 밑에서 끌어와 바닥에 툭 내려놓고, 일부러 입을 삐죽 내밀었다.

      “엄마, 배고파.”
      “엄마, 가방 무거워.”
      “엄마, 나 숙제 하기 싫어.”

      그러면 나는 일부러 선생님처럼 말했다.

      “손부터 씻어.”
      “가방 그렇게 두지 마.”
      “그래도 숙제는 해야지.”

      딸은 그게 좋다고 했다.
      진짜 학교 다녀온 애처럼 굴어 보는 게 좋다고.
      그리고 꼭 마지막엔 물었다.

      “나 수술 끝나면 진짜 이렇게 해도 돼?”

      나는 매번 같은 대답을 했다.

      “그럼. 수술방만 비면.”

      그 말은 그때마다 거짓말이 아니었다.
      딸이 받아야 할 수술은 이미 정해져 있었고, 문제는 들어갈 자리가 없다는 것뿐이었다.
      수술 일정은 한참 뒤까지 차 있었고, 가끔 취소되거나 빈자리가 생기면 그 자리를 누구에게 먼저 줄지 용왕재단이 사실상 정했다.
      나는 그 빈자리 하나를 기다리며 살았다.

      기다리기만 한 건 아니다.
      병원 행정 직원을 붙잡고 매달린 적도 있고, 거절당하자 돈 봉투를 밀어 넣은 적도 있다.
      간호 스테이션에 대기 명단이 펼쳐져 있으면 순번을 외웠고, 화장실 가는 척 나왔다가 다시 돌아가 이름을 확인한 적도 있다.

      한 번은 딸보다 앞 순번이던 아이 보호자가 수술 동의서 봉투를 의자에 두고 잠깐 자리를 비운 틈을 탔다.
      나는 그 봉투를 들고 화장실 칸에 들어갔다.
      반나절만 늦어져도, 그 사이 빈자리가 생기면, 혹시 딸 쪽으로 돌 수 있다는 생각을 했다.

      봉투 겉면엔 아이가 그린 해가 붙어 있었다.
      나는 그걸 한참 들고 서 있다가 결국 제자리에 돌려놓았다.
      나오자마자 토했다.
      그런데도 다음 날이 되니 또 대기 명단을 들여다보고 있었다.

      국가대표 선발전을 준비하던 육상선수인 남편은 병실에 올 때마다 먼저 창문 아래로 달려왔다.
      딸은 숨이 차서 몸을 크게 일으키지도 못하면서, 늘 창문 쪽부터 봤다.
      남편이 손을 흔들면 그제야 웃었다.

      “와, 아빠 별똥별만큼 빠르다. 아빠 달릴 때마다 소원 빌어야지. 히히.”

      남편은 늘 웃으며 받아 줬다.

      “우리 딸 소원 많이 빌라고 아빠가 더 열심히 달려야겠네.”

      나는 그 말을 조용히 듣다가도, 딸이 기침을 하면 곧장 물컵부터 내밀었다.
      딸은 빨리 나아서 아빠랑 달리기 시합을 하고 싶다고 말했다.
      아빠 경기가 얼른 끝났으면 좋겠다고도 했다.
      사소한 말인데, 그래서 더 오래 남았다.

      그 무렵 용왕재단 실무자 자라가 찾아왔다.
      이번 대표 선발전에서 남편이 우승하면, 재단이 잡고 있는 다음 빈자리를 딸에게 먼저 돌리겠다는 말이었다.
      확정된 날짜는 아니었다. 그래도 그 말 외에는 붙들 게 없었다.

      대표 선발전 당일 아침, 남편은 경기장으로 가기 전에 병실에 들르겠다고 했다.
      딸이 일어나면 서운해할 거라고.

      나는 그걸 막았다.

      “오늘은 그냥 가. 이겨야 해.”

      그 말밖에는 할 수 없었다.

      그날 병실 TV 앞에서 딸은 유난히 말이 없었다. 남편이 마지막 곡선을 돌 때까지 입술만 꾹 다문 채 화면을 보고 있었다.
      결승선을 앞두고 화면 구석에서 남편 몸이 한 번 크게 기우는 게 스쳤다. 내가 자세히 보려는 순간, 중계는 곧장 선두권으로 넘어갔다. 다음 컷에는 이미 거북이 결승선을 먼저 끊고 있었고, 전광판에도 거북 이름이 떴다.
      딸은 그때서야 내 쪽을 한 번 봤다가 다시 화면으로 시선을 돌렸다. 남편이 어떻게 쓰러졌는지, 그 순간은 끝내 제대로 보지 못했다.
      그날 꺾인 게 기록만은 아니라는 걸, 병실 안에서도 알 수 있었다.
      우리가 붙들고 있던 빈자리 하나가 눈앞에서 멀어지는 느낌이었다.

      한참 뒤, 복도 쪽에서 급하게 뛰어온 숨소리가 들렸다가 문 앞에서 한 번 끊겼다.
      그리고 나서야 병실 문이 열렸다.

      남편이 들어오자 딸이 먼저 말했다.

      “오늘 아빠 달리기 대회 방송을 보고, 오늘은 아빠가 속상하지 않았으면 좋겠다고 소원을 빌었어.”

      그 말을 듣는 순간 병실 안이 잠깐 조용해졌다.
      누구도 바로 다음 말을 꺼내지 못했다.

      딸이 잠든 뒤에야 나는 남편 팔 안쪽을 봤다.
      피멍 위로 이빨 자국이 진하게 겹쳐 있었다.

      “그 팔은 왜 그래?”

      남편은 소매를 조금 끌어내리려다 말고 낮게 말했다.

      “경기 중에 자꾸 졸음이 쏟아졌어. 정신 차리려고 깨물었는데도 안 깨더라.”

      나는 그 말 앞에서 더 묻지 못했다.
      그때는 그냥, 무리했구나, 그 정도로만 생각했다.

      다음 날 기자 여우는 남편에게
      "재능만 믿던 스타의 몰락"
      이라는 제목을 붙였다.

      한 달도 채 되지 않아 자라는 다시 왔다.
      이번에는 공개 사과 방송만 해 주면, 다음으로 비는 자리가 생기는 즉시 딸에게 먼저 돌리겠다고 했다.

      자라의 제안은 달콤했다.
      그런데 ‘공개 사과’라는 말을 듣는 순간 입안이 썼다.
      남편이 왜 그날 그렇게 무너졌는지는 아무도 묻지 않는데, 사과부터 시키고 있었기 때문이다.
      이유는 접어 둔 채 먼저 고개를 숙이게 하는 방식이 싫었다.

      그래도 나는 끝내 강하게 막지 못했다.
      이미 나는 다른 아이 동의서 봉투까지 훔쳐 들었던 쪽이었다.
      병실 바깥에서 그렇게까지 해 놓고, 남편의 방송만 더럽다고 밀어낼 자신이 없었다.

      방송이 있던 날, 딸 호흡이 급격히 나빠졌다.
      나는 남편에게 문자를 쓰다가 처음엔 이렇게 적었다.

      딸 숨이 너무 가빠. 방송이고 뭐고 그만두고 지금 병실로 와.

      그 문장을 한참 보고 있었다.
      그런데 결국 지웠다.
      방송이 깨지면, 그나마 남아 있던 빈자리 하나도 완전히 끊길 것 같았다.

      그래서 다시 썼다.

      딸 호흡이 또 가빠졌어. 끝나면 바로 와.

      그날 딸은 죽었다.

      남편이 병실에 도착했을 때, 나는 딸이 마지막까지 방송 화면을 보며 아빠를 찾았다고 말했다.
      그 말만은 꼭 전해야 할 것 같았다.

      대신 끝내 못 한 말도 있다.

      딸은 마지막에 아주 작게 말했다.

      “엄마… 나 학교 못 갈 것 같아.”

      그 말은 남편에게 전하지 못했다.
      하교놀이를 아는 건 나뿐이었고, 그 말까지 꺼내면 내가 먼저 무너질 것 같았다.

      장례 뒤 우리 집은 밤마다 병실처럼 조용했다.

      새벽에 눈을 뜨면 남편이 딸 가방을 안고 현관 앞에 서 있는 날이 있었다.
      아직 데리러 가야 할 아이가 남아 있는 사람처럼 문고리를 쥐고, 잠결에 같은 말을 되풀이했다.

      “딸, 아빠 안 늦을게.”
      “미안해.”
      “조금만 기다려.”

      나는 그 손을 문고리에서 떼어 침대까지 데려왔다.
      그러고도 끝내, 딸이 마지막에 내게만 남긴 말을 남편에게 전하지 못했다.

      낮에는 훈련장에 다녀와도 소파 끝에 걸터앉은 채 잠들었고, 입술이 달싹일 때마다 들리는 건 딸 이름과 미안하다는 말뿐이었다.

      몇 달 뒤, 용왕재단이 마련한 남편의 복귀 특집 행사가 용궁섬에서 열린다는 연락이 왔다.
      여우는 가족 코멘트도 필요하다고 했고, 자라는 일정표를 보냈다.
      남편은 처음엔 초청장을 구겨 버리려 했지만 생활은 이미 빠듯했다.
      나는 그 사람을 혼자 보내고 싶지 않아 같이 섬으로 갔다.

      나는 그때까지도 대표 선발전 날과 방송 날을 우리 부부의 실패로만 알고 있었다.

      토끼 아내 - 당일 기억

      용궁섬에 도착했을 때 여우는 행사 자료집 위 문장을 고치고 있었고, 자라는 일정표를 들고 사람들을 제자리로 밀어 넣고 있었다.

      해가 기울 무렵, 나는 남편이 거북 뒤를 따라 의료동 쪽 연결복도로 꺾어 들어가는 걸 멀리서 봤다.
      본행사 시작이 가까워졌는데도 남편은 돌아오지 않았고, 전화도 받지 않았다.
      결국 나도 그쪽으로 갔다.

      연결복도 맨 끝 오른쪽이 재활수조실이었다.
      바로 맞은편이 청소도구와 수건 더미를 쌓아 둔 정리실이었고, 정리실 뒷벽에는 세탁실로 빠지는 폭 좁은 문이 하나 더 있었다.
      복도 한가운데서 두 방의 문이 정면으로 마주 보고 있는 구조였다.

      재활수조실 문은 반쯤 열려 있었다.
      거북은 수조 턱에 기대듯 늘어져 있었다.
      한 팔은 물에 잠겨 있었고, 눈은 감겨 있었다.
      처음엔 죽은 줄 알았다.

      가까이 가서 어깨를 흔들었지만 깨지 않았다.
      그래도 숨은 붙어 있었다. 느리고 얕았지만 분명히 쉬고 있었다.
      깊게 잠든 사람 같았다.

      수조 옆 벤치에는 뚜껑이 열린 보온병 하나와 두꺼운 서류봉투 하나가 놓여 있었다.
      봉투 맨 위에는 짧은 메모가 반쯤 삐져나와 있었다.

      나는 호출 버튼보다 먼저 그 봉투를 집어 들었다.

      그 순간 복도에서 발소리가 들렸다.

      나는 곧바로 맞은편 정리실로 들어가 문을 반쯤만 닫았다.
      문틈으로는 재활수조실 바닥과 문 앞, 그리고 수조 옆 벤치 다리 한쪽만 보였다.

      잠시 뒤 누군가 재활수조실 안으로 들어왔다.
      신발 끝만 보였다.
      그 사람은 거북에게 다가가기보다 먼저 벤치와 바닥을 급히 뒤졌다.
      보온병이 바닥을 한 번 굴렀다.

      낮게 혀를 차는 소리가 한 번 들렸다.
      그 뒤 발소리는 다시 복도 쪽으로 멀어졌다.

      나는 바로 나오지 못했다.
      그 봉투가 이미 내 가방 안에 들어 있었기 때문이다.

      정리실 뒷벽 문을 열면 바로 세탁실이 나왔고, 세탁실 왼쪽 끝이 비상계단이었다.
      나는 그 계단참까지 내려가고 나서야 봉투를 열었다.

      안에는 거북 자필 메모와 수면유도제 처방전 사본, 남편 이름이 적힌 의료동 이송 계획안이 들어 있었다.

      메모 첫 줄은 짧았다.

      대표선발전에서 유성이 진건 내 잘못이다.
      물병에 수면제를 탔다. 오늘 유성에게도 말할 계획이다.
      하지만 방송 뒤 계획은 내가 아니다.
      본행사 뒤 유성을 의료동으로 넘기는 문서가 돈다.

      그리고 맨 마지막 장에는 수술동 복도 CCTV 캡처가 있었다.
      다른 아이 동의서 봉투를 들고 화장실로 들어가는 내 모습이 찍혀 있었다.

      나는 한동안 그 종이를 쳐다보기만 했다.
      누군가는 남편을 데려가려 했고, 거북은 너무 늦게 그걸 알았고, 용왕재단은 이미 내가 어떤 사람이 될 수 있는지 알고 있었다.

      나는 먼저 남편에게 전화를 걸었다.
      받지 않았다.

      그때 객석 쪽에서 소란이 번졌다.
      잠시 뒤 거북이 재활수조실에서 발견됐다는 말이 들렸다.

      그날 내가 확실히 아는 건 세 가지다.

      내가 처음 재활수조실에 들어갔을 때, 거북은 살아 있었다.
      공식적으로 거북이 발견됐다는 소란이 번지기 전, 그 봉투는 이미 내 가방 안에 들어와 있었다.
      조금 전 재활수조실에 들어온 누군가가 거북보다 먼저 벤치와 바닥을 뒤지며 찾던 것도 바로 그 봉투였을 것이다.
      그래서 나중에라도 애초부터 내가 가지고 있던 서류였다고 둘러댈 수는 없었다. 그 봉투는 분명 그 방에 있었고, 내가 먼저 가져온 것이었다.
      그리고 거북이 숨 쉬고 있을 때 내가 먼저 손을 뻗은 건, 호출 버튼이 아니라 그 봉투였다.
  - id: jara
    displayName: "자라"
    publicText: |
      용왕재단 실무자다.
      느린 말투와 공손한 태도 뒤에서 일정, 대본, 수술 빈자리, 의료동 출입까지 관리하며 사람들의 선택지를 부드럽게 지워 왔다.
    secretText: |
      너는 용왕재단 실무자다. 대표 선발전 전후로 토끼남편 관련 문서와 윤슬 수술 대기 기록을 모두 손에 쥐고 있었다.
      대표 선발전이 끝난 뒤에는 토끼남편에게 공개 사과 방송 대본을 강요했고, 그 대가로 윤슬의 다음 수술 빈자리를 약속했다. 방송이 끝날 즈음 윤슬은 죽었다.

      너는 그 뒤에도 재단의 실무를 멈추지 않았다.
      복귀 특집 행사 직전, 토끼남편을 본행사 뒤 의료동으로 넘겨 사실상 붙잡아 두는 계획안과 토끼아내의 과거 CCTV 캡처까지 함께 관리했다.
      거북이 그 문서 일부를 봤을 가능성을 알아차렸을 때는 이미 늦었고, 늦었다는 사실 자체가 너를 더 조급하게 만들었다.

      DRAFT_TODO_AUTHOR:
      - 자라가 거북과 직접 어떤 대화를 나눴는지 확정할 것.
      - 자라가 재활수조실에 들어간 정확한 시각과 최종 살해 개입 여부를 확정할 것.
      - 봉투를 먼저 찾았다는 정황을 최종 canon으로 채택할지, 어떤 방식으로 드러낼지 확정할 것.

      현재 임시 플레이 가이드:
      - 봉투가 공개되면 가장 먼저 무너지는 쪽은 재단이고, 그 실무 책임자는 너다.
      - 의료동 출입과 행사 동선을 통제할 권한이 있었으므로, 누구보다 쉽게 현장에 접근할 수 있었다.
      - 토끼부부를 범인처럼 보이게 만들면 잠시 시간을 벌 수 있지만, 문서가 나오는 순간 모든 책임은 다시 너를 향한다.

      DRAFT_CANON_PENDING:
      현재 시스템상 최종 투표 정답은 자라로 설정되어 있다.
      최종 원고가 완성되면 이 역할지와 최종 정답, 엔딩 문구를 함께 교체해야 한다.
  - id: fox
    displayName: "여우"
    publicText: |
      복귀 행사의 기사와 연출을 맡은 기자다.
      가장 팔릴 문장을 가장 빨리 고르는 사람으로, 토끼남편의 추락을 오래 팔아 왔고 이번에도 그 서사를 포기하지 않으려 한다.
    secretText: |
      미디어가 진실보다 제목을 먼저 필요로 할 때, 네가 늘 앞줄에 섰다.
      대표 선발전 다음 날 너는 토끼남편에게 “재능만 믿던 스타의 몰락”이라는 제목을 붙였다. 그 문장은 사람들에게는 편했고, 거북의 오해와 집착을 부추기기에도 충분했다.

      복귀 특집 행사에서도 너는 가족 코멘트, 거북 인터뷰, 용왕재단 협찬 문구를 한 줄의 이야기로 묶으려 했다.
      남의 비극을 정리하는 일엔 익숙하지만, 그 비극을 만든 사람 중 하나가 자신일 수도 있다는 사실은 아직도 똑바로 보기 어렵다.

      DRAFT_TODO_AUTHOR:
      - 여우가 의료동 복도에 갔는지, 갔다면 어느 시각이었는지 확정할 것.
      - 여우가 봉투 존재를 언제 알았는지 확정할 것.
      - 최종 살해에 개입하지 않았다면 그 사실을 뒷받침할 자기만의 비공개 정보도 추가할 것.

      현재 임시 플레이 가이드:
      - 네 기사와 자막은 사람의 진짜 삶을 지워 버리고 보기 쉬운 프레임만 남겼다.
      - 진실이 드러나면 네 보도도 비판받겠지만, 동시에 너는 누구보다 빠르게 새로운 프레임을 만들 수 있다.
      - 토끼부부와 자라가 서로를 의심하게 만드는 동안, 네가 무엇을 알고 있었는지는 쉽게 묻히기 쉽다.

investigations:
  deliveryMode: auto
  depletionMode: global
  layout:
    sections:
      - id: island_locations
        title: "현장 동선"
        targetTypes: [location]
        order: 10
        icon: "📍"
      - id: case_files
        title: "문서와 기록"
        targetTypes: [item]
        order: 20
        icon: "📁"
      - id: people_accounts
        title: "관계자 진술"
        targetTypes: [character]
        order: 30
        icon: "👤"
  rounds:
    - round: 1
      targets:
        - id: loc_rehab_tank_room
          label: "재활수조실"
          targetType: location
          entityKey: rehab_tank_room
          sectionId: island_locations
          order: 10
          description: "거북이 발견된 현장. 수조, 벤치, 비상 호출 버튼이 그대로 남아 있다."
          cardPool:
            - card_rehab_thermos
            - card_rehab_emergency_button
            - card_rehab_bench_gap
            - card_rehab_waterline
        - id: loc_corridor_storage
          label: "연결복도와 정리실"
          targetType: location
          entityKey: corridor_storage
          sectionId: island_locations
          order: 20
          description: "재활수조실 맞은편 정리실과, 세탁실·비상계단으로 빠지는 우회 동선이 이어진다."
          cardPool:
            - card_corridor_layout
            - card_storage_towel_trace
            - card_laundry_fiber
            - card_hard_sole_trace
        - id: item_event_desk
          label: "행사 자료 데스크"
          targetType: item
          entityKey: event_desk
          sectionId: case_files
          order: 30
          description: "여우의 기사 자료와 자라의 행사 문건이 뒤섞인 임시 데스크."
          cardPool:
            - card_headline_archive
            - card_apology_script
            - card_turtle_message
            - card_program_schedule
    - round: 2
      targets:
        - id: item_medical_records
          label: "의료동 기록 보관함"
          targetType: item
          entityKey: medical_records
          sectionId: case_files
          order: 10
          description: "수면유도제 처방, 수술 대기, 이송 계획안까지 의료와 통제가 겹친 서류철."
          cardPool:
            - card_prescription_copy
            - card_transfer_plan
            - card_waitlist_note
            - card_yunsul_chart
        - id: item_security_logs
          label: "보안 로그와 CCTV 정리"
