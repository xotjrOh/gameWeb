id: rabbit-turtle-finish-line-night
type: murder_mystery
title: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
roomDisplayName: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
players:
  min: 3
  max: 3

rules:
  investigationsPerRound: 2
  noEliminationDuringGame: true
  partsAutoReveal: true
  partsPublicDetail: false

intro:
  readAloud: |
    프롤로그

    몇 달 전 패배로 후원이 끊겼던 토끼를 위해, 용왕재단은 후원 재개를 위한 기자간담회를 열었다.

    후원선수 복귀 기자간담회.

    오늘 저녁 본행사가 시작되고 얼마 지나지 않아, 재활수조실 방향에서 다급한 외침이 끼어들었다.

    거북 선수가 쓰러졌다고.

    그날 재활수조실은 단수 상태였다. 한쪽 수조에는 3cm 남짓한 물만 남아 있었고, 다른 한쪽 수조는 비어 있었다.

    그 사이의 타일 위에 거북은 쓰러져 있었다.

    몸을 돌려 확인해보니 핏자국도 없었다. 타박상도, 목을 조른 흔적도 없었다.

    그런데도 거북은 숨을 쉬지 않았다.

    죽은 것처럼 보이지 않는 시체.
    살해의 흔적 없는 현장.

    그 시간,
    강당을 벗어난건 넷.

    남은 질문은 하나였다.
    거북은 어떻게 죽었는가.

flow:
  steps:
    - id: INTRO
      label: '오프닝'
      kind: intro
      durationSec: 180
      enterAnnouncement: '용궁섬의 행사 조명이 꺼지고, 재활수조실의 밤이 열립니다.'
    - id: ROUND1_INVESTIGATE
      label: '1라운드 조사'
      kind: investigate
      round: 1
      durationSec: 420
      description: '재활수조실은 보존 촬영 전까지 출입 통제되었습니다. 지금 확인할 수 있는 것은 서로의 진술, 소지품, 행사 자료, 공개 동선뿐입니다.'
      enterAnnouncement: |
        재활수조실은 보존 촬영 전까지 출입 통제되었습니다. 지금 확인할 수 있는 것은 서로의 진술, 소지품, 행사 자료, 공개 동선뿐입니다.
        기자들은 강당에 남아 있고, 용왕재단은 곧 공식 설명을 요구받을 것입니다. 지금 누구의 말이 먼저 기사화되느냐가 사건의 첫 인상이 됩니다.
    - id: ROUND1_DISCUSS
      label: '1라운드 토론'
      kind: discuss
      round: 1
      durationSec: 600
      description: '현장 통제가 풀리기 전까지 각자의 말과 숨긴 행동을 맞춰 보세요. 누가 먼저 기사 제목이 될지 정하는 시간입니다.'
    - id: ROUND2_INVESTIGATE
      label: '2라운드 조사'
      kind: investigate
      round: 2
      durationSec: 420
      description: '초동 보존 촬영이 끝나 재활수조실과 비품 정리실의 제한적 재검토가 허가되었습니다. 현장의 물 흔적과 장비 기록을 직접 확인하세요.'
      enterAnnouncement: |
        초동 보존 촬영이 끝났습니다. 단수 원인 확인을 위해 재활수조실, 비품 정리실, 장비 보관 기록의 제한적 재검토가 허가되었습니다.
        하지만 기자단 브리핑 전까지 남은 시간은 한 번뿐입니다. 이 라운드가 끝나면 각자의 해명은 공식 발표 뒤로 밀려납니다.
    - id: ROUND2_DISCUSS
      label: '2라운드 토론'
      kind: discuss
      round: 2
      durationSec: 600
      description: '윤유성, 조희수, 서기준, 한다정의 거짓말과 실제 사망 원인을 분리하세요. 범인이 없다는 결론까지 포함해 최종 지목을 정리하세요.'
    - id: FINAL_VOTE
      label: '최종 투표'
      kind: final_vote
      durationSec: 300
      description: '거북 오완주를 최종적으로 죽인 인물을 지목하세요.'
      enterAnnouncement: '이제 기자단 앞 브리핑이 시작됩니다. 지금 선택한 결론이 용왕재단의 기록, 기사 제목, 각자의 남은 명분을 결정합니다.'
    - id: ENDBOOK
      label: '엔딩'
      kind: endbook
      enterAnnouncement: '엔딩 단계입니다. 최종 진실을 확인합니다.'

parts:
  - id: part_turtle_body
    name: '거북의 사체 상태'
    source: '재활수조실'
    note: '외상과 교살 흔적이 없고, 얕은 물만 남은 수조에서 발견됐다.'
  - id: part_rubber_ring
    name: '물기 있는 고무링'
    source: '재활수조실 배수구 근처'
    note: '윤유성의 보온병 마개와 맞는 젖은 고무링이다.'
  - id: part_rabbit_family
    name: '윤슬 수술 기록'
    source: '행사장 가족 사진'
    note: '윤유성이 거북에게 강한 원한을 품을 이유가 된다.'
  - id: part_scene_memo
    name: '검시/현장 메모'
    source: '재활수조실 초동 기록'
    note: '외상은 없고 현장 수위만으로는 사망 방식을 단정하기 어렵다.'
  - id: part_wife_route
    name: '아내토끼 동선과 고무링 은닉'
    source: '비품 정리실'
    note: '한다정이 재활수조실 쪽에 먼저 갔고, 젖은 고무링을 숨겼을 가능성이 있다.'
  - id: part_turtle_envelope
    name: '거북의 자필 고백'
    source: '서류봉투'
    note: '거북이 선발전에서 수면유도제를 사용했다는 고백이다.'
  - id: part_liver_compatibility
    name: '간 적합성 문서'
    source: '의료동 기록'
    note: '재단과 서기준이 윤유성을 섬에 붙잡아야 했던 이유다.'
  - id: part_barun_article
    name: '정바른 기사'
    source: '기사 스크랩'
    note: '조희수가 서기준을 의심하게 된 과거 사건이다.'
  - id: part_syringe_trace
    name: '의료동 주사기 반출 흔적'
    source: '의료동 약품함'
    note: '조희수가 숨긴 주사기와 진정제 절도 정황으로 이어진다.'
  - id: part_rubber_hose
    name: '고무호스의 물기'
    source: '재활수조실'
    note: '단수 중에도 이미 있던 물을 다른 곳으로 옮겼을 가능성을 보여준다.'
  - id: part_towel_bin
    name: '수건 회수용 파란통'
    source: '비품 정리실'
    note: '젖은 수건과 안쪽 물자국이 남아 있다.'
  - id: part_child_tank_waterline
    name: '어린이용 수조 물때'
    source: '재활수조실'
    note: '어린이용 수조의 물때가 현재 물높이와 맞아 큰 물 이동 흔적이 없다.'
  - id: part_adult_tank_specs
    name: '성인용 수조 규격과 수위'
    source: '시설 점검표'
    note: '성인용 수조는 운영 수심과 사건 당시 상태가 맞지 않는다.'
  - id: part_towel_bin_specs
    name: '파란 수건 수거통 규격'
    source: '비품 규격표'
    note: '작은 바닥 면적과 높은 물방울 위치가 물 이동 가능성을 만든다.'
  - id: part_glass_scratches
    name: '유리 외벽 곡선 긁힘'
    source: '성인용 수조 외벽'
    note: '젖은 고무나 링이 반복적으로 스친 듯한 곡선형 긁힌 자국이다.'
  - id: part_silicone_packing
    name: '투명 실리콘 패킹'
    source: '수조 하단 턱'
    note: '호스 고정 또는 틈 막이에 쓴 흔적으로 보인다.'
  - id: part_cleaning_notice
    name: '시설 청소 안내문'
    source: '재활수조실 벽면'
    note: '호스를 물로 채우면 높은 수조의 물이 낮은 통으로 흐른다는 관리 팁이다.'
  - id: part_equipment_log
    name: '출입/장비 기록 정리표'
    source: '의료동 기록 단말'
    note: '재활수조실, 비품 정리실, 장비 반납 누락이 관리 기록으로 연결된다.'
  - id: part_final_reconstruction
    name: '사망 장소 재검토 메모'
    source: '투표 전 정리'
    note: '수조와 수거통의 면적 차이가 실제 사망 장소를 다시 보게 한다.'
  - id: part_past_killing_photo
    name: '어두운 폴라로이드'
    source: '재단 보관 자료'
    note: '서기준이 과거에도 현장과 기록을 따로 다뤘음을 보여주는 단서다.'

roles:
