  - id: part_rabbit_family
    name: '토끼 가족 사진'
    source: '한다정의 소지품'
    note: '한다정이 가족을 지키려는 이유를 보여준다.'
  - id: part_liver_compatibility
    name: '간 적합성 문서'
    source: '서기준의 소지품'
    note: '재단과 서기준이 윤유성을 섬에 붙잡아야 했던 이유다.'
  - id: part_syringe_trace
    name: '투명한 액체가 든 주사기'
