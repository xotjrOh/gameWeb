endbook:
  common: |
    오완주는 윤유성에게 과거 선발전 조작을 고백하려 했다. 윤유성은 분노했고, 수면유도제를 먹여 오완주를 쓰러뜨렸다. 여기까지는 사실이다.

    하지만 사실이라고 해서, 진실은 아니다. 거북의 사체에는 물기가 없었고, 목을 조른 흔적이나 둔기로 맞은 외상도 없었다. 남은 것은 등껍질의 얕은 긁힘뿐이었다.

    어린이용 수조는 2m × 1m, 높이 50cm였다. 재활수조실은 단수였으니 그 물이 갑자기 줄거나 늘어난 것 같지는 않았다. 반대로 성인용 수조는 2m × 5m, 높이 120cm였고, 사건 직후에는 바닥 잔수만 남아 있었다.

    수건 회수용 파란통은 입구의 지름 45cm, 높이 약 50cm였다. 젖은 수건의 습기처럼 보였던 물기는, 좁은 통 안에 물이 머물렀던 흔적일 수도 있었다. 길이 약 5m의 고무호스는 어린이용 수조와 파란통을 현실적으로 이어 줄 수 있었다.

    호스 안을 물로 채운 뒤 낮은 쪽 끝을 내리면, 높은 곳에 있던 물은 단수 상태에서도 다른 용기로 흘러간다. 젖은 구두 자국은 어린이용 수조와 호스, 파란통 사이를 여러 번 오간 흔적이었다. 서기준은 그 방식을 이용해 수조의 물을 파란통으로 옮겼고, 아직 살아 있던 오완주의 호흡을 그곳에서 막았다. 이후 젖은 수건과 현장 정리로 윤유성의 약물 범행처럼 보이게 만들었다.

    조희수는 주사기를 숨겼고 한다정은 고무링을 숨겼다. 윤유성은 쓰러뜨릴 만큼의 동기와 행동이 있었지만 마지막 사망 순간까지 책임지지는 않았다. 건강기록 비교 발췌와 구겨진 폴라로이드는, 현장과 사람을 목적에 맞게 다뤄 온 손을 서기준 쪽으로 좁힌다.
  variantMatched: |
    최종 투표는 서기준에게 닿았다. 재단의 기록 뒤에 숨어 있던 마지막 손이 드러났다.
  variantNotMatched: |
    최종 투표는 서기준에게 닿지 못했다. 윤유성의 분노와 조희수의 주사기가 너무 선명했고, 진짜 살해 방식은 기록 속에 묻혔다.
  voteVariants:
    rabbit_husband: |
      최종 투표는 윤유성에게 향했다. 그는 오완주를 쓰러뜨릴 만큼의 분노와 행동이 있었지만, 마지막 숨을 끊은 손은 아니었다.
    fox: |
      최종 투표는 조희수에게 향했다. 그녀의 주사기는 살의를 증명했지만, 오완주의 죽음 자체를 설명하지는 못했다.
    jara: |
      최종 투표는 서기준에게 닿았다. 재단의 기록 뒤에 숨어 있던 마지막 손이 드러났다.
    wife_npc: |
      최종 투표는 한다정에게 향했다. 그녀는 고무링을 숨겼지만, 그것은 남편을 감싸려는 행동에 가까웠고 실제 살해 방식에는 닿지 못했다.
    none: |
      최종 투표는 범인 없음으로 모였다. 그러나 이 죽음은 사고가 아니었다. 누군가는 현장을 알고, 물을 옮기고, 마지막 호흡을 막았다.
    tie: |
      최종 투표는 한 사람에게 모이지 않았다. 각자의 거짓말이 너무 선명했고, 진짜 살해 방식은 끝내 흔들리는 결론 속에 남았다.
  secretGoalResults:
    - id: fox_hidden_from_jara
      label: '여우의 저의'
      roleId: fox
      guesserRoleId: jara
      targetRoleId: fox
      successWhen: notCorrect
      successText: |
        조희수의 저의는 서기준에게 끝내 정확히 읽히지 않았다. 그가 방심하는 순간, 그녀에게는 아직 한 번의 기회가 남았다.
      failureText: |
        서기준은 조희수의 저의를 알아차렸다. 그녀의 주사기는 더 이상 기습이 아니라 경계해야 할 증거가 되었다.
    - id: jara_hidden_from_rabbit
      label: '자라의 간 탈취 계획'
      roleId: jara
      guesserRoleId: rabbit_husband
      targetRoleId: jara
      successWhen: notCorrect
      successText: |
        윤유성은 서기준의 간 탈취 계획을 끝까지 정확히 붙잡지 못했다. 서기준에게는 아직 응급 처치라는 이름으로 윤유성을 눕힐 길이 남아 있었다.
      failureText: |
        윤유성은 서기준의 간 탈취 계획을 알아차렸다. 서기준의 의료적 명분은 더 이상 보호막이 되지 못했다.
  closingLine: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
