      body: |
        토끼가 거북에게 약을 먹인 것은 사실이었다.
        여우가 주사기를 품은 것도 사실이었다.
        자라가 오완주를 죽인 것도 사실이었다.

        그러나 사실이라고 해서 진실은 아니다.

        그날의 진실은,
        그 모든 사실이 누구의 병상으로 향하고 있었는지까지 밝혀졌을 때
        비로소 완성되었다.
