  - id: card_wet_shoeprints
    title: '재활수조실 바닥의 젖은 구두 자국'
    text: |
      어린이용 수조와 고무호스, 파란통 사이에 젖은 구두 자국이 여러 번 겹쳐 있다.
      발자국은 재활수조실 문턱을 지나 ㄱ자로 꺾이는 복도까지 이어지지만, 그 뒤는 몰려든 기자들과 직원들이 오간 흔적에 뭉개져 어디로 향했는지 알 수 없다.
      주변을 둘러봤지만 지금 딱딱한 구두굽을 신고 있는 사람은 없다. 윤유성은 운동화, 조희수는 낮은 단화, 서기준은 슬리퍼, 한다정은 고무 밑창의 낮은 외출화를 신고 있다.
