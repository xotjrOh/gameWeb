id: rabbit-turtle-finish-line-night
type: murder_mystery
title: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
roomDisplayName: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
players:
  min: 3
  max: 3

rules:
  investigationsPerRound: 1
  noEliminationDuringGame: true
  partsAutoReveal: true
  partsPublicDetail: false

intro:
  readAloud: |
    프롤로그

    몇 달 전 패배로 후원이 끊겼던 토끼를 위해, 용왕재단은 후원 재개를 위한 기자간담회를 열었다.

    후원선수 복귀 기자간담회.

    오늘 저녁 본행사가 시작되고 얼마 지나지 않아, 재활수조실 방향에서 다급한 외침이 끼어들었다.

    거북 선수가 쓰러졌다고.

    그날 재활수조실은 단수 상태였다. 한쪽 수조에는 3cm 남짓한 물만 남아 있었고, 다른 한쪽 수조는 비어 있었다.

    그 사이의 타일 위에 거북은 쓰러져 있었다.

    몸을 돌려 확인해보니 핏자국도 없었다. 타박상도, 목을 조른 흔적도 없었다.

    그런데도 거북은 숨을 쉬지 않았다.

    죽은 것처럼 보이지 않는 시체.
    살해의 흔적 없는 현장.

    그 시간,
    강당을 벗어난건 넷.

    남은 질문은 하나였다.
    거북은 어떻게 죽었는가.

flow:
  steps:
    - id: INTRO
      label: '오프닝'
      kind: intro
      durationSec: 180
      enterAnnouncement: '용궁섬의 행사 조명이 꺼지고, 재활수조실의 밤이 열립니다.'
    - id: ROUND1_INVESTIGATE
      label: '1라운드 조사'
      kind: investigate
      round: 1
      durationSec: 420
      description: '현장 상태와 윤유성의 동기를 확인하세요. 이 라운드의 단서는 남편토끼를 가장 강하게 의심하게 만듭니다.'
      enterAnnouncement: '1라운드 조사: 재활수조실과 행사장 주변에서 첫 단서를 확인합니다.'
    - id: ROUND1_DISCUSS
      label: '1라운드 토론'
      kind: discuss
      round: 1
      durationSec: 600
      description: '거북의 몸 상태, 고무링, 토끼 가족 사진을 중심으로 윤유성이 무엇을 했는지 토론하세요.'
    - id: ROUND2_INVESTIGATE
      label: '2라운드 조사'
      kind: investigate
      round: 2
      durationSec: 420
      description: '과거의 죄와 각자의 동기를 확인하세요. 거북의 고백, 의료동 계획, 정바른 기사가 새 방향을 만듭니다.'
      enterAnnouncement: '2라운드 조사: 봉투와 기록을 열어, 누가 무엇을 숨기려 했는지 확인합니다.'
    - id: ROUND2_DISCUSS
      label: '2라운드 토론'
      kind: discuss
      round: 2
      durationSec: 600
      description: '윤유성, 조희수, 서기준이 각각 숨긴 행동을 구분하세요. 원한과 실제 사망 원인이 같은지 따져보세요.'
    - id: ROUND3_INVESTIGATE
      label: '3라운드 조사'
      kind: investigate
      round: 3
      durationSec: 420
      description: '최종 살해 방법과 실행 가능성을 확인하세요. 물을 옮긴 방식, 수건 회수통, 과거 기록 조작이 핵심입니다.'
      enterAnnouncement: '3라운드 조사: 현장의 물자국과 재단의 과거를 통해 마지막 손을 추적합니다.'
    - id: ROUND3_DISCUSS
      label: '3라운드 토론'
      kind: discuss
      round: 3
      durationSec: 600
      description: '오완주가 쓰러진 뒤 아직 살아 있었다는 가능성과, 그를 익사시킬 수 있었던 사람을 중심으로 결론을 정리하세요.'
    - id: FINAL_VOTE
      label: '최종 투표'
      kind: final_vote
      durationSec: 300
      description: '거북 오완주를 최종적으로 죽인 인물을 지목하세요.'
    - id: ENDBOOK
      label: '엔딩'
      kind: endbook
      enterAnnouncement: '엔딩 단계입니다. 최종 진실을 확인합니다.'

parts:
  - id: part_turtle_body
    name: '거북의 사체 상태'
    source: '재활수조실'
    note: '외상과 교살 흔적이 없고, 얕은 물만 남은 수조에서 발견됐다.'
  - id: part_rubber_ring
    name: '물기 있는 고무링'
    source: '재활수조실 배수구 근처'
    note: '윤유성의 보온병 마개와 맞는 젖은 고무링이다.'
  - id: part_rabbit_family
    name: '윤슬 수술 기록'
    source: '행사장 가족 사진'
    note: '윤유성이 거북에게 강한 원한을 품을 이유가 된다.'
  - id: part_turtle_envelope
    name: '거북의 자필 고백'
    source: '서류봉투'
    note: '거북이 선발전에서 수면유도제를 사용했다는 고백이다.'
  - id: part_liver_compatibility
    name: '간 적합성 문서'
    source: '의료동 기록'
    note: '재단과 서기준이 윤유성을 섬에 붙잡아야 했던 이유다.'
  - id: part_barun_article
    name: '정바른 기사'
    source: '기사 스크랩'
    note: '조희수가 서기준을 의심하게 된 과거 사건이다.'
  - id: part_rubber_hose
    name: '고무호스의 물기'
    source: '재활수조실'
    note: '단수 중에도 사이펀으로 물을 옮길 수 있음을 보여준다.'
  - id: part_towel_bin
    name: '수건 회수용 파란통'
    source: '비품 정리실'
    note: '젖은 수건과 안쪽 물자국이 남아 있다.'
  - id: part_past_killing_photo
    name: '살해장면 사진'
    source: '재단 보관 자료'
    note: '서기준이 과거에도 기록을 조작하며 사람을 죽였다는 결정적 단서다.'

roles:
  - id: rabbit_husband
    displayName: '남편토끼 윤유성'
    publicText: |
      당신은 전성기 복귀를 노리던 육상 선수다. 딸 윤슬의 수술을 위해 용왕재단의 도움을 받아야 했고, 거북 오완주는 과거 선발전에서 당신을 쓰러뜨린 인물이다.
      오늘 밤 당신은 거북과 직접 만났고, 그 사실만으로도 모두가 당신을 의심할 수 있다.
    secretText: |
      당신은 거북 오완주를 죽이려 했다. 하지만 당신이 한 일은 최종 살해가 아니다.

      거북은 밤 2시 무렵 당신을 재활수조실로 불러냈다. 그는 과거 대표 선발전에서 당신의 물병에 수면유도제를 섞었다고 고백했고, 자신이 쓴 자필 고백이 든 서류봉투를 보여주었다. 당신은 윤슬이 잃어버린 시간과 아내의 고통을 떠올렸고, 가지고 있던 보온병에 수면유도제를 섞어 거북에게 마시게 했다. 거북은 점점 휘청였고, 당신은 그에게 3분만 서 있으라고 강요했다.

      02:24 무렵 거북은 쓰러졌다. 당신은 그가 죽었다고 생각했지만, 사실 숨을 정확히 확인하지 않았다. 창밖으로 별똥별이 지나갔고, 당신은 윤슬이 말하던 소원을 떠올렸다. 당신은 더 이상 손대지 못하고 서류봉투와 보온병을 챙겨 나왔다. 급히 움직이다 보온병 마개의 고무링이 빠진 것을 뒤늦게 알았다.

      당신의 목표는 두 가지다. 첫째, 당신이 거북에게 약을 먹였다는 사실을 최대한 늦게 드러내라. 둘째, 최종 사망 원인이 약물이 아니라는 단서를 찾고 실제 살해자를 찾아라.

      특수 조건: 여우가 먼저 아내토끼가 범인일 수 있다는 가능성을 제기한다면, 그 즉시 잠금된 아내토끼 카드가 전체공개됩니다. 여우가 아닌 인물이 아내토끼가 범인일 가능성에 대해 먼저 제기한다면 해당 잠금카드는 영영 공개되지 않습니다. 다만 해당 미션에 대해 언급해서는 안되며 유도해서도 안됩니다.

  - id: fox
    displayName: '여우 조희수'
    publicText: |
      당신은 행사의 홍보와 기사를 맡은 기자다. 말과 제목으로 사람을 움직이는 데 능숙하지만, 오늘 밤에는 당신 역시 누군가를 몰래 따라다녔다.
      사람들은 당신이 기삿거리 때문에 거북의 죽음을 이용하려 했다고 볼 수 있다.
    secretText: |
      당신은 거북을 죽이지 않았다. 하지만 흉기처럼 보일 수 있는 물건을 숨겼다.

      당신은 오래전 정바른 사건을 취재했다. 정바른은 재단의 기록 조작을 추적하다 죽었고, 당신은 그 뒤에 자라 서기준이 있다고 믿었다. 오늘 행사 직전, 당신은 서기준의 파일에서 정바른 사건 관련 자료와 의료동 약품 반출 흔적을 보았다. 당신은 서기준이 또 누군가를 없앨 수 있다고 생각해, 의료동에서 수면유도제와 주사기를 훔쳐 품 안에 숨겼다.

      밤중에 당신은 서기준을 따라 재활수조실 근처로 갔다. 비품 정리실 앞에서 아내토끼 한다정과 마주쳤고, 서로 본 일을 숨기자는 말을 들었다. 당신은 주사기를 들킨 것 같아 당황했다. 이후 재활수조실에 들어갔을 때 거북은 이미 죽어 있었다. 당신은 주사기를 숨기고 사람들을 불렀다.

      당신의 목표는 두 가지다. 첫째, 당신이 주사기를 훔쳤다는 사실을 숨겨라. 둘째, 정바른 사건과 서기준의 연결고리를 찾아 실제 범인을 밝혀라.

  - id: jara
    displayName: '자라 서기준'
    isKiller: true
    publicText: |
      당신은 용왕재단 의료동과 행사 동선을 관리하는 실무 책임자다. 침착하고 기록에 밝지만, 오늘 밤 재활수조실 주변을 가장 자유롭게 오갈 수 있었던 사람이기도 하다.
      모두가 당신에게 현장 설명을 요구할 것이다.
    secretText: |
      당신이 거북 오완주를 최종적으로 죽였다.

      윤유성은 재단이 절대 놓칠 수 없는 사람이었다. 간 적합성 문서에 따르면 그는 용왕의 긴급 이식 후보였고, 행사가 끝난 뒤 의료동에 붙잡아 둘 계획이 있었다. 그런데 오완주는 과거 선발전 조작과 재단 자료를 들고 윤유성을 만나려 했다. 그가 모든 것을 말하면 윤유성은 섬을 떠나고, 당신과 재단의 계획은 무너진다.

      당신은 02:24 이후 재활수조실에 도착했다. 오완주는 쓰러져 있었지만 아직 숨이 붙어 있었다. 윤유성이 약을 먹인 흔적이 보였고, 현장은 윤유성을 범인으로 만들기 충분했다. 당신은 단수 상태에서도 어린이 재활수조의 얕은 물을 고무호스로 수건 회수용 파란통에 옮겼다. 사이펀으로 물을 채운 뒤, 의식이 흐린 오완주의 얼굴을 파란통 물속에 눌러 익사시켰다. 이후 젖은 수건으로 얼굴과 바닥을 닦고, 수조 주변을 최대한 원래처럼 돌려놓았다.

      당신의 목표는 두 가지다. 첫째, 윤유성이 약을 먹였다는 사실을 크게 부각해 최종 살해까지 그에게 연결하라. 둘째, 고무호스와 수건 회수통의 의미가 함께 해석되지 않도록 막아라.

      특수 조건: 여우가 먼저 아내토끼가 범인일 수 있다는 가능성을 제기한다면, 그 즉시 잠금된 아내토끼 카드가 전체공개됩니다. 여우가 아닌 인물이 아내토끼가 범인일 가능성에 대해 먼저 제기한다면 해당 잠금카드는 영영 공개되지 않습니다. 다만 해당 미션에 대해 언급해서는 안되며 유도해서도 안됩니다.

initialRoleCards:
