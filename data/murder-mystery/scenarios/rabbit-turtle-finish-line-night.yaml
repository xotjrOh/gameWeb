    note: '조희수가 자라를 해치려 했다는 의심을 만든다.'
  - id: part_empty_vial
    name: '피 묻은 빈 약병'
    source: '조희수의 소지품'
    note: '라벨을 확인하기 어려운 빈 약병이다.'
  - id: part_dragon_king_rumor
    name: '용왕에 대한 소문'
    source: '행사장 소문'
    note: '용왕재단의 선행과 쇠락한 현재 평판을 함께 보여준다.'
  - id: part_rubber_hose
    name: '고무호스의 물기'
    source: '재활수조실'
    note: '길이가 매우 긴 청소용 고무호스다.'
  - id: part_towel_bin
    name: '수건 회수용 파란통'
