          entityKey: security_logs
          sectionId: case_files
          order: 20
          description: "출입 기록, 호출 로그, 흐릿한 캡처가 정리된 보안 폴더."
          cardPool:
            - card_cctv_capture
            - card_rehab_call_log
            - card_access_log_draft
            - card_laundry_exit_camera
        - id: npc_people_accounts
          label: "관계자 진술 묶음"
          targetType: character
          entityKey: people_accounts
          sectionId: people_accounts
          order: 30
          description: "거북 메모와 행사 스태프들의 짧은 진술, 재단 브리핑 메모가 모여 있다."
          cardPool:
            - card_turtle_note
            - card_staff_statement_jara
            - card_staff_statement_fox
            - card_foundation_brief

cards:
  - id: card_rehab_thermos
    title: "열린 보온병"
    text: |
      수조 옆 벤치에서 뚜껑 열린 보온병이 발견됐다.
      내부 잔류 성분은 병원 처방 수면유도제 계열과 일치한다.
      물에 섞인 양은 즉시 의식을 잃게 할 정도는 아니지만, 짧은 시간 안에 심한 졸음과 근력 저하를 유발할 수 있다.
  - id: card_rehab_emergency_button
    title: "비상 호출 버튼"
    text: |
      재활수조실 비상 호출 버튼에는 최근에 눌린 흔적이 없다.
      버튼 주변은 물기 하나 없이 말라 있었다.
      누군가 거북이 숨 쉬는 걸 확인하고도 구조 요청을 미뤘을 가능성을 시사한다.
  - id: card_rehab_bench_gap
    title: "벤치 위의 빈 자리"
    text: |
      벤치 위 먼지 위로 봉투 크기의 빈 사각 자국이 남아 있다.
      바닥에는 누군가 급히 숙여 손으로 훑은 듯한 물자국이 끊겨 있다.
      누군가는 거북보다 먼저 벤치와 바닥에서 무언가를 찾았다.
  - id: card_rehab_waterline
    title: "수조 턱의 물자국"
    text: |
      수조 턱과 바닥 사이에 젖은 손자국이 짧게 이어져 있다.
      거북은 약기운 속에서도 한동안 버티며 몸을 움직인 것으로 보인다.
      첫 방문자가 방을 떠난 직후 즉사한 상태는 아니었다.
  - id: card_corridor_layout
    title: "복도 구조 설명"
    text: |
      의료동 연결복도 끝에는 재활수조실과 정리실 문이 서로 마주 보고 있다.
      정리실 뒷벽의 좁은 문은 세탁실로, 세탁실 왼편은 비상계단으로 바로 이어진다.
      재활수조실 안을 피하면서도 빠져나갈 수 있는 우회 동선이 존재한다.
  - id: card_storage_towel_trace
    title: "정리실 수건 더미"
    text: |
      정리실 수건 더미 안쪽이 한 번 깊게 눌렸다가 다시 급히 정리된 흔적이 있다.
      바닥에는 젖은 신발 자국이 오래 머문 방향 대신 문틈 쪽으로만 짧게 남아 있다.
      누군가 이곳에 몸을 숨긴 채 재활수조실 안쪽을 지켜봤을 가능성이 있다.
  - id: card_laundry_fiber
    title: "세탁실 쪽 종이섬유"
    text: |
      세탁실 문고리와 비상계단 첫 계단에서 눅눅한 종이섬유와 봉투용 풀 냄새가 검출됐다.
      커다란 서류봉투 하나가 그 방향으로 옮겨졌음을 뒷받침한다.
      복도 정면을 통과하지 않고 빠져나간 동선도 이쪽뿐이다.
  - id: card_hard_sole_trace
    title: "단단한 굽 자국"
    text: |
      연결복도 왁스 바닥에 단단한 굽이 긁고 간 가는 반달 흔적이 남아 있다.
      빠르게 방향을 꺾을 때 생기는 자국으로, 운동화 바닥보다 형식용 구두나 굽 있는 신발 쪽에 가깝다.
      토끼남편의 러닝화와는 패턴이 다르다.
  - id: card_headline_archive
    title: "기사 보관본"
    text: |
      기사 보관본 제목: 「재능만 믿던 스타의 몰락」.
      본문은 토끼남편을 '타고난 스타', 거북을 '성실한 역전승'으로 대비한다.
      훈련량과 윤슬의 수술 빈자리 사정은 어디에도 언급되지 않는다.
    effects:
      - type: addPart
        partId: part_media_frame_article
  - id: card_apology_script
    title: "공개 사과 방송 대본"
    text: |
      공개 사과 방송 대본 요약:
      - '거북 선수를 얕보고 긴장을 놓쳤다.'
      - '스타 대접에 익숙해져 기본을 잊었다.'
      - '컨디션 관리 실패는 전적으로 내 책임이다.'
      토끼남편이 왜 경기 중 졸음과 이상 증세를 겪었는지 묻는 문장은 끝내 없다.
    effects:
      - type: addPart
        partId: part_apology_script
  - id: card_turtle_message
    title: "거북의 메시지"
    text: |
      거북이 토끼남편에게 보낸 행사 당일 메시지:
      '대표 선발전 날 일에 대해 사과할 게 있어. 오늘은 꼭 말해야 할 것 같아.'
      짧지만, 단순한 위로나 안부보다 훨씬 무거운 뉘앙스다.
    effects:
      - type: addPart
        partId: part_turtle_message
  - id: card_program_schedule
    title: "행사 일정표"
    text: |
      행사 당일 일정표에는 본행사 종료 뒤 '의료동 회복 동선 안내'와 '개별 컨디션 체크'가 별도 표시되어 있다.
      토끼남편 이름 옆엔 연필로 작은 별표가 두 번 찍혀 있다.
      공식 프로그램 바깥에서 누군가를 따로 떼어 놓을 준비처럼 보인다.
  - id: card_prescription_copy
    title: "수면유도제 처방전 사본"
    text: |
      수면유도제 처방전 사본.
      환자명은 일부 지워졌지만 처방일은 대표 선발전 직전 주간과 겹친다.
      약효 설명란에는 '졸음 유발, 반응속도 저하'가 선명히 체크돼 있다.
    effects:
      - type: addPart
        partId: part_prescription_copy
  - id: card_transfer_plan
    title: "의료동 이송 계획안"
    text: |
      문서 제목: '토끼남편 의료동 이송 계획안'.
      요약: 본행사 종료 직후 토끼남편을 의료동 회복 관찰 명목으로 이동시킨다.
      필요 시 외부와의 접촉을 제한하고, 재단 승인 없는 출도를 막는다.
    effects:
      - type: addPart
        partId: part_transfer_plan
  - id: card_waitlist_note
    title: "수술 대기 내부 메모"
    text: |
      수술 대기 관련 내부 메모.
      '빈자리 발생 시 재단 우선순위 확인 후 통보'라는 문장이 반복된다.
      윤슬 이름은 직접 적혀 있지 않지만, 수술 순서가 의료적 긴급성만으로 결정되지 않았음을 보여 준다.
  - id: card_yunsul_chart
    title: "윤슬 상태 기록"
    text: |
      윤슬 상태 기록 요약:
      - 공개 사과 방송 시작 전부터 호흡 불안정
      - 방송 종료 무렵 위기 대응 호출
      - 토끼남편 도착 전 사망 확인
      시간표는 '방송이 끝날 때쯤 윤슬이 죽었다'는 진술과 대체로 맞아떨어진다.
  - id: card_cctv_capture
    title: "수술동 CCTV 캡처"
    text: |
      수술동 복도 CCTV 캡처 설명.
      토끼아내가 다른 아이 동의서 봉투를 들고 화장실로 들어가는 장면이 찍혀 있다.
      재단은 그녀가 어떤 절박함 속에서 선을 넘을 수 있는지 이미 알고 있었다.
    effects:
      - type: addPart
        partId: part_cctv_capture
  - id: card_rehab_call_log
    title: "구조 호출 로그"
    text: |
      비상 호출 로그상 재활수조실 최초 구조 호출은 객석 쪽 소란이 번진 뒤에야 기록된다.
      거북이 공식적으로 발견되기 전까지 의료동 내부에서 즉시 구조 요청한 사람은 없었다.
      첫 목격자와 두 번째 방문자 모두, 구조보다 다른 일을 먼저 했을 가능성이 남는다.
  - id: card_access_log_draft
    title: "DRAFT 의료동 출입 로그"
    text: |
      DRAFT 단서.
      의료동 출입 로그 초안에는 행사 종료 직전 자라의 출입권한이 연결복도 구역에서 한 번 더 사용된 흔적이 남아 있다.
      토끼남편이 재활수조실을 떠난 뒤, 공식 발견 소란이 번지기 전 시간대와 겹친다.
      이 로그는 최종 범인 설정을 위한 임시 보강 단서이므로 TODO_AUTHOR_FINALIZE_ACCESS_LOG로 교체가 필요하다.
    effects:
      - type: addPart
        partId: part_access_log_draft
  - id: card_laundry_exit_camera
    title: "세탁실 출구 캡처"
    text: |
      세탁실 출구 카메라에는 누군가가 가방을 몸 앞으로 끌어안은 채 비상계단으로 사라지는 흐릿한 그림자만 남아 있다.
      얼굴은 보이지 않지만, 얇고 큰 봉투를 안쪽에 숨긴 듯한 각진 실루엣이 한 순간 스친다.
  - id: card_turtle_note
    title: "거북 자필 메모"
    text: |
      거북 자필 메모 요약:
      '대표선발전에서 유성이 진 건 내 잘못이다. 물병에 수면제를 탔다. 오늘 유성에게도 말할 계획이다.
      하지만 방송 뒤 계획은 내가 아니다. 본행사 뒤 유성을 의료동으로 넘기는 문서가 돈다.'
      메모는 죄책감과 경고를 동시에 남기려 한 흔적이다.
    effects:
      - type: addPart
        partId: part_turtle_note
  - id: card_staff_statement_jara
    title: "DRAFT 스태프 진술 - 자라"
    text: |
      DRAFT 단서.
      행사 스태프 진술: 자라는 본행사 직전부터 의료동과 행사장 사이를 여러 번 오갔고, 한 번은 '봉투만 먼저 찾아'라는 말을 낮게 내뱉었다고 한다.
      정확한 맥락은 불명이나, 누락된 서류를 찾고 있었던 정황과 맞물린다.
      TODO_AUTHOR_FINALIZE_JARA_WITNESS로 교체 필요.
  - id: card_staff_statement_fox
    title: "스태프 진술 - 여우"
    text: |
      진행 보조 스태프 진술: 여우는 자료집 제목을 막판까지 고치며 '비극에도 각도가 필요하다'고 말했다.
      그는 가족 코멘트와 거북 발언 순서를 집요하게 조정했고, 토끼남편의 과거 추락 서사를 이번 복귀 행사 중심에 세우려 했다.
  - id: card_foundation_brief
    title: "재단 브리핑 메모"
    text: |
      용왕재단 내부 브리핑 메모.
      '토끼남편은 공식 발표 후 의료동으로 유도, 불필요한 인터뷰 차단. 문서 유출 및 감정적 돌발 대응 주의.'
      서명란은 비어 있지만, 실무 전달 체크 칸엔 자라 이니셜이 남아 있다.

finalVote:
  question: "현재 확보된 단서상, 거북의 최종 사망에 가장 직접적으로 연루된 인물은 누구인가?"
  correctRoleId: jara

endbook:
  common: |
    TODO_AUTHOR_FINALIZE_SOLUTION
    현재 저장소 스키마상 최종 투표 정답 역할이 반드시 필요하므로, 임시 정답은 자라로 설정되어 있다.
    이유는 봉투 유출을 가장 두려워하는 위치에 있었고, 토끼남편 의료동 이송 계획과 CCTV 캡처를 함께 관리했으며, DRAFT 출입 로그/스태프 진술이 연결복도 재진입 가능성을 가장 강하게 가리키기 때문이다.
    다만 이 결론은 최종 저자 확정본이 아니라, 현재 제공된 canonical facts를 깨지 않으면서 플레이 가능 상태를 만들기 위한 보수적 draft다.
  variantMatched: |
    플레이어들은 현재 draft 기준의 지목에 도달했다.
