cards:
  - id: card_turtle_body
    title: '거북의 사체 사진'
    text: |
      거북 오완주는 재활수조실 수조 사이의 타일 위에 쓰러진 채 발견됐다. 목을 조른 흔적이나 둔기로 맞은 외상은 보이지 않는다.
      입과 코 주변에는 물기가 남아 있지만, 발견 지점 주변만 보면 의식이 있는 성인이 스스로 빠져 죽기 어려운 상태다. 약물, 사고, 물에 의한 사망 가능성이 동시에 열려 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/turtle-body.png'
    imageAlt: '재활수조실에 쓰러진 거북의 사체 사진'
    backId: back_turtle_body
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_turtle_body
  - id: card_rubber_ring
    title: '물기 있는 고무링'
    text: |
      배수구 근처에서 작은 고무링이 발견됐다. 입구에는 물기가 묻어 있고, 크기와 변형 자국이 윤유성의 보온병 마개와 맞는다.
      누군가 급히 보온병을 열고 닫는 과정에서 빠진 것으로 보인다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rubber-ring.png'
    imageAlt: '물기가 묻은 보온병 마개 고무링'
    backId: back_rubber_ring
    effects:
      - type: addPart
        partId: part_rubber_ring
  - id: card_rabbit_family
    title: '토끼 가족 사진'
    text: |
      행사장 사진 속 윤유성은 딸 윤슬의 병실 창문을 향해 손을 흔들고 있다. 사진 뒷면에는 "다음 공석 수술 일정, 재단 승인 필요"라는 메모가 붙어 있다.
      오완주가 과거 선발전 조작을 고백했다면, 윤유성이 품을 분노는 충분히 살인 동기로 보인다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rabbit-family.png'
    imageAlt: '토끼 가족과 윤슬 병원 메모'
    backId: back_rabbit_family
    effects:
      - type: addPart
        partId: part_rabbit_family
  - id: card_scene_memo
    title: '검시/현장 메모'
    text: |
      초동 메모에는 "외상 없음, 교살 흔적 없음, 입과 코 주변 물기 확인 필요"라고 적혀 있다. 수조 바닥에는 3cm 남짓한 물만 남아 있어, 현장만 보면 사고사나 약물로 쓰러진 뒤의 사망처럼 보인다.
      다만 바닥 타일의 물자국은 수조 안쪽보다 비품 정리실 방향으로 더 길게 이어져 있다. 물이 어디에 있었는지 확정되지 않으면, 범인이 없었는지부터 실제 사망 장소까지 모두 단정할 수 없다.
    backId: back_scene_memo
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_scene_memo
  - id: card_wife_route
    title: '아내토끼 동선과 고무링 은닉'
    text: |
      비품 정리실 문틀 아래에 작은 물방울이 이어져 있고, 한다정이 쥐고 있던 손수건 안쪽에는 고무 냄새와 수조 물 냄새가 남아 있다.
      그녀는 "남편이 망가지는 걸 더는 볼 수 없었다"는 말만 반복했다. 재활수조실에 먼저 갔고, 젖은 고무링을 숨겼다면 남편을 감싸려 한 것인지 물 흔적에 직접 손을 댄 것인지 구분하기 어렵다. 조희수와 마주친 사실을 바로 말하지 않은 점도 남는다.
    backId: back_wife_route
    effects:
      - type: addPart
        partId: part_wife_route
  - id: card_turtle_envelope
    title: '거북 서류봉투'
    text: |
      봉투 안에는 오완주의 자필 고백이 들어 있다. 그는 과거 대표 선발전 직전 윤유성의 물병에 수면유도제를 넣었다고 적었다.
      글 끝에는 "오늘 밤 유성이에게 직접 사과하고, 재단이 숨긴 문서도 넘긴다"라고 쓰여 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/turtle-envelope.png'
    imageAlt: '거북의 자필 고백이 든 서류봉투'
    backId: back_turtle_envelope
    effects:
      - type: addPart
        partId: part_turtle_envelope
  - id: card_liver_compatibility
    title: '간 적합성 문서'
    text: |
      의료동 기록에는 윤유성의 조직 검사 결과가 따로 표시되어 있다. 용왕의 긴급 이식 후보군 중 윤유성이 가장 높은 적합성을 보인다.
      문서 하단에는 "행사 종료 후 의료동 관찰 명목으로 잔류 유도. 외부 이동 금지"라는 서기준의 메모가 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/liver-compatibility.png'
    imageAlt: '윤유성 간 적합성 의료 문서'
    backId: back_liver_compatibility
    effects:
      - type: addPart
        partId: part_liver_compatibility
  - id: card_jeong_bareun_article
    title: '정바른 기사'
    text: |
      오래된 기사에는 정바른이 용왕재단 주변에서 소란을 피우다 사고를 당했다는 내용이 실려 있다. 기사 여백에는 조희수의 글씨로 "서기준이 마지막 기록을 고쳤다"라고 적혀 있다.
      조희수가 서기준에게 원한을 품고, 그를 감시하거나 위협할 이유가 된다. 동시에 조희수가 오늘 밤 서기준을 따라다닌 이유도 된다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/jeong-bareun-article.png'
    imageAlt: '정바른 사고사 기사 스크랩'
    backId: back_jeong_bareun_article
    effects:
      - type: addPart
        partId: part_barun_article
  - id: card_syringe_trace
    title: '의료동 주사기 반출 흔적'
    text: |
      의료동 약품함에는 일회용 주사기 한 개와 진정제 앰풀 하나가 빠진 기록이 있다. 반출 사유란은 비어 있고, 출입 기록에는 조희수가 의료동 근처에 머문 시간이 남아 있다.
      실제 주입 흔적은 아직 확인되지 않았지만, 조희수가 품 안에 숨길 수 있는 물건이 있었고 그 물건이 살해 도구처럼 보일 수 있다는 점은 분명하다.
    backId: back_syringe_trace
    effects:
      - type: addPart
        partId: part_syringe_trace
  - id: card_rubber_hose
    title: '고무호스'
    text: |
      재활수조실 구석의 고무호스 입구에 물기가 묻어 있다. 단수 상태였다는 설명과 달리, 호스 안쪽은 방금 물이 지나간 것처럼 축축하다.
      호스의 길이는 성인용 수조 외벽과 비품 정리실 입구의 수건 회수통 사이를 겨우 잇는다. 누군가 물을 옮기려 했다면 급수 수도꼭지보다 이 호스가 더 자연스럽다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rubber-hose.png'
    imageAlt: '입구에 물기가 남은 고무호스'
    backId: back_rubber_hose
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_rubber_hose
  - id: card_towel_bin
    title: '수건 회수용 파란통'
    text: |
      수건 회수용 파란통 안쪽 높은 위치까지 물방울이 맺혀 있고, 바닥에는 젖은 수건이 여러 장 눌려 있다. 젖은 수건을 담아두는 통이라 이상하지 않아 보이지만, 벽면 물방울은 통 안에 물이 한때 꽤 높게 찼다는 쪽에 가깝다.
      수건 몇 장에는 수조 물 냄새와 바닥을 닦은 듯한 엷은 얼룩이 남아 있다.
    backId: back_towel_bin
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_towel_bin
  - id: card_past_killing_photo
    title: '어두운 폴라로이드'
    text: |
      삭제 예정 폴더에 남은 어두운 폴라로이드에는 지하통로의 배관과 끈, 그리고 그 앞에 선 젊은 서기준이 찍혀 있다. 뒷면에는 날짜와 "완료"라는 짧은 표시가 남아 있다.
      사진이 보관된 파일명은 당시 출입 기록과 다르게 저장되어 있다. 사진만으로 오늘 밤의 범행을 단정할 수는 없지만, 서기준이 현장과 기록을 따로 다루는 방법을 알고 있었음을 보여준다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/past-killing-photo.png'
    imageAlt: '지하통로의 배관과 젊은 서기준이 찍힌 어두운 폴라로이드'
    backId: back_past_killing_photo
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_past_killing_photo
  - id: card_child_tank_waterline
    title: '어린이용 수조 물때'
    text: |
      어린이용 수조의 안쪽 벽에는 오래된 물때 선이 남아 있다. 시설 점검표상 수조 높이는 50cm, 실제 사용 수심은 약 42cm이고, 현재 물높이도 그 물때 선과 거의 맞는다.
      물때가 끊기거나 새로 젖은 자국이 없어 사건 전후로 어린이용 수조에 물이 많이 추가되거나 빠진 흔적은 보이지 않는다.
    backId: back_child_tank_waterline
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_child_tank_waterline
  - id: card_adult_tank_specs
    title: '성인용 수조 규격과 수위'
    text: |
      시설 점검표에는 성인용 수조가 높이 120cm, 실제 사용 수심 약 105cm, 내부 바닥 가로 5.0m × 세로 3.0m로 적혀 있다.
      그런데 사건 직후 성인용 수조에는 바닥 잔수만 남아 있었다. 단수 상태였다는 설명만으로는 "원래 있던 물"이 어디로 갔는지가 남는다.
    backId: back_adult_tank_specs
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_adult_tank_specs
  - id: card_towel_bin_specs
    title: '파란 수건 수거통 규격'
    text: |
      비품 규격표의 수건 회수용 파란통은 내부 바닥 가로 65cm × 세로 45cm, 내부 높이 약 75cm다.
      통은 수조보다 훨씬 좁다. 같은 양의 물이라도 수조 바닥에서는 낮게 보이고, 이 통 안에서는 높은 물자국으로 남을 수 있다.
    backId: back_towel_bin_specs
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_towel_bin_specs
  - id: card_glass_scratches
    title: '유리 외벽 곡선 긁힘'
    text: |
      성인용 수조의 유리 외벽 하단에 젖은 고무나 링이 반복적으로 스친 듯한 곡선형 긁힌 자국이 있다.
      긁힘은 손톱이나 금속 모서리보다 부드러운 물체가 같은 위치를 여러 번 지나간 흔적에 가깝다. 자국 주변에는 마른 물방울이 작게 남아 있다.
    backId: back_glass_scratches
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_glass_scratches
  - id: card_silicone_packing
    title: '투명 실리콘 패킹'
    text: |
      수조 하단 턱에서 투명 실리콘 패킹 조각이 발견됐다. 크기는 윤유성의 보온병 고무링보다 크고, 눌린 면에는 둥근 호스 자국처럼 보이는 흔적이 있다.
      호스를 고정하거나 틈을 임시로 막는 데 쓰였다면, 물이 흐르는 동안 손으로 계속 붙잡고 있지 않아도 된다.
    backId: back_silicone_packing
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_silicone_packing
  - id: card_cleaning_notice
    title: '시설 청소 안내문'
    text: |
      재활수조실 벽면 안내문에는 "호스 내부를 먼저 물로 채운 뒤 낮은 배수통 쪽 끝을 내리면, 높은 수조의 물이 자연스럽게 빠질 수 있습니다"라는 청소 팁이 적혀 있다.
      안내문은 청소용 설명일 뿐이지만, 단수 상태에서도 이미 차 있던 물을 다른 용기로 옮기는 방법을 보여준다.
    backId: back_cleaning_notice
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_cleaning_notice
  - id: card_equipment_log
    title: '출입/장비 기록 정리표'
    text: |
      의료동 기록 단말에는 행사 직후 재활수조실, 비품 정리실, 장비 보관함을 오간 시간이 정리되어 있다. 윤유성과 조희수의 흔적은 특정 구역에 끊겨 있고, 관리 담당 계정은 세 장소에 모두 남아 있다.
      같은 시간대 장비 반납 목록에서는 고무호스 점검표와 실리콘 패킹 보관 칸만 서명이 비어 있다. 단독으로는 실제 이동인지 기록 정리인지 알 수 없지만, 현장 단서와 맞물리면 마지막 정리 권한을 좁힌다.
    backId: back_equipment_log
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_equipment_log
  - id: card_final_reconstruction_memo
    title: '사망 장소 재검토 메모'
    text: |
      재검토 메모는 어린이용 수조를 제외한다. 물때와 현재 수위가 맞아, 어린이용 수조가 사건 전후로 크게 비워지거나 채워진 흔적이 없기 때문이다.
      성인용 수조의 바닥 면적은 약 15.0㎡, 파란 수건 수거통의 바닥 면적은 약 0.29㎡다. 성인용 수조에서 낮아 보이는 물의 이동도 수거통 안에서는 높은 물자국이 될 수 있다.
      고무호스의 물기, 유리 외벽의 곡선 긁힘, 실리콘 패킹, 출입/장비 기록을 함께 보면 마지막에 물을 옮기고 현장을 정리한 사람을 기록 쪽에서 다시 확인해야 한다.
    effects:
      - type: addPart
        partId: part_final_reconstruction
  - id: card_start_wife_pact
    title: '아내토끼가 여우에게 건넨 카드'
    text: |
      저도 당신과 마주친걸 숨길테니까, 당신도 저와 마주친걸 비밀로 해줘요. 그것만 지켜주신다면 저도 당신과 마주친걸 비밀로 할게요
  - id: card_locked_wife_accuses_fox
    title: '아내토끼의 잠금 증언'
    text: |
      제가 봤어요! 비품 정리실에서 마주쳤는데 여우가 재활수조실쪽을 보며 품 속에 손을 넣은채 살기를 띄고있었어요!!

