id: rabbit-turtle-finish-line-night
type: murder_mystery
title: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
roomDisplayName: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
players:
  min: 3
  max: 3

rules:
  investigationsPerRound: 2
  noEliminationDuringGame: true
  partsAutoReveal: true
  partsPublicDetail: false

intro:
  readAloud: |
    몇 달 전 패배로 후원이 끊겼던 토끼를 위해, 용왕재단은 후원 재개를 위한 기자간담회를 열었다.

    후원선수 복귀 기자간담회.

    오늘 저녁 본행사가 시작되고 얼마 지나지 않아, 재활수조실 방향에서 다급한 외침이 끼어들었다.

    거북 선수가 쓰러졌다고.

    그날 재활수조실은 단수 상태였다. 한쪽 수조에는 3cm 남짓한 물만 남아 있었고, 다른 한쪽 수조는 비어 있었다.

    그 사이의 타일 위에 거북은 쓰러져 있었다.

    몸을 돌려 확인해보니 핏자국도 없었다. 타박상도, 목을 조른 흔적도 없었다.

    그런데도 거북은 숨을 쉬지 않았다.

    죽은 것처럼 보이지 않는 시체.
    살해의 흔적 없는 현장.

    그 시간,
    강당을 벗어난건 넷.

    남은 질문은 하나였다.
    거북은 어떻게 죽었는가.

flow:
  steps:
    - id: INTRO
      label: '오프닝'
      kind: intro
      durationSec: 180
      enterAnnouncement: '용궁섬의 행사 조명이 꺼지고, 재활수조실의 밤이 열립니다.'
    - id: ROLE_READING
      label: '비공개 룰지 읽기'
      kind: role_reading
      durationSec: 900
      description: '각자 비공개 룰지를 읽고, 준비가 되면 다 읽었어요를 눌러주세요. 권장 시간이 지나도 모두 준비될 때까지 다음 단계로 넘어가지 않습니다.'
      enterAnnouncement: '각자 비공개 룰지를 읽는 시간입니다. 모두 읽음 완료를 누르면 1라운드 조사가 시작됩니다.'
    - id: ROUND1_INVESTIGATE
      label: '1라운드 조사'
      kind: investigate
      round: 1
      durationSec: 420
      description: '경찰이 현장 사진을 찍어야 하므로 당분간 재활수조실은 출입 금지입니다. 우선 용의자끼리 대화를 나누고 서로의 소지품을 조사합니다.'
      enterAnnouncement: |
        경찰이 현장 사진을 찍어야 하므로 당분간 재활수조실은 출입 금지입니다.
        우선 용의자인 사람끼리 대화를 나누고 서로의 소지품을 조사하기로 합니다.
    - id: ROUND1_DISCUSS
      label: '1라운드 토론'
      kind: discuss
      round: 1
      durationSec: 600
      description: '현장 통제가 풀리기 전까지 각자의 말과 숨긴 행동을 맞춰 보세요. 누가 먼저 기사 제목이 될지 정하는 시간입니다.'
    - id: ROUND2_INVESTIGATE
      label: '2라운드 조사'
      kind: investigate
      round: 2
      durationSec: 420
      description: '경찰의 현장 통제가 풀렸습니다. 이제 각자 재활수조실과 남은 소지품을 조사하기로 합니다.'
      enterAnnouncement: |
        경찰의 현장 통제가 풀렸습니다.
        이제 각자 조사하기로 합니다.
    - id: ROUND2_DISCUSS
      label: '2라운드 토론'
      kind: discuss
      round: 2
      durationSec: 600
      description: '윤유성, 조희수, 서기준, 한다정의 거짓말과 실제 사망 원인을 분리하세요. 범인이 없다는 결론까지 포함해 최종 지목을 정리하세요.'
    - id: FINAL_VOTE
      label: '최종 투표'
      kind: final_vote
      durationSec: 300
      description: '거북 오완주를 최종적으로 죽인 인물을 지목하세요.'
      enterAnnouncement: '이제 기자단 앞 브리핑이 시작됩니다. 지금 선택한 결론이 용왕재단의 기록, 기사 제목, 각자의 남은 명분을 결정합니다.'
    - id: SECRET_REVIEW
      label: '비밀 제출/채점'
      kind: secret_review
      durationSec: 420
      description: '각자 다른 두 플레이어의 비밀을 익명으로 적어 제출하고, 자신에게 도착한 추측이 맞는지 채점하세요.'
      enterAnnouncement: '최종 지목이 끝났습니다. 이제 각자 다른 두 플레이어의 비밀을 익명으로 적어 제출하고, 자신에게 도착한 추측을 맞음/아님으로 채점합니다.'
    - id: ENDBOOK
      label: '엔딩'
      kind: endbook
      enterAnnouncement: '엔딩 단계입니다. 최종 진실을 확인합니다.'

parts:
  - id: part_turtle_body
    name: '거북의 사체 상태'
    source: '재활수조실'
    note: '물기와 치명적인 외상은 없고 등껍질에만 얕은 긁힌 흔적이 있다.'
  - id: part_rubber_ring
    name: '검은 고무링'
    source: '한다정의 손수건'
    note: '한다정이 숨긴 작은 검은 고무링이다.'
  - id: part_black_thermos
    name: '윤유성의 검은 보온병'
    source: '윤유성의 소지품'
    note: '마개 안쪽 홈에 있어야 할 고무링이 빠져 있다.'
  - id: part_turtle_envelope
