cards:
  - id: card_turtle_body
    title: '사체'
    text: |
      목을 조른 흔적이나 둔기 외상도 없다. 
      등껍질 한쪽에 얕은 긁힌 흔적만 있다.
      의사들 소견으로는 찰과상이 없으니 적신 수건으로 입을 막은건 아닐거라한다.
      입가 가까이에서는 희미하게 씁쓸한 약 냄새가 난다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/turtle-body.png'
    imageAlt: '재활수조실에 쓰러진 거북의 사체 사진'
    backId: back_turtle_body
    effects:
      - type: addPart
        partId: part_turtle_body
  - id: card_rubber_ring
    title: '아내토끼 소지품 1'
    text: |
      작고 하얀 고무링이 나왔다.
      다른 물건에 들어가는 고무패킹으로 보인다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rubber-ring.png'
    imageAlt: '작고 하얀 고무링'
    backId: back_rubber_ring
    effects:
      - type: addPart
        partId: part_rubber_ring
  - id: card_black_thermos
    title: '윤유성 소지품 1'
    text: |
      보온병에 고무패킹이 빠져 있다.
      보온병 안쪽에는 씁쓸한 냄새가 희미하게 남아 있다.
      바닥에는 녹다 만 흰 가루 흔적이 조금 붙어 있다.
    backId: back_black_thermos
    effects:
      - type: addPart
        partId: part_black_thermos
  - id: card_turtle_envelope
    title: '윤유성 소지품 2'
    text: |
      오완주의 자필 고백문이다.
      20XX년 육상 국가대표 선발전 결승을 앞두고, 대기실에서 윤유성의 물병에 수면유도제를 넣었다고 적혀 있다.
      봉투 안에는 오완주 명의 수면유도제 처방전 사본도 들어 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/turtle-envelope.png'
    imageAlt: '자필 진술서와 처방전 사본이 든 거북 서류봉투'
    backId: back_turtle_envelope
    effects:
      - type: addPart
        partId: part_turtle_envelope
  - id: card_rabbit_family
    title: '아내토끼 소지품 2'
    text: |
      가족사진이다.
      사진 뒷면에는 "내 딸 윤슬. 수술 끝나면 학교 가자."라고 적혀 있다.
      사진 모서리에는 오래된 흰 리본이 붙어 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rabbit-family.png'
    imageAlt: '토끼 가족사진'
    backId: back_rabbit_family
    effects:
      - type: addPart
        partId: part_rabbit_family
  - id: card_medical_wing_rumor
    title: '의료동에서 도는 소문'
    text: |
      의료동에서는 윤유성이 선발전에서 이겼다면 윤슬이 수술을 받을 수 있었을 거라는 말이 돈다.
      경기 우승으로 수술을 받았으면 살 확률이 높았을텐데..
    publicRevealDisabled: true
    backId: back_medical_wing_rumor
    effects:
      - type: addPart
        partId: part_medical_wing_rumor
  - id: card_medical_shoe_cabinet_first
    title: '의료동 신발장'
    text: |
      의료동 입구 신발장을 겉에서 확인했다.
      눈에 보이는 신발과 슬리퍼에는 특별히 젖은 흔적이 없다.
      의료동 직원은 본행사 시작부터 여우의 비명이 있기까지 의료동 출입자는 조희수뿐이었다고 말했다.
    textHighlights:
      - '본행사 시작부터 여우의 비명이 있기까지 의료동 출입자는 조희수뿐이었다'
    publicRevealDisabled: true
    backId: back_medical_shoe_cabinet_first
    effects:
      - type: addPart
        partId: part_medical_shoe_cabinet
  - id: card_medical_shoe_cabinet_recheck
    title: '의료동 신발장'
    text: |
      신발장 깊숙한 칸 안쪽에 젖은 구두 한 켤레가 놓여 있다.
    publicRevealDisabled: true
    backId: back_medical_shoe_cabinet_recheck
    effects:
      - type: addPart
        partId: part_medical_shoe_cabinet_recheck
  - id: card_jara_belongings
    title: '서기준의 소지품'
    text: |
      서기준의 소지품은 손수건, 행사 진행표, 평범한 필기구뿐이다.
    backId: back_jara_belongings
    effects:
      - type: addPart
        partId: part_jara_belongings
  - id: card_syringe_trace
    title: '조희수 소지품 1'
    text: |
      조희수의 품 속에서 발견된 일회용 주사기 안에 투명한 액체가 차 있다.
    backId: back_syringe_trace
    effects:
      - type: addPart
        partId: part_syringe_trace
  - id: card_empty_vial
    title: '조희수 소지품 2'
    text: |
      조희수의 품 속에서 빈 약병이 발견되었다.
      약병 라벨에는 피가 묻어 약명이 가려져 있다.
    backId: back_empty_vial
    effects:
      - type: addPart
        partId: part_empty_vial
  - id: card_rubber_hose
    title: '호스'
    text: |
      고무호스가 길게 말려 있다.
      펼치면 길이가 약 5m, 직경은 2.3cm이고, 물기가 묻어 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/rubber-hose.png'
    imageAlt: '물기가 남은 고무호스'
    backId: back_rubber_hose
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_rubber_hose
  - id: card_towel_bin
    title: '파란통'
    text: |
      축축한 수건들이 담겨 있어서 그런지 내부에 물기가 맺혀 있다.
      입구의 지름은 45cm, 높이 약 50cm다.
    backId: back_towel_bin
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_towel_bin
  - id: card_medical_desk_photo
    title: '의료동 간이책상 1'
    text: |
      덜 닫혀있는 간이책상의 맨아래 서랍을 열자 이상한 철판 하나와 빈봉투 몇 개, 그리고 다음과 같은 폴라로이드 사진이 발견되었다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/past-killing-photo.png'
    imageAlt: '구겨진 폴라로이드 사진'
    backId: back_medical_desk_photo
    effects:
      - type: addPart
        partId: part_past_killing_photo
  - id: card_medical_desk_records
    title: '의료동 간이책상 2'
    text: |
      맨아래 서랍의 더 안쪽을 살피니 이러한 "건강기록 비교 발췌" 자료가 있었다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/liver-compatibility.png'
    imageAlt: '윤유성과 윤슬의 건강기록 비교 발췌 자료'
    backId: back_medical_desk_records
    effects:
      - type: addPart
        partId: part_liver_compatibility
  - id: card_siphon_guide
    title: '세탁실에 붙어있는 안내문'
    text: |
      큰 통의 액체를 작은 용기에 옮길 때는, 튜브 안을 먼저 액체로 채운 뒤 낮은 쪽 용기로 내리라고 적혀 있다.
    imageSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/clue/siphon-guide.png'
    imageAlt: '원액 리필 요령 안내문'
    backId: back_siphon_guide
    effects:
      - type: addPart
        partId: part_siphon_guide
  - id: card_child_tank_waterline
    title: '어린이용 수조'
    text: |
      수조 벽면에 크기가 적혀있다. 2m × 1m, 높이 50cm다.
      약 3cm의 물이 차있고, 벽면에 젖은 자국을 보니 물이 줄거나 늘어나지는 않은 것 같다.
    backId: back_child_tank_waterline
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_child_tank_waterline
  - id: card_adult_tank_specs
    title: '성인용 수조'
    text: |
      옆면 표기는 2m × 5m, 높이 120cm다.
      사건 직후 물은 거의 없고 벽면에 젖은 자국이 없는 걸 보니 물은 원래 비어있던게 맞는거같다.
    backId: back_adult_tank_specs
    extraInvestigationOnReveal: true
    effects:
      - type: addPart
        partId: part_adult_tank_specs
  - id: card_glass_scratches
