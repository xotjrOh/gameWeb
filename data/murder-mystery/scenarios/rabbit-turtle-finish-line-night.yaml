id: rabbit-turtle-finish-line-night
type: murder_mystery
title: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
roomDisplayName: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
players:
  min: 3
  max: 3

rules:
  investigationsPerRound: 2
  noEliminationDuringGame: true
  partsAutoReveal: true
  partsPublicDetail: false

intro:
  readAloud: |
    몇 달 전 패배로 후원이 끊겼던 토끼를 위해, 용왕재단은 후원 재개를 위한 기자간담회를 열었다.

    후원선수 복귀 기자간담회.

    오늘 저녁 본행사가 시작되고 얼마 지나지 않아, 재활수조실 방향에서 다급한 외침이 끼어들었다.

    거북 선수가 쓰러졌다고.

    그날 재활수조실은 단수 상태였다. 한쪽 수조에는 3cm 남짓한 물만 남아 있었고, 다른 한쪽 수조는 비어 있었다.

    그 사이의 타일 위에 거북은 쓰러져 있었다.

    몸을 돌려 확인해보니 핏자국도 없었다. 타박상도, 목을 조른 흔적도 없었다.

    그런데도 거북은 숨을 쉬지 않았다.

    죽은 것처럼 보이지 않는 시체.
    살해의 흔적 없는 현장.

    그 시간,
    강당을 벗어난건 넷.

    남은 질문은 하나였다.
    거북은 어떻게 죽었는가.

flow:
  steps:
    - id: INTRO
      label: '프롤로그'
      kind: intro
      durationSec: 240
      description: '방장이 프롤로그를 소리 내어 읽고, 낭독이 끝나면 다음 단계로 진행합니다.'
      enterAnnouncement: '캐릭터 배정이 완료되었습니다. 방장이 프롤로그를 낭독합니다.'
    - id: ROLE_READING
      label: '비공개 룰지 읽기'
      kind: role_reading
      durationSec: 900
      description: '각자 비공개 룰지를 읽고, 준비가 되면 다 읽었어요를 눌러주세요. 권장 시간이 지나도 모두 준비될 때까지 다음 단계로 넘어가지 않습니다.'
      enterAnnouncement: '방장의 안내에 따라 각자 비공개 룰지를 읽는 시간입니다.'
    - id: ROUND1_BRIEFING
      label: '1라운드 조사 전 지문'
      kind: intro
      durationSec: 180
      description: '의사들이 오완주의 사망 여부를 확인하는 동안, 네 사람은 서로의 소지품과 기억을 확인합니다.'
      readAloud: |
        재활수조실 쪽에서 비명이 터지자, 기자들이 몰려들려 했습니다.
        자라는 곧바로 직원들을 시켜 복도를 막고, 위층 의료동의 의사들을 불렀습니다.

        의사들이 안으로 들어가자 문은 닫혔습니다.
        오완주가 정말 사망했는지 확인하는 동안, 네 사람은 재활수조실에 접근하지 않기로 합니다.

        잠시 후, 자라가 입을 엽니다.

        “가만히 기다리기만 할 순 없죠. 각자 어디 있었는지, 뭘 봤는지, 뭘 들었는지부터 맞춰봅시다. 소지품도 서로 확인하고요.”

        가방과 주머니를 보이라는 말에 모두의 표정이 굳습니다.
        하지만 이 상황에서 혼자 거절하기도 어렵습니다.

        결국 네 사람은 서로의 소지품과 기억을 확인하기로 합니다.

        1라운드 조사를 시작합니다.
      enterAnnouncement: '1라운드 조사 전 지문입니다. 방장이 낭독한 뒤 1라운드 조사로 진행합니다.'
    - id: ROUND1_INVESTIGATE
      label: '1라운드 조사'
      kind: investigate
      round: 1
      durationSec: 420
      description: '용의자끼리 대화를 나누고 서로의 소지품을 조사합니다.'
      enterAnnouncement: '아내토끼가 여우에게 개인 전달 카드를 건넸습니다. 1라운드 조사를 시작합니다.'
    - id: ROUND1_DISCUSS
      label: '1라운드 토론'
      kind: discuss
      round: 1
      durationSec: 600
      description: '현장 통제가 풀리기 전까지 각자의 말과 숨긴 행동을 맞춰 보세요. 누가 먼저 기사 제목이 될지 정하는 시간입니다.'
    - id: ROUND2_BRIEFING
      label: '2라운드 조사 전 지문'
      kind: intro
      durationSec: 120
      description: '오완주의 사망이 확인되고, 네 사람은 재활수조실 안을 확인합니다.'
      readAloud: |
        의사들이 재활수조실에서 나옵니다.

        오완주는 사망한 것으로 확인되었습니다.
        정확히 왜 쓰러졌는지는 아직 알 수 없습니다.

        자라는 직원들에게 기자들을 계속 막게 한 뒤, 네 사람을 돌아봅니다.

        “이제 안을 확인합시다. 아까 각자 말한 것들이 현장과 맞는지 봐야죠. 아무것도 만지지는 말고, 보이는 것만 확인합시다.”

        닫혀 있던 재활수조실 문이 열립니다.

        2라운드 조사를 시작합니다.
      enterAnnouncement: '2라운드 조사 전 지문입니다. 방장이 낭독한 뒤 2라운드 조사로 진행합니다.'
    - id: ROUND2_INVESTIGATE
      label: '2라운드 조사'
      kind: investigate
      round: 2
      durationSec: 420
      description: '재활수조실과 남은 소지품을 조사합니다.'
      enterAnnouncement: '2라운드 조사를 시작합니다.'
    - id: ROUND2_DISCUSS
      label: '2라운드 토론'
      kind: discuss
      round: 2
      durationSec: 600
      description: '윤유성, 조희수, 서기준, 한다정의 거짓말과 실제 사망 원인을 분리하세요. 범인이 없다는 결론까지 포함해 최종 지목을 정리하세요.'
    - id: FINAL_VOTE
      label: '최종 투표'
      kind: final_vote
      durationSec: 300
      description: '거북 오완주를 최종적으로 죽인 인물을 지목하세요.'
      enterAnnouncement: '이제 기자단 앞 브리핑이 시작됩니다. 지금 선택한 결론이 용왕재단의 기록, 기사 제목, 각자의 남은 명분을 결정합니다.'
    - id: SECRET_REVIEW
      label: '비밀 제출/채점'
      kind: secret_review
      durationSec: 420
      description: '각자 다른 두 플레이어의 비밀을 익명으로 적어 제출하고, 자신에게 도착한 추측이 맞는지 채점하세요.'
      enterAnnouncement: '최종 지목이 끝났습니다. 이제 각자 다른 두 플레이어의 비밀을 익명으로 적어 제출하고, 자신에게 도착한 추측을 맞음/아님으로 채점합니다.'
    - id: ENDBOOK
      label: '엔딩'
      kind: endbook
      enterAnnouncement: '엔딩 단계입니다. 최종 진실을 확인합니다.'

parts:
  - id: part_turtle_body
    name: '거북의 사체 상태'
    source: '재활수조실'
    note: '물기와 치명적인 외상은 없고 등껍질에만 얕은 긁힌 흔적이 있다.'
  - id: part_rubber_ring
    name: '검은 고무링'
    source: '한다정의 손수건'
    note: '한다정이 숨긴 작은 검은 고무링이다.'
  - id: part_black_thermos
    name: '윤유성의 검은 보온병'
    source: '윤유성의 소지품'
    note: '마개 안쪽 홈에 있어야 할 고무링이 빠져 있다.'
  - id: part_turtle_envelope
    name: '거북의 자필 고백'
    source: '서류봉투'
    note: '거북이 선발전에서 수면유도제를 사용했다는 고백이다.'
  - id: part_rabbit_family
    name: '토끼 가족 사진'
    source: '한다정의 소지품'
    note: '한다정이 가족을 지키려는 이유를 보여준다.'
  - id: part_liver_compatibility
    name: '간 적합성 문서'
    source: '서기준의 소지품'
    note: '재단과 서기준이 윤유성을 섬에 붙잡아야 했던 이유다.'
  - id: part_syringe_trace
    name: '투명한 액체가 든 주사기'
    source: '조희수의 소지품'
    note: '조희수가 자라를 해치려 했다는 의심을 만든다.'
  - id: part_empty_vial
    name: '피 묻은 빈 약병'
    source: '조희수의 소지품'
    note: '라벨을 확인하기 어려운 빈 약병이다.'
  - id: part_dragon_king_rumor_1
    name: '용왕에 대한 소문1'
    source: '행사장 소문'
    note: '용왕이 이름을 알린 뒤 가난한 자도 병원 진단을 받을 수 있게 되었다는 소문이다.'
  - id: part_rubber_hose
    name: '고무호스의 물기'
    source: '재활수조실'
    note: '길이가 매우 긴 청소용 고무호스다.'
  - id: part_siphon_guide
    name: '세탁실에 붙어있는 안내문'
    source: '세탁실 벽'
    note: '튜브 안을 먼저 액체로 채운 뒤 낮은 쪽 용기로 내려 보내는 방법을 설명한다.'
  - id: part_towel_bin
    name: '수건 회수용 파란통'
    source: '비품 정리실'
    note: '축축한 수건 때문에 내부에 물기가 맺혀 있다.'
  - id: part_child_tank_waterline
    name: '어린이용 수조'
    source: '재활수조실'
    note: '2m × 1m, 높이 50cm로 표기된 수조다.'
  - id: part_adult_tank_specs
    name: '성인용 수조'
    source: '성인용 수조'
    note: '2m × 5m, 높이 120cm로 표기된 수조다.'
  - id: part_glass_scratches
    name: '통유리 외벽'
    source: '성인용 수조 외벽'
    note: '통유리 외벽에 살짝 금이 가 있다.'
  - id: part_past_killing_photo
    name: '구겨진 폴라로이드'
    source: '서기준의 소지품'
    note: '구겨진 사진 속에는 과거 누군가를 살해하던 자라의 모습이 남아 있다.'
  - id: part_dragon_king_rumor_2
    name: '용왕에 대한 소문2'
    source: '행사장 소문'
    note: '용왕이 아프다는 소문 이후 다시 굶는 아이들이 늘었다는 소문이다.'
  - id: part_placeholder_2
    name: '추가 예정 단서 2'
    source: '작성 예정'
    note: '플레이 전 실제 단서로 교체할 자리다.'
  - id: part_placeholder_3
    name: '추가 예정 단서 3'
    source: '작성 예정'
    note: '플레이 전 실제 단서로 교체할 자리다.'

roles:
  - id: rabbit_husband
    displayName: '남편토끼 윤유성'
    portraitSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/characters/rabbit-husband.png'
    portraitAlt: '남편토끼 윤유성 인물 이미지'
    publicText: |
      한때 스타였던 달리기 선수.
      현재는 극심한 슬픔에 빠져 있는 것처럼 보인다.
    personalGoal: |
      윤슬의 수술과 오완주를 향한 분노가 한꺼번에 당신을 범인처럼 보이게 만들 수 있습니다.
      당신이 실제로 한 행동과 오완주의 마지막 사망 원인을 분리해서 설명할 명분을 확보하세요.
    ruleText: |
      감정적인 남편으로 보이는 것은 자연스럽지만, 가족을 지키려던 행동까지 모두 살해 의도로 읽히지 않게 조심하세요.
      누군가 당신의 소지품을 조사하면 어떤 부분은 인정하고, 어떤 부분은 모른다고 둘지 미리 정해 두는 편이 좋습니다.
    belongingHints:
      - label: '소지품 1'
        hint: '평소 들고 다니던 검은 음료 용기입니다. 겉모습보다 마개와 내용물에 대한 질문을 받을 수 있습니다.'
      - label: '소지품 2'
        hint: '사건 직후 현장에서 급히 챙겨 나온 두꺼운 종이봉투입니다. 안에 무엇이 있었는지는 쉽게 말하지 않아도 됩니다.'
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/rabbit_husband.txt
    secretTextHighlights:
      - '이번 육상 국가대표 선발전에서 우승하면, 다음으로 비는 수술방 하나를 윤슬에게 돌리겠습니다.'
      - '병원에서 처방받은 수면유도제는 몇 달 사이 외투 안주머니에서 빠지지 않는 물건이 됐다.'
      - '오완주가 멀찍이서 나를 한 번 보고는, 팔 아래에 두꺼운 서류봉투를 낀 채 말없이 강당 아래쪽 이중문 쪽으로 걸어갔다.'
      - '육상 국가대표 선발전 직전, 대기실에서 네가 집어 든 물병. 그거 내가 건드렸어.'
      - '그래서 네 물에 수면유도제를 탔어.'
      - '그 안에는 자기 자필 고백문과 수면유도제 처방전 사본이 들어 있다고 했다.'
      - '외투 안주머니 속 약봉지가 손끝에 걸렸다. 나는 알약을 부숴 보온병에 털어 넣고 한 번 흔들었다.'
      - '02:24가 되었을 때, 보온병이 먼저 손에서 빠졌다.'
      - '오완주는 한 걸음 비틀거리더니 위쪽 어린이용 재활수조와 아래쪽 성인용 재활수조 사이의 타일 바닥'
      - '나는 거기서 멈췄다.'
      - '나는 벤치 위 서류봉투를 먼저 집어 들고, 수조 턱 아래로 굴러간 보온병과 뚜껑을 주워 방을 나왔다.'

  - id: fox
    displayName: '여우 조희수'
    portraitSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/characters/fox.png'
    portraitAlt: '여우 조희수 인물 이미지'
    publicText: |
      세상에 불만이 많아 보이는 기자.
      농담처럼 웃고 있어도 눈빛은 차갑고, 무엇 하나 순순히 받아들이지 않는 사람처럼 보인다.
    personalGoal: |
      서기준과 용왕재단의 과거를 파헤쳐, 이번 사건이 단순한 약물 사고로 덮이지 않게 만드세요.
      동시에 비품 정리실에서 당신이 준비했던 위험한 행동은 들키지 않는 편이 유리합니다.
    ruleText: |
      당신은 의심 제기와 취재 압박으로 판을 흔들 수 있습니다.
      다만 누가 먼저 누구를 의심했는지, 어떤 이름을 먼저 꺼냈는지 같은 발언 순서가 이후 증언 처리에 영향을 줄 수 있습니다.
    belongingHints:
      - label: '소지품 1'
        hint: '의료동에서 몰래 챙긴 투명한 투입 도구입니다. 누군가에게 바로 쓰려던 물건처럼 보일 수 있습니다.'
      - label: '소지품 2'
        hint: '라벨이 온전하지 않은 작은 약품 용기입니다. 비어 있다는 사실만으로도 질문을 받을 수 있습니다.'
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/fox.txt
    secretTextHighlights:
      - '폐기 대상.'
      - '비공개 처리 기록.'
      - '외부 반출 금지.'
      - '오른뺨을 가르는 흉터. 정바른의 모습이 담긴 기사였다.'
      - '그 아래에는 젊은 서기준이 서 있었다.'
      - '나는 진정제라고 적힌 약병 하나와 주사기 하나를 손수건에 감아 품에 넣었다.'
      - '나는 서기준만 보고 있었다. 누가 빠져나갔는지는 제대로 보지 않았다.'
      - '서기준은 강당 아래쪽 이중문 밖으로 나갔다.'
      - '초등학교 교사 토끼 한다정이 선반 사이에서 굳어 있었다.'
      - '방금 서기준이 사라진 방향이었다.'
      - '나는 선반 뒤에서 약물이 든 주사기를 쥔 채 기다렸다.'
      - '하지만 발소리는 비품 정리실 앞에서 멈추지 않았다.'
      - '그리고 분명 이 방향으로 사라진건 서기준이었다.'
      - '그 순간 나는 목격자가 아니라 약물을 들고 기다리던 사람이 된다.'
      - '서기준을 죽이러 온 기자.'

  - id: jara
    displayName: '자라 서기준'
    isKiller: true
    portraitSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/characters/jara.png'
    portraitAlt: '자라 서기준 인물 이미지'
    publicText: |
      정중하고 빈틈없는 관찰자.
      차분한 말투는 믿음직하지만, 지나치게 흐트러짐 없는 태도는 어딘가 거리감을 남긴다.
    personalGoal: |
      사건을 윤유성의 분노와 약물 문제로 설명하게 만들고, 실제 사망 원인과 재단의 목적이 당신에게 닿지 않게 하세요.
      최종 지목이 당신에게 오지 않도록 정보 정리자의 위치를 유지하는 것이 핵심입니다.
    ruleText: |
      당신은 침착하게 규칙과 기록을 정리하는 사람처럼 행동할 수 있습니다.
      단서가 공개될수록 의료동, 수조, 비품, 가족 문제를 하나의 선으로 연결하려는 시도를 끊어 내야 합니다.
    belongingHints:
      - label: '소지품 1'
        hint: '당신이 관리하던 의료 판단 자료입니다. 단순 기록처럼 보이지만, 특정 인물을 섬에 붙잡아 둘 명분과 연결될 수 있습니다.'
      - label: '소지품 2'
        hint: '과거의 일과 이어질 수 있는 낡은 사진 한 장입니다. 이 사진이 공개되면 당신의 차분한 이미지가 흔들릴 수 있습니다.'
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/jara.txt
    secretTextHighlights:
      - '사이펀.'
      - '물이 있는 곳. 그보다 낮은 곳. 잠깐 막아 둘 끝.'
      - '기록에 남기지 않을 절차를 하나 더 넣으면 됐다.'
      - '윤유성의 기록이 윤슬의 기록과 같은 방향으로 기울어 있었다.'
      - '후원선수 자격 재심사라는 명목으로 윤유성을 부르기로 했다.'
      - '행사 종료 후 회복 음료 제공.'
      - '야간 응급 호출.'
      - '수술실 대기.'
      - '부분 간 절제 가능.'
      - '내 일정표의 마지막 줄에는 한 단어가 적혀 있었다.'
      - '의료동.'
      - '윤유성은 잠깐 멈췄다가 그 뒤를 따라갔다.'
      - '살아 있었다.'
      - '살아 있는 오완주가 아니라, 죽은 오완주가.'
      - '오른쪽 위 구석에 말려 있던 고무호스를 끌어왔다.'
      - '손가락을 떼자 물이 가는 줄기로 통 안에 떨어졌다.'
      - '나는 그의 머리를 통 안에 눌러 넣었다. 잠잠해질 때까지.'
      - '오완주의 얼굴과 턱 밑에 남은 물기를 닦고, 몸 주변 타일에 떨어진 물방울도 훔쳤다.'
      - '고무호스는 다시 오른쪽 위 구석에 말아 두었다.'
      - '오완주의 자세는 내가 처음 봤을 때와 크게 다르지 않게 돌려놓았다.'

