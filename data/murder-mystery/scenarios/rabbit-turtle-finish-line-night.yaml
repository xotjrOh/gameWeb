id: rabbit-turtle-finish-line-night
type: murder_mystery
title: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
roomDisplayName: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
players:
  min: 3
  max: 3

rules:
  investigationsPerRound: 2
  noEliminationDuringGame: true
  partsAutoReveal: true
  partsPublicDetail: false

intro:
  readAloud: |
    프롤로그

    몇 달 전 패배로 후원이 끊겼던 토끼를 위해, 용왕재단은 후원 재개를 위한 기자간담회를 열었다.

    후원선수 복귀 기자간담회.

    오늘 저녁 본행사가 시작되고 얼마 지나지 않아, 재활수조실 방향에서 다급한 외침이 끼어들었다.

    거북 선수가 쓰러졌다고.

    그날 재활수조실은 단수 상태였다. 한쪽 수조에는 3cm 남짓한 물만 남아 있었고, 다른 한쪽 수조는 비어 있었다.

    그 사이의 타일 위에 거북은 쓰러져 있었다.

    몸을 돌려 확인해보니 핏자국도 없었다. 타박상도, 목을 조른 흔적도 없었다.

    그런데도 거북은 숨을 쉬지 않았다.

    죽은 것처럼 보이지 않는 시체.
    살해의 흔적 없는 현장.

    그 시간,
    강당을 벗어난건 넷.

    남은 질문은 하나였다.
    거북은 어떻게 죽었는가.

flow:
  steps:
    - id: INTRO
      label: '오프닝'
      kind: intro
      durationSec: 180
      enterAnnouncement: '용궁섬의 행사 조명이 꺼지고, 재활수조실의 밤이 열립니다.'
    - id: ROUND1_INVESTIGATE
      label: '1라운드 조사'
      kind: investigate
      round: 1
      durationSec: 420
      description: '현장 상태, 윤유성의 동기, 아내토끼의 동선을 함께 확인하세요. 겉으로는 약물과 사고처럼 보이지만 현장의 물 흔적이 어긋납니다.'
      enterAnnouncement: '1라운드 조사: 재활수조실과 행사장 주변에서 첫 단서를 확인합니다.'
    - id: ROUND1_DISCUSS
      label: '1라운드 토론'
      kind: discuss
      round: 1
      durationSec: 600
      description: '거북의 몸 상태, 고무링, 토끼 가족 사진, 아내토끼의 동선을 중심으로 누가 무엇을 숨겼는지 토론하세요.'
    - id: ROUND2_INVESTIGATE
      label: '2라운드 조사'
      kind: investigate
      round: 2
      durationSec: 420
      description: '과거의 죄, 각자의 동기, 실제 살해 방법을 한꺼번에 좁히세요. 고무호스와 수건 회수통을 분리해서 보면 답이 흐려집니다.'
      enterAnnouncement: '2라운드 조사: 봉투와 기록, 물자국을 통해 마지막 손을 추적합니다.'
    - id: ROUND2_DISCUSS
      label: '2라운드 토론'
      kind: discuss
      round: 2
      durationSec: 600
      description: '윤유성, 조희수, 서기준, 한다정의 거짓말과 실제 사망 원인을 분리하세요. 범인이 없다는 결론까지 포함해 최종 지목을 정리하세요.'
    - id: FINAL_VOTE
      label: '최종 투표'
      kind: final_vote
      durationSec: 300
      description: '거북 오완주를 최종적으로 죽인 인물을 지목하세요.'
    - id: ENDBOOK
      label: '엔딩'
      kind: endbook
      enterAnnouncement: '엔딩 단계입니다. 최종 진실을 확인합니다.'

parts:
  - id: part_turtle_body
    name: '거북의 사체 상태'
    source: '재활수조실'
    note: '외상과 교살 흔적이 없고, 얕은 물만 남은 수조에서 발견됐다.'
  - id: part_rubber_ring
    name: '물기 있는 고무링'
    source: '재활수조실 배수구 근처'
    note: '윤유성의 보온병 마개와 맞는 젖은 고무링이다.'
  - id: part_rabbit_family
    name: '윤슬 수술 기록'
    source: '행사장 가족 사진'
    note: '윤유성이 거북에게 강한 원한을 품을 이유가 된다.'
  - id: part_scene_memo
    name: '검시/현장 메모'
    source: '재활수조실 초동 기록'
    note: '외상은 없고 현장 수위만으로는 사망 방식을 단정하기 어렵다.'
  - id: part_wife_route
    name: '아내토끼 동선과 고무링 은닉'
    source: '비품 정리실'
    note: '한다정이 재활수조실 쪽에 먼저 갔고, 젖은 고무링을 숨겼을 가능성이 있다.'
  - id: part_turtle_envelope
    name: '거북의 자필 고백'
    source: '서류봉투'
    note: '거북이 선발전에서 수면유도제를 사용했다는 고백이다.'
  - id: part_liver_compatibility
    name: '간 적합성 문서'
    source: '의료동 기록'
    note: '재단과 서기준이 윤유성을 섬에 붙잡아야 했던 이유다.'
  - id: part_barun_article
    name: '정바른 기사'
    source: '기사 스크랩'
    note: '조희수가 서기준을 의심하게 된 과거 사건이다.'
  - id: part_syringe_trace
    name: '의료동 주사기 반출 흔적'
    source: '의료동 약품함'
    note: '조희수가 숨긴 주사기와 진정제 절도 정황으로 이어진다.'
  - id: part_rubber_hose
    name: '고무호스의 물기'
    source: '재활수조실'
    note: '단수 중에도 사이펀으로 물을 옮길 수 있음을 보여준다.'
  - id: part_towel_bin
    name: '수건 회수용 파란통'
    source: '비품 정리실'
    note: '젖은 수건과 안쪽 물자국이 남아 있다.'
  - id: part_past_killing_photo
    name: '살해장면 사진'
    source: '재단 보관 자료'
    note: '서기준이 과거에도 기록을 조작하며 사람을 죽였다는 결정적 단서다.'

roles:
  - id: rabbit_husband
    displayName: '남편토끼 윤유성'
    publicText: |
      당신은 전성기 복귀를 노리던 육상 선수다. 딸 윤슬의 수술을 위해 용왕재단의 도움을 받아야 했고, 거북 오완주는 과거 선발전에서 당신을 쓰러뜨린 인물이다.
      오늘 밤 당신은 거북과 직접 만났고, 그 사실만으로도 모두가 당신을 의심할 수 있다.
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/rabbit_husband.txt

  - id: fox
    displayName: '여우 조희수'
    publicText: |
      당신은 행사의 홍보와 기사를 맡은 기자다. 말과 제목으로 사람을 움직이는 데 능숙하지만, 오늘 밤에는 당신 역시 누군가를 몰래 따라다녔다.
      사람들은 당신이 기삿거리 때문에 거북의 죽음을 이용하려 했다고 볼 수 있다.
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/fox.txt

  - id: jara
    displayName: '자라 서기준'
    isKiller: true
    publicText: |
      당신은 용왕재단 의료동과 행사 동선을 관리하는 실무 책임자다. 침착하고 기록에 밝지만, 오늘 밤 재활수조실 주변을 가장 자유롭게 오갈 수 있었던 사람이기도 하다.
      모두가 당신에게 현장 설명을 요구할 것이다.
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/jara.txt

initialRoleCards:
  - roleId: fox
    cardId: card_start_wife_pact
    sourceLabel: '아내토끼가 건넨 카드'

specialEvents:
  - id: wife_suspicion_gate
    label: '아내토끼 잠금 증언'
    description: |
      여우가 먼저 아내토끼가 범인일 수 있다는 가능성을 제기했다면 카드 공개를 신고하세요.
      여우 외 인물이 먼저 제기했다면 영구 폐기를 신고하세요.
      이 조건을 직접 언급하거나 유도해서는 안 됩니다.
    reporterRoleIds:
      - rabbit_husband
      - jara
    revealCardId: card_locked_wife_accuses_fox
    revealAnnouncement: '아내토끼의 잠금 증언 카드가 전체 공개되었습니다.'
    sealAnnouncement: '아내토끼 잠금 증언 조건이 실패 처리되었습니다. 이 카드는 더 이상 공개되지 않습니다.'

