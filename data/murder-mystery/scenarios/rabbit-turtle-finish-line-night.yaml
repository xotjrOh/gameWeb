id: rabbit-turtle-finish-line-night
type: murder_mystery
title: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
roomDisplayName: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
players:
  min: 3
  max: 3

rules:
  investigationsPerRound: 3
  noEliminationDuringGame: true
  partsAutoReveal: true
  partsPublicDetail: false

intro:
  readAloud: |
    몇 달 전 패배로 후원이 끊겼던 토끼를 위해, 용왕재단은 후원 재개를 위한 기자간담회를 열었다.

    후원선수 복귀 기자간담회.

    오늘 저녁 본행사가 시작되고 얼마 지나지 않아, 재활수조실 방향에서 다급한 외침이 끼어들었다.

    거북 선수가 쓰러졌다고.

    그날 재활수조실은 단수 상태였다. 한쪽 수조에는 3cm 남짓한 물만 남아 있었고, 다른 한쪽 수조는 비어 있었다.

    그 사이의 타일 위에 거북은 쓰러져 있었다.

    몸을 돌려 확인해보니 핏자국도 없었다. 타박상도, 목을 조른 흔적도 없었다.

    그런데도 거북은 숨을 쉬지 않았다.

    죽은 것처럼 보이지 않는 시체.
    살해의 흔적 없는 현장.

    그 시간,
    강당을 벗어난건 넷.

    남은 질문은 하나였다.
    거북은 어떻게 죽었는가.

flow:
  steps:
    - id: INTRO
      label: '프롤로그'
      kind: intro
      durationSec: 240
      description: '방장이 프롤로그를 소리 내어 읽고, 낭독이 끝나면 다음 단계로 진행합니다.'
      enterAnnouncement: '캐릭터 배정이 완료되었습니다. 방장이 프롤로그를 낭독합니다.'
    - id: ROLE_READING
      label: '비공개 룰지 읽기'
      kind: role_reading
      durationSec: 900
      description: '각자 비공개 룰지를 읽고, 준비가 되면 다 읽었어요를 눌러주세요. 권장 시간이 지나도 모두 준비될 때까지 다음 단계로 넘어가지 않습니다.'
      enterAnnouncement: '방장의 안내에 따라 각자 비공개 룰지를 읽는 시간입니다.'
    - id: ROUND1_BRIEFING
      label: '1라운드 조사 전 지문'
      kind: intro
      durationSec: 180
      description: '의사들이 오완주의 사망 여부를 확인하는 동안, 네 사람은 서로의 소지품과 기억을 확인합니다.'
      readAloud: |
        재활수조실 쪽에서 비명이 터지자, 기자들이 한꺼번에 몰려들려 했습니다.

        서기준은 곧바로 직원들을 시켜 재활수조실 앞 복도를 막게 했습니다. 동시에 직원을 시켜 의료동에서 의사를 불렀고, 다른 직원에게는 윤유성을 찾아 데려오라고 지시했습니다.

        잠시 후 의사들이 재활수조실 안으로 들어갔습니다.

        문은 닫혔고, 직원들은 그 앞에 섰습니다. 오완주의 상태를 확인하는 동안, 누구도 재활수조실 안으로 들어갈 수 없게 되었습니다.

        얼마 지나지 않아 윤유성도 복도로 돌아왔습니다.

        재활수조실 앞에는 윤유성, 한다정, 조희수, 서기준 네 사람이 모였습니다. 본행사 중 강당을 비운 사람들이었습니다.

        자라는 의료동 쪽 복도를 한 번 확인하고는 낮은 목소리로 말합니다.

        “현장 안은 의사들이 보고 있습니다. 안쪽은 건드리지 말고, 밖부터 확인하죠. 오완주가 자리를 비웠을 때부터 여우가 비명을 지르기까지 자리를 비운 건 저희 넷뿐입니다. 의료동 입구, 복도, 그리고 각자의 소지품을 먼저 보겠습니다.”

        소지품을 보자는 말에 모두의 표정이 굳었습니다.

        하지만 이 상황에서 혼자 거절하기도 어려웠습니다. 기자들은 복도 밖에 몰려 있었고, 직원들은 재활수조실 문 앞을 막고 있었습니다. 의사들이 안에서 오완주의 상태를 확인하는 동안, 네 사람은 서로를 바라볼 수밖에 없었습니다.

        결국 네 사람은 각자의 소지품과 방금 전 동선을 확인하고, 다른 장소를 먼저 조사하기로 합니다.

        1라운드 조사를 시작합니다.
      enterAnnouncement: '1라운드 조사 전 지문입니다. 방장이 낭독한 뒤 1라운드 조사로 진행합니다.'
    - id: ROUND1_INVESTIGATE
      label: '1라운드 조사'
      kind: investigate
      round: 1
      durationSec: 420
      description: '용의자끼리 대화를 나누고 서로의 소지품을 조사합니다.'
      enterAnnouncement: '아내토끼가 여우에게 개인 전달 카드를 건넸습니다. 1라운드 조사를 시작합니다.'
    - id: ROUND1_DISCUSS
      label: '1라운드 토론'
      kind: discuss
      round: 1
      durationSec: 600
      description: '현장 통제가 풀리기 전까지 각자의 말과 숨긴 행동을 맞춰 보세요. 누가 먼저 기사 제목이 될지 정하는 시간입니다.'
    - id: ROUND2_BRIEFING
      label: '2라운드 조사 전 지문'
      kind: intro
      durationSec: 120
      description: '오완주의 사망이 확인되고, 네 사람은 재활수조실 안을 확인합니다.'
      readAloud: |
        현장 밖의 조사가 끝날 무렵, 재활수조실 문이 열렸다. 안으로 들어갔던 의사들은 오완주의 사망을 확인했으며, 더 이상의 응급처치는 어렵다고 말했다. 이제 방 안은 의료진이 비켜난 상태였고, 서기준은 직원들에게 기자들만 계속 막게 한 뒤 조사자들이 들어갈 길을 열었다.

        그 말을 들은 윤유성은 잠시 숨을 삼켰다. 놀란 듯하면서도, 어딘가 납득하지 못한 얼굴이었다. 한다정은 곧바로 그의 옆으로 다가서 한 걸음 앞에 섰고, 윤유성이 무언가 말하려 하자 낮은 목소리로 이름을 불러 멈춰 세웠다.

        지금까지 확인한 것은 모두 재활수조실 바깥의 정황뿐이었다. 오완주가 실제로 쓰러져 있던 자리와 방 안에 남은 흔적은 누구도 직접 살피지 못했다. 이제 닫혀 있던 현장을 확인할 차례다. 2라운드 조사를 시작합니다.
      enterAnnouncement: '2라운드 조사 전 지문입니다. 방장이 낭독한 뒤 2라운드 조사로 진행합니다.'
    - id: ROUND2_INVESTIGATE
      label: '2라운드 조사'
      kind: investigate
      round: 2
      durationSec: 420
      description: '재활수조실과 남은 소지품을 조사합니다.'
      enterAnnouncement: '2라운드 조사를 시작합니다.'
    - id: ROUND2_DISCUSS
      label: '2라운드 토론'
      kind: discuss
      round: 2
      durationSec: 600
      description: '윤유성, 조희수, 서기준, 한다정의 거짓말과 실제 사망 원인을 분리하세요. 범인이 없다는 결론까지 포함해 최종 지목을 정리하세요.'
    - id: FINAL_VOTE
      label: '최종 투표'
      kind: final_vote
      durationSec: 300
      description: '거북 오완주를 최종적으로 죽인 인물을 지목하세요.'
      enterAnnouncement: '이제 기자단 앞 브리핑이 시작됩니다. 지금 선택한 결론이 용왕재단의 기록, 기사 제목, 각자의 남은 명분을 결정합니다.'
    - id: ENDING_CHOICE
      label: '최종 선택'
      kind: ending_choice
      durationSec: 300
      description: |
        오완주를 죽인 범인은 서기준이었다.

        윤유성은 약을 먹였지만, 죽이지 않았다.

        한다정은 증거를 숨겼다.

        조희수는 주사기를 품고 있었지만, 오완주가 아니라 서기준을 노리고 있었다.

        오완주의 숨을 끊은 것은 서기준이었다.

        이제 남은 것은,
        이 진실을 어디까지 세상에 내놓을 것인가다.
      enterAnnouncement: '최종 지목은 자라 서기준에게 향했습니다. 남편토끼와 여우에게 마지막 선택지가 열립니다.'
    - id: ENDBOOK
      label: '엔딩'
      kind: endbook
      enterAnnouncement: '엔딩 단계입니다. 최종 진실을 확인합니다.'

parts:
  - id: part_turtle_body
    name: '거북의 사체 상태'
    source: '재활수조실'
    note: '목 조름이나 둔기 외상, 얼굴 주변 압박흔은 없고 등껍질 한쪽에 얕은 긁힌 흔적과 입가의 희미한 씁쓸한 약 냄새가 있다.'
  - id: part_rubber_ring
    name: '하얀 고무링'
    source: '한다정의 손수건'
    note: '작고 하얀 고무링이다. 다른 물건에 들어가는 고무패킹으로 보인다.'
  - id: part_black_thermos
    name: '윤유성의 검은 보온병'
    source: '윤유성의 소지품'
    note: '고무패킹이 빠져 있고, 씁쓸한 냄새와 녹다 만 흰 가루 흔적이 남아 있다.'
  - id: part_turtle_envelope
    name: '거북의 자필 고백'
    source: '서류봉투'
    note: '오완주의 자필 고백문과 오완주 명의 수면유도제 처방전 사본이 들어 있다. 고백문 마지막 장에는 "이것이 사죄가 될 수 없다는 것을 알지만"이라는 문장과 함께, 자신의 경기 수익 전액과 광고 수익 전액을 아픈 어린아이들의 치료비로 기부하겠다는 법적 효력 있는 서약이 적혀 있다.'
  - id: part_rabbit_family
    name: '토끼 가족 사진'
    source: '한다정의 소지품'
    note: '윤슬과 수술 약속이 적힌 가족사진이다.'
  - id: part_medical_wing_rumor
    name: '의료동에서 도는 소문1'
    source: '의료동 소문'
    note: '윤유성이 선발전에서 이겼다면 윤슬이 수술을 받을 수 있었을 거라는 의료동 소문이다.'
  - id: part_medical_wing_rumor_2
    name: '의료동에서 도는 소문2'
    source: '의료동 소문'
    note: '본행사 전 조희수가 서기준의 간이책상에 머물렀고, 그 뒤 조희수의 비명까지 네 명 중 의료동 출입자는 없었다는 소문이다.'
  - id: part_medical_shoe_cabinet
    name: '의료동 입구 신발장'
    source: '의료동 입구 신발장'
    note: '젖은 구두를 벗어 의료동 입구 신발장에 넣고, 간이책상 물건은 챙기지 못했다는 기록이다.'
  - id: part_medical_shoe_cabinet_recheck
    name: '의료동 입구 신발장'
    source: '의료동 입구 신발장'
    note: '의료동 입구 신발장 깊숙한 칸 안쪽에서 젖은 구두 한 켤레가 발견된다.'
  - id: part_jara_belongings
    name: '서기준의 소지품'
    source: '서기준의 소지품'
    note: '손수건, 행사 진행표, 평범한 필기구와 행사 종료 후 의료동 일정 및 회복 음료 확인 메모가 있다.'
  - id: part_liver_compatibility
    name: '건강기록 비교 발췌'
    source: '의료동 간이책상 2'
    note: '윤유성과 윤슬의 건강기록을 비교한 발췌 자료다.'
  - id: part_syringe_trace
    name: '투명한 액체가 든 주사기'
    source: '조희수의 소지품'
    note: '투명한 액체가 든 일회용 주사기다.'
  - id: part_empty_vial
    name: '피 묻은 빈 약병'
    source: '조희수의 소지품'
    note: '피가 조금 묻은, 진정제 라벨의 빈 약병이다.'
  - id: part_dragon_king_rumor_1
    name: '용왕에 대한 소문1'
    source: '행사장 소문'
    note: '용왕이 이름을 알린 뒤 가난한 자들도 병원 진단을 받을 수 있게 되었고, 세간에서 구세주로 불렸다는 소문이다.'
  - id: part_rubber_hose
    name: '고무호스의 물기'
    source: '재활수조실'
    note: '약 5m 길이, 직경 2.3cm의 물기가 묻은 고무호스다.'
  - id: part_siphon_guide
    name: '세탁실에 붙어있는 안내문'
    source: '세탁실 벽'
    note: '튜브 안을 먼저 액체로 채운 뒤 낮은 쪽 용기로 내려 보내는 방법을 설명한다.'
  - id: part_towel_bin
    name: '수건 회수용 파란통'
    source: '수건 회수용 파란통'
    note: '축축한 수건들이 담겨 있어서 그런지 내부에 물기가 맺혀 있고, 입구 지름은 45cm, 높이는 약 50cm다.'
  - id: part_child_tank_waterline
    name: '어린이용 수조'
    source: '재활수조실'
    note: '6m × 3m, 높이 50cm로 표기된 수조이며, 약 3cm의 물이 차 있고 물이 줄거나 늘어난 것 같지는 않다.'
  - id: part_adult_tank_specs
    name: '성인용 수조'
    source: '재활수조실'
    note: '6m × 10m, 높이 120cm로 표기된 수조이며, 사건 직후 물은 거의 없고 벽면에 젖은 자국도 없다.'
  - id: part_glass_scratches
    name: '통유리 외벽'
    source: '성인용 수조 외벽'
    note: '통유리 외벽에 살짝 금이 가 있다.'
  - id: part_past_killing_photo
    name: '구겨진 폴라로이드'
    source: '의료동 간이책상 1'
    note: '의료동 간이책상에서 발견된 구겨진 폴라로이드 사진이다.'
  - id: part_dragon_king_rumor_2
    name: '용왕에 대한 소문2'
    source: '행사장 소문'
    note: '용왕이 병환으로 업무를 돌보지 못하게 되자 길거리에는 다시 굶는 아이들이 늘어났다는 소문이다.'
  - id: part_dragon_king_rumor_3
    name: '용궁섬에 대한 소문3'
    source: '행사장 안내도'
    note: '왕국으로 나가려면 배를 타야 하며, 행사장에서 선착장 옆 펠리컨 배달거점까지는 약 800m라는 안내다.'
  - id: part_wet_shoeprints
    name: '젖은 구두 자국'
    source: '재활수조실 바닥'
    note: '재활수조실 바닥 곳곳에 흐리게 남은 젖은 구두 자국이다. 수조실 내부에서는 방향을 알아보기 힘들고, 복도 쪽 흔적은 기자들과 직원들의 발자국에 뭉개져 있다.'

roles:
  - id: rabbit_husband
    displayName: '남편토끼 윤유성'
    portraitSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/characters/rabbit-husband.png'
    portraitAlt: '남편토끼 윤유성 인물 이미지'
    publicText: |
      한때 스타였던 달리기 선수.
      현재는 극심한 슬픔에 빠져 있는 것처럼 보인다.
    personalGoal: |
      윤슬의 수술과 오완주를 향한 분노가 한꺼번에 당신을 범인처럼 보이게 만들 수 있습니다.
      당신이 실제로 한 행동과 오완주의 마지막 사망 원인을 분리해서 설명할 명분을 확보하세요.
    ruleText: |
      감정적인 남편으로 보이는 것은 자연스럽지만, 가족을 지키려던 행동까지 모두 살해 의도로 읽히지 않게 조심하세요.
      누군가 당신의 소지품을 조사하면 어떤 부분은 인정하고, 어떤 부분은 모른다고 둘지 미리 정해 두는 편이 좋습니다.
      소지품 2는 오완주에게서 가져온 서류봉투입니다. 오완주는 그 안에 자기 자필 고백문과 수면유도제 처방전 사본이 있다고 말했습니다. 당신은 아직 봉투 안의 문장을 직접 읽지 못했습니다.
      인물 관계:
      한다정은 당신의 아내이며, 윤슬을 함께 잃은 사람입니다.
      조희수는 과거 당신의 패배를 자극적인 기사로 소비한 기자입니다.
      서기준은 윤슬이 수술을 받을 길을 2번이나 열어 주려 했던 용왕재단 실무자입니다. 비록 타이밍이 좋지않았으나 용왕재단의 배려에는 감사하고있습니다.
      오완주는 선발전에서 당신의 물병에 수면유도제를 넣었다고 고백한 선수입니다.
    belongingHints:
      - label: '소지품 1'
        hint: '보온병입니다.'
      - label: '소지품 2'
        hint: '거북에게서 가져온 서류봉투입니다.'
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/rabbit_husband.txt
    secretTextHighlights:
      - '이번 육상 국가대표 선발전에서 우승하면, 다음으로 비는 수술방 하나를 윤슬에게 돌리겠습니다.'
      - '병원에서 처방받은 수면유도제는 몇 달 사이 외투 안주머니에서 빠지지 않는 물건이 됐다.'
      - '오완주가 멀찍이서 나를 한 번 보고는, 팔 아래에 두꺼운 서류봉투를 낀 채 말없이 강당 아래쪽 이중문 쪽으로 걸어갔다.'
      - '육상 국가대표 선발전 직전, 대기실에서 네가 집어 든 물병. 그거 내가 건드렸어.'
      - '그래서 네 물에 수면유도제를 탔어.'
      - '그 안에는 자기 자필 고백문과 수면유도제 처방전 사본이 들어 있다고 했다.'
      - '외투 안주머니 속 약봉지가 손끝에 걸렸다. 나는 알약을 부숴 보온병에 털어 넣고 한 번 흔들었다.'
      - '02:24가 되었을 때, 보온병이 먼저 손에서 빠졌다.'
      - '오완주는 한 걸음 비틀거리더니 위쪽 어린이용 재활수조와 아래쪽 성인용 재활수조 사이의 타일 바닥'
      - '나는 거기서 멈췄다.'
      - '나는 벤치 위 서류봉투를 먼저 집어 들고, 수조 턱 아래로 굴러간 보온병과 뚜껑을 주워 방을 나왔다.'

  - id: fox
    displayName: '여우 조희수'
    portraitSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/characters/fox.png'
    portraitAlt: '여우 조희수 인물 이미지'
    publicText: |
      세상에 불만이 많아 보이는 기자.
      농담처럼 웃고 있어도 눈빛은 차갑고, 무엇 하나 순순히 받아들이지 않는 사람처럼 보인다.
    personalGoal: |
      서기준과 용왕재단의 과거를 파헤쳐, 이번 사건이 단순한 약물 사고로 덮이지 않게 만드세요.
      동시에 비품 정리실에서 당신이 준비했던 위험한 행동은 들키지 않는 편이 유리합니다.
    ruleText: |
      당신은 의심 제기와 취재 압박으로 판을 흔들 수 있습니다.
      다만 누가 먼저 누구를 의심했는지, 어떤 이름을 먼저 꺼냈는지 같은 발언 순서가 이후 증언 처리에 영향을 줄 수 있습니다.
      인물 관계:
      윤유성은 당신이 과거 기사로 무너뜨렸던 선수이며, 재단이 다시 세우려는 얼굴입니다.
      한다정은 비품 정리실에서 마주친 사람이며, 서로 숨길 것이 있습니다.
      서기준은 정바른의 죽음과 연결된 용왕재단 실무자이며, 당신이 노리는 대상입니다.
      오완주는 당신이 재활수조실에서 발견한 피해자입니다.
    belongingHints:
      - label: '소지품 1'
        hint: '주사기입니다.'
      - label: '소지품 2'
        hint: '진정제입니다.'
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/fox.txt
    secretTextHighlights:
      - '시장 뒤 지하통로. 비 오는 날. 대상 처리 완료.'
      - '비공개 처리 기록.'
      - '외부 반출 금지.'
      - '오른뺨을 가르는 흉터. 정바른의 모습이 담긴 기사였다.'
      - '그 아래에는 젊은 서기준이 서 있었다.'
      - '나는 진정제라고 적힌 약병 하나와 주사기 하나를 손수건에 감아 품에 넣었다.'
      - '나는 서기준만 보고 있었다. 누가 빠져나갔는지는 제대로 보지 않았다.'
      - '서기준은 강당 아래쪽 이중문 밖으로 나갔다.'
      - '초등학교 교사 토끼 한다정이 선반 사이에서 굳어 있었다.'
      - '방금 서기준이 사라진 방향이었다.'
      - '나는 선반 뒤에서 약물이 든 주사기를 쥔 채 기다렸다.'
      - '하지만 발소리는 비품 정리실 앞에서 멈추지 않았다.'
      - '그대로 안쪽 통로 위편으로 멀어졌다.'
      - '그 순간 나는 목격자가 아니라 약물을 들고 기다리던 용의자가 된다.'
      - '서기준을 죽이러 온 기자.'

  - id: jara
    displayName: '자라 서기준'
    isKiller: true
    portraitSrc: '/images/murder-mystery/rabbit-turtle-finish-line-night/characters/jara.png'
    portraitAlt: '자라 서기준 인물 이미지'
    publicText: |
      정중하고 빈틈없는 관찰자.
      차분한 말투는 믿음직하지만, 지나치게 흐트러짐 없는 태도는 어딘가 거리감을 남긴다.
    personalGoal: |
      사건을 윤유성의 분노와 약물 문제로 설명하게 만들고, 실제 사망 원인과 재단의 목적이 당신에게 닿지 않게 하세요.
      최종 지목이 당신에게 오지 않도록 정보 정리자의 위치를 유지하는 것이 핵심입니다.
    ruleText: |
      당신은 침착하게 규칙과 기록을 정리하는 사람처럼 행동할 수 있습니다.
      소지품의 의료동 일정/회복 음료 메모는 행사 후 선수 관리 일정이라고 설명하세요. 단독으로는 이상하지 않지만, 건강기록 비교 발췌와 연결되면 위험해집니다.
      단서가 공개될수록 의료동, 수조, 비품, 가족 문제를 하나의 선으로 연결하려는 시도를 끊어 내야 합니다.
      의료동 입구 신발장에는 당신이 벗어 둔 구두가 숨겨져 있습니다. 다음 조사에서 젖은 구두가 발견될 수 있으니, 다른 플레이어들이 그곳을 다시 조사하지 못하도록 자연스럽게 유도하는 편이 좋습니다.
      인물 관계:
      윤유성은 윤슬 사망 뒤 용왕에게 필요한 새 가능성이 된 사람입니다.
      한다정은 윤유성의 보호자이며, 당신의 계획에서 가장 예민한 변수입니다.
      조희수는 재단의 과거를 파고드는 기자이며, 당신에게 직접적인 위험입니다.
      오완주는 윤유성을 사건 안에 붙잡아 두기 위해 이용한 피해자입니다.
    belongingHints:
      - label: '소지품'
        hint: '행사 진행표와 개인 일정 메모가 있습니다.'
    secretTextPath: rulesheets/rabbit-turtle-finish-line-night/jara.txt
    secretTextHighlights:
      - '사이펀.'
      - '물이 있는 곳. 그보다 낮은 곳. 잠깐 막아 둘 끝.'
      - '기록에 남기지 않을 절차를 하나 더 넣으면 됐다.'
      - '윤유성의 기록이 윤슬의 기록과 같은 방향으로 기울어 있었다.'
      - '후원선수 자격 재심사라는 명목으로 윤유성을 부르기로 했다.'
      - '행사 종료 후 회복 음료 제공.'
      - '야간 응급 호출.'
      - '수술실 대기.'
      - '부분 간 절제 가능.'
      - '내 일정표의 마지막 줄에는 한 단어가 적혀 있었다.'
      - '의료동.'
      - '윤유성은 잠깐 멈췄다가 그 뒤를 따라갔다.'
      - '살아 있었다.'
      - '살아 있는 오완주가 아니라, 죽은 오완주가.'
      - '오른쪽 위 구석에 말려 있던 고무호스를 끌어왔다.'
      - '손가락을 떼자 물이 가는 줄기로 통 안에 떨어졌다.'
      - '나는 그의 머리를 통 안에 눌러 넣었다. 잠잠해질 때까지.'
      - '오완주의 얼굴과 턱 밑에 남은 물기를 닦고, 몸 주변 타일에 떨어진 물방울도 훔쳤다.'
      - '고무호스는 다시 오른쪽 위 구석에 말아 두었다.'
      - '오완주의 자세는 내가 처음 봤을 때와 크게 다르지 않게 돌려놓았다.'

