id: rabbit-turtle-finish-line-night
type: murder_mystery
title: "토끼와 거북이, 결승선 다음의 밤"
roomDisplayName: "토끼와 거북이, 결승선 다음의 밤"
players:
  min: 4
  max: 4

rules:
  investigationsPerRound: 1
  noEliminationDuringGame: true
  partsAutoReveal: true
  partsPublicDetail: false

intro:
  readAloud: |
    용궁섬 복귀 특집 행사 당일 밤, 의료동 연결복도 끝 재활수조실에서 거북이 죽은 채 발견됐다.
    마지막으로 그를 둘러싼 사람은 토끼남편, 토끼아내, 자라, 여우 네 명뿐이다.

    거북은 죽기 직전, 대표 선발전의 진실과 용왕재단 문서를 토끼남편에게 털어놓으려 했다.
    누군가는 너무 늦게 진실을 알았고, 누군가는 그 늦음을 이용해 사람을 통제했으며, 누군가는 그 파국을 제목으로 팔아 왔다.

    오늘 밤 여러분은 서로의 기억과 남겨진 문서를 맞대어,
    거북이 어떻게 죽었는지,
    누가 봉투를 먼저 찾았는지,
    그리고 누가 가장 늦은 밤의 마지막 손을 썼는지 밝혀야 한다.

flow:
  steps:
    - id: INTRO
      label: "오프닝"
      kind: intro
      durationSec: 180
      enterAnnouncement: "별똥별은 이미 떨어졌다. 이제 남은 것은 늦은 밤의 진술뿐이다."
    - id: ROUND1_INVESTIGATE
      label: "1라운드 조사"
      kind: investigate
      round: 1
      durationSec: 420
      description: "재활수조실 주변과 행사 자료를 확인해 사건 직후의 동선과 첫 번째 거짓말을 정리하세요."
      enterAnnouncement: "1라운드 조사: 재활수조실, 연결복도, 행사 자료에서 밤의 시작을 확인합니다."
    - id: ROUND1_DISCUSS
      label: "1라운드 토론"
      kind: discuss
      round: 1
      durationSec: 600
      description: "거북이 즉사하지 않았다는 점과, 누군가가 구조보다 봉투를 먼저 찾았다는 점을 중심으로 맞춰 보세요."
    - id: ROUND2_INVESTIGATE
      label: "2라운드 조사"
      kind: investigate
      round: 2
      durationSec: 420
      description: "의료 기록, 보안 로그, 관계자 진술을 대조해 봉투와 최종 살해 방향을 좁히세요."
      enterAnnouncement: "2라운드 조사: 문서와 로그를 열어 재단의 통제와 은폐 흔적을 확인합니다."
    - id: ROUND2_DISCUSS
      label: "2라운드 토론"
      kind: discuss
      round: 2
      durationSec: 600
      description: "토끼부부가 최종 살해자가 아니라는 사실을 전제로, 누가 봉투를 되찾아야만 했는지 토론하세요."
    - id: FINAL_VOTE
      label: "최종 투표"
      kind: final_vote
      durationSec: 300
      description: "현재 확보된 단서상, 거북의 최종 사망에 가장 직접적으로 연루된 인물을 지목하세요."
    - id: ENDBOOK
      label: "엔딩"
      kind: endbook
      enterAnnouncement: "엔딩 단계에 도달했습니다. 현재 저장된 draft 결말을 확인합니다."

