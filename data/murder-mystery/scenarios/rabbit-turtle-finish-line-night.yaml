endbook:
  common: |
    오완주는 윤유성에게 과거 선발전 조작을 고백하려 했다. 윤유성은 분노했고, 수면유도제를 먹여 오완주를 쓰러뜨렸다. 여기까지는 사실이다.

    하지만 사실이라고 해서, 진실은 아니다. 어린이용 수조의 물때는 현재 물높이와 맞아 있었다. 사건 전후로 어린이용 수조에 물이 많이 추가되거나 빠진 흔적은 없었고, 따라서 그곳은 주된 사망 장소가 아니었다.

    반대로 성인용 수조는 시설 기록상 높이 120cm, 실제 사용 수심 약 105cm, 내부 바닥 5.0m × 3.0m의 큰 수조였다. 사건 직후 그 물은 설명 없이 사라져 있었고, 비품 정리실의 파란 수건 수거통에는 높은 위치까지 물방울이 남아 있었다. 수거통의 내부 바닥은 65cm × 45cm에 불과해, 성인용 수조에서는 낮아 보일 물도 수거통 안에서는 충분히 높은 물자국이 될 수 있었다.

    고무호스의 물기, 유리 외벽의 곡선형 긁힘, 투명 실리콘 패킹은 물을 옮긴 장치를 가리킨다. 청소 안내문처럼 호스 안을 먼저 물로 채우고 낮은 쪽으로 내리면, 높은 수조의 물은 단수 상태에서도 다른 용기로 흘러간다. 서기준은 그 방식을 이용해 물을 수거통으로 옮겼고, 아직 살아 있던 오완주의 호흡을 그곳에서 막았다. 이후 젖은 수건과 현장 정리로 윤유성의 약물 범행처럼 보이게 만들었다.

    조희수는 주사기를 훔쳤고 한다정과 마주친 일을 숨겼다. 한다정은 고무링을 숨기고 여우를 의심했다. 윤유성은 쓰러뜨릴 만큼의 동기와 행동이 있었지만 마지막 사망 순간까지 책임지지는 않았다. 출입 기록과 장비 반납 누락은 재활수조실, 비품 정리실, 장비 보관함을 모두 연결할 수 있었던 사람을 서기준으로 좁힌다.
  variantMatched: |
    최종 투표는 서기준에게 닿았다. 재단의 기록 뒤에 숨어 있던 마지막 손이 드러났다.
  variantNotMatched: |
    최종 투표는 서기준에게 닿지 못했다. 윤유성의 분노와 조희수의 주사기가 너무 선명했고, 진짜 살해 방식은 기록 속에 묻혔다.
  closingLine: '토끼와 거북이: 사실이라고 해서, 진실은 아니다'
